<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>animator</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #0e0e0e;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.4;
        color: #e9e9e9;
      }

      body {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar {
        flex: 0 0 200px;
        height: 100%;
        padding: 16px 14px;
        border-right: 1px solid #1f1f1f;
        background: #131313;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: auto;
      }

      .sidebar h1 {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.06em;
        color: #9a9a9a;
      }

      .nav-section {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-title {
        margin: 0 0 4px 2px;
        text-transform: lowercase;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: #6a6a6a;
      }

      .nav-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-list a {
        display: block;
        padding: 6px 8px;
        border-radius: 4px;
        color: #cfcfcf;
        text-decoration: none;
        text-transform: lowercase;
        border: 1px solid transparent;
      }

      .nav-list a:hover,
      .nav-list a:focus {
        background: #1d1d1d;
        color: #fff;
        outline: none;
      }

      .nav-list a.is-active {
        background: #fff;
        color: #0e0e0e;
        border-color: #fff;
      }

      .nav-list a .nav-meta {
        display: block;
        color: #6a6a6a;
        font-size: 10px;
        margin-top: 1px;
      }

      .nav-list a.is-active .nav-meta {
        color: #555;
      }

      .sidebar-footer {
        margin-top: auto;
        color: #5a5a5a;
        font-size: 10px;
        line-height: 1.5;
      }

      .sidebar-footer a {
        color: #9a9a9a;
        text-decoration: none;
      }

      .sidebar-footer a:hover {
        color: #fff;
      }

      .viewer {
        flex: 1 1 auto;
        position: relative;
        background: #0e0e0e;
        overflow: hidden;
      }

      .viewer iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #111;
      }

    </style>
  </head>
  <body>
    <aside class="sidebar" aria-label="Animations">
      <h1>animator</h1>

      <div class="nav-section">
        <p class="nav-title">animations</p>
        <ul class="nav-list" id="navList"></ul>
      </div>

      <div class="sidebar-footer">
        <a href="index.html">open editor →</a>
      </div>
    </aside>

    <main class="viewer" id="viewer">
      <iframe
        id="frame"
        title="Animation"
        src="about:blank"
        allow="autoplay; clipboard-write"
      ></iframe>
    </main>

    <script>
      (function () {
        var ANIMATIONS_DIR = "animations/";
        var MANIFEST_URL = ANIMATIONS_DIR + "animations.json";

        var ANIMATIONS = [];
        var navList = document.getElementById("navList");
        var frame = document.getElementById("frame");

        function slugify(stem) {
          return (
            String(stem)
              .replace(/[^a-zA-Z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "")
              .toLowerCase() || "animation"
          );
        }

        function humanise(stem) {
          return String(stem).replace(/[-_]+/g, " ").trim();
        }

        function entryFromFilename(filename) {
          var stem = filename.replace(/\.html?$/i, "");
          return {
            id: slugify(stem),
            label: humanise(stem),
            url: ANIMATIONS_DIR + filename,
          };
        }

        // Try parsing a server-generated directory listing (Apache, Nginx,
        // Python http.server, Caddy all return HTML with <a href="..."> links).
        function fetchDirectoryListing() {
          return fetch(ANIMATIONS_DIR, {
            headers: { Accept: "text/html" },
          })
            .then(function (r) {
              if (!r.ok) throw new Error("listing " + r.status);
              var ct = r.headers.get("content-type") || "";
              if (!/text\/html/i.test(ct)) throw new Error("not html");
              return r.text();
            })
            .then(function (html) {
              var doc = new DOMParser().parseFromString(html, "text/html");
              var anchors = Array.prototype.slice.call(
                doc.querySelectorAll("a[href]")
              );
              var seen = {};
              var files = [];
              anchors.forEach(function (a) {
                var href = a.getAttribute("href") || "";
                if (!/\.html?$/i.test(href)) return;
                if (/^[a-z]+:|^\/\//i.test(href)) return; // absolute / protocol
                if (href.indexOf("?") === 0 || href.indexOf("#") === 0) return;
                if (href.indexOf("/") !== -1) return; // skip nested paths
                var name;
                try {
                  name = decodeURIComponent(href);
                } catch (e) {
                  name = href;
                }
                if (seen[name]) return;
                seen[name] = true;
                files.push(name);
              });
              if (!files.length) throw new Error("no html in listing");
              return files;
            });
        }

        // Best-effort: read the <title> tag from each file so labels look nice.
        function enrichWithTitle(entry) {
          return fetch(entry.url)
            .then(function (r) {
              if (!r.ok) return entry;
              return r.text().then(function (text) {
                var m = text.match(/<title[^>]*>([^<]*)<\/title>/i);
                if (m && m[1].trim()) entry.label = m[1].trim();
                return entry;
              });
            })
            .catch(function () {
              return entry;
            });
        }

        function loadFromDirectory() {
          return fetchDirectoryListing().then(function (filenames) {
            var entries = filenames.map(entryFromFilename);
            return Promise.all(entries.map(enrichWithTitle));
          });
        }

        function loadFromManifest() {
          return fetch(MANIFEST_URL, { cache: "no-store" })
            .then(function (r) {
              if (!r.ok) throw new Error("manifest " + r.status);
              return r.json();
            })
            .then(function (data) {
              var list = (data && data.animations) || [];
              return list.map(function (a) {
                return {
                  id: a.id || slugify(a.url || a.label || ""),
                  label: a.label || humanise(a.id || ""),
                  url: a.url,
                  mtime: a.mtime != null ? a.mtime : null,
                  meta: a.meta || null,
                };
              });
            });
        }

        function discover() {
          // Prefer animations.json — it is version-controlled and lists every
          // page explicitly. Directory listings are fragile (host differences,
          // caching, deployment gaps) and often omit new files.
          return loadFromManifest().catch(function () {
            return loadFromDirectory();
          });
        }

        function render(activeId) {
          navList.innerHTML = "";
          if (!ANIMATIONS.length) {
            var li = document.createElement("li");
            var note = document.createElement("span");
            note.className = "nav-meta";
            note.style.padding = "6px 8px";
            note.textContent = "no animations found";
            li.appendChild(note);
            navList.appendChild(li);
            return;
          }
          ANIMATIONS.forEach(function (a) {
            var li = document.createElement("li");
            var aEl = document.createElement("a");
            aEl.href = "#" + a.id;
            aEl.textContent = a.label;
            if (a.meta) {
              var meta = document.createElement("span");
              meta.className = "nav-meta";
              meta.textContent = a.meta;
              aEl.appendChild(meta);
            }
            if (a.id === activeId) {
              aEl.classList.add("is-active");
              aEl.setAttribute("aria-current", "page");
            }
            li.appendChild(aEl);
            navList.appendChild(li);
          });
        }

        function findById(id) {
          for (var i = 0; i < ANIMATIONS.length; i++) {
            if (ANIMATIONS[i].id === id) return ANIMATIONS[i];
          }
          return null;
        }

        function iframeSrc(anim) {
          var u = anim.url;
          if (anim.mtime == null) return u;
          return u + (u.indexOf("?") >= 0 ? "&" : "?") + "v=" + anim.mtime;
        }

        function load(id) {
          var anim = findById(id);
          if (!anim) {
            frame.src = "about:blank";
            render(null);
            document.title = "animator";
            return;
          }
          var src = iframeSrc(anim);
          if (frame.getAttribute("data-current") !== src) {
            frame.src = src;
            frame.setAttribute("data-current", src);
          }
          render(anim.id);
          document.title = "animator — " + anim.label;
          try {
            localStorage.setItem("animator:overview:last", anim.id);
          } catch (e) {}
        }

        function readHash() {
          var h = (window.location.hash || "").replace(/^#/, "").trim();
          return h || null;
        }

        function initial() {
          var fromHash = readHash();
          if (fromHash && findById(fromHash)) return fromHash;
          var saved = null;
          try {
            saved = localStorage.getItem("animator:overview:last");
          } catch (e) {}
          if (saved && findById(saved)) return saved;
          return ANIMATIONS.length ? ANIMATIONS[0].id : null;
        }

        window.addEventListener("hashchange", function () {
          var id = readHash();
          if (id && findById(id)) load(id);
        });

        discover()
          .then(function (list) {
            ANIMATIONS = (list || []).slice().sort(function (a, b) {
              return a.label.toLowerCase().localeCompare(b.label.toLowerCase());
            });
            var startId = initial();
            if (startId && !readHash()) {
              history.replaceState(null, "", "#" + startId);
            }
            load(startId);
          })
          .catch(function (err) {
            console.error("could not load animations", err);
            ANIMATIONS = [];
            render(null);
          });
      })();
    </script>
  </body>
</html>
