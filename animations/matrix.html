<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>matrix</title>
    <style>
      @font-face {
        font-family: "IkarusCondensedVariable";
        src: url("../fonts/ABCIkarusCondensedVariable.ttf")
          format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      @font-face {
        font-family: "IkarusVariable";
        src: url("../fonts/ABCIkarusVariable.ttf") format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      @font-face {
        font-family: "IkarusExtendedVariable";
        src: url("../fonts/ABCIkarusExtendedVariable.ttf")
          format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #b8b8b8;
        --fg: #000000;
        --glyph-size: 180;
        --metric-size: 14;
        --zoom: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        color: var(--fg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .matrix {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        width: 100%;
        height: 100%;
        padding: 6%;
      }

      .cell {
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      .measure {
        position: relative;
        display: inline-block;
        padding-top: calc(var(--metric-size) * 1px + 6px);
      }

      .glyph {
        display: block;
        font-size: calc(var(--glyph-size) * 1px);
        line-height: 1;
        font-variation-settings: "wght" 200, "slnt" 0;
      }

      .measure .col-condensed {
        font-family: "IkarusCondensedVariable", system-ui, sans-serif;
      }

      .measure .col-default {
        font-family: "IkarusVariable", system-ui, sans-serif;
      }

      .measure .col-extended {
        font-family: "IkarusExtendedVariable", system-ui, sans-serif;
      }

      .line {
        position: absolute;
        width: 1px;
        background: var(--fg);
        opacity: 0.5;
        pointer-events: none;
      }

      .metric {
        position: absolute;
        font-family: "Courier New", Courier, monospace;
        font-size: calc(var(--metric-size) * 1px);
        font-weight: 400;
        color: var(--fg);
        line-height: 1;
        white-space: nowrap;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
        transform: translateX(-50%);
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .row input[type="color"]::-webkit-color-swatch {
        border: 0;
        border-radius: 2px;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="stage-wrap">
      <div class="stage-outer">
        <div class="stage" id="stage">
          <div class="matrix" id="matrix" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <aside class="panel">
      <h2>matrix</h2>
      <p class="hint">
        Condensed · Ikarus · Extended — weight wave top → bottom
      </p>

      <div class="group">
        <p class="group-title">appearance</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#b8b8b8" />
          <span class="val" id="bg-val">#b8b8b8</span>
        </div>
        <div class="row">
          <label for="fg">text</label>
          <input id="fg" type="color" value="#000000" />
          <span class="val" id="fg-val">#000000</span>
        </div>
        <div class="row">
          <label for="fs">size</label>
          <input id="fs" type="range" min="60" max="360" step="2" value="180" />
          <span class="val" id="fs-val">180px</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">animation</p>
        <div class="row">
          <label for="cy">cycle</label>
          <input id="cy" type="range" min="800" max="12000" step="100" value="4000" />
          <span class="val" id="cy-val">4.0s</span>
        </div>
        <div class="row">
          <label for="hd">hold</label>
          <input id="hd" type="range" min="0" max="2000" step="50" value="0" />
          <span class="val" id="hd-val">0ms</span>
        </div>
      </div>
    </aside>

    <script>
      (function () {
        var COLS = ["condensed", "default", "extended"];
        var COL_CLASS = {
          condensed: "col-condensed",
          default: "col-default",
          extended: "col-extended",
        };

        var root = document.documentElement;
        var matrix = document.getElementById("matrix");
        var cells = [];
        var W_MIN = 200;
        var W_MAX = 1000;
        var ROW_COUNT = 3;

        for (var r = 0; r < ROW_COUNT; r++) {
          for (var c = 0; c < ROW_COUNT; c++) {
            var cell = document.createElement("div");
            cell.className = "cell";

            var measure = document.createElement("div");
            measure.className = "measure";

            var metric = document.createElement("span");
            metric.className = "metric";
            metric.textContent = "200";

            var lineLeft = document.createElement("span");
            lineLeft.className = "line line-left";
            lineLeft.setAttribute("aria-hidden", "true");

            var glyph = document.createElement("span");
            glyph.className = "glyph " + COL_CLASS[COLS[c]];
            glyph.textContent = "a";

            var lineRight = document.createElement("span");
            lineRight.className = "line line-right";
            lineRight.setAttribute("aria-hidden", "true");

            measure.appendChild(metric);
            measure.appendChild(lineLeft);
            measure.appendChild(glyph);
            measure.appendChild(lineRight);
            cell.appendChild(measure);
            matrix.appendChild(cell);

            cells.push({
              row: r,
              measure: measure,
              glyph: glyph,
              lineLeft: lineLeft,
              lineRight: lineRight,
              metric: metric,
              weight: W_MIN,
            });
          }
        }

        var els = {
          bg: document.getElementById("bg"),
          fg: document.getElementById("fg"),
          fs: document.getElementById("fs"),
          cy: document.getElementById("cy"),
          hd: document.getElementById("hd"),
          bgVal: document.getElementById("bg-val"),
          fgVal: document.getElementById("fg-val"),
          fsVal: document.getElementById("fs-val"),
          cyVal: document.getElementById("cy-val"),
          hdVal: document.getElementById("hd-val"),
        };

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function phaseFromElapsed(elapsed, halfCycle, hold) {
          if (elapsed < halfCycle) {
            return elapsed / halfCycle;
          }
          if (elapsed < halfCycle + hold) {
            return 1;
          }
          if (elapsed < halfCycle + hold + halfCycle) {
            return 1 - (elapsed - halfCycle - hold) / halfCycle;
          }
          return 0;
        }

        function weightFromPhase(p) {
          var eased = easeInOutCubic(p);
          return W_MAX - (W_MAX - W_MIN) * eased;
        }

        function formatMs(ms) {
          if (ms >= 1000) return (ms / 1000).toFixed(1) + "s";
          return Math.round(ms) + "ms";
        }

        function syncLabels() {
          els.bgVal.textContent = els.bg.value.toLowerCase();
          els.fgVal.textContent = els.fg.value.toLowerCase();
          els.fsVal.textContent = Math.round(parseFloat(els.fs.value)) + "px";
          els.cyVal.textContent = formatMs(parseFloat(els.cy.value));
          els.hdVal.textContent = formatMs(parseFloat(els.hd.value));
        }

        function applyAppearance() {
          root.style.setProperty("--bg", els.bg.value);
          root.style.setProperty("--fg", els.fg.value);
          var fs = parseFloat(els.fs.value);
          root.style.setProperty("--glyph-size", fs);
          root.style.setProperty("--metric-size", Math.max(10, Math.round(fs * 0.08)));
          syncLabels();
          layoutGuides();
        }

        els.bg.addEventListener("input", applyAppearance);
        els.fg.addEventListener("input", applyAppearance);
        els.fs.addEventListener("input", applyAppearance);
        els.cy.addEventListener("input", syncLabels);
        els.hd.addEventListener("input", syncLabels);
        applyAppearance();

        function setRowWeights(elapsed, halfCycle, hold, total) {
          var rowDelay = total / ROW_COUNT;

          for (var i = 0; i < cells.length; i++) {
            var c = cells[i];
            var rowElapsed =
              (((elapsed - c.row * rowDelay) % total) + total) % total;
            var p = phaseFromElapsed(rowElapsed, halfCycle, hold);
            var w = weightFromPhase(p);
            c.weight = w;
            c.glyph.style.fontVariationSettings =
              '"wght" ' + w.toFixed(1) + ', "slnt" 0';
            c.metric.textContent = String(Math.round(w));
          }
        }

        function layoutGuides() {
          for (var i = 0; i < cells.length; i++) {
            var c = cells[i];
            var glyph = c.glyph;
            var measure = c.measure;
            var g = glyph.getBoundingClientRect();
            var m = measure.getBoundingClientRect();

            if (!g.width) continue;

            var leftX = g.left - m.left;
            var rightX = g.right - m.left;
            var top = g.top - m.top;
            var height = g.height;

            c.lineLeft.style.left = leftX + "px";
            c.lineLeft.style.top = top + "px";
            c.lineLeft.style.height = height + "px";

            c.lineRight.style.left = rightX - 1 + "px";
            c.lineRight.style.top = top + "px";
            c.lineRight.style.height = height + "px";

            c.metric.textContent = String(Math.round(c.weight));
            c.metric.style.left = (leftX + rightX) / 2 + "px";
            c.metric.style.top = "0";
          }
        }

        function frame(now, t0) {
          var cycle = Math.max(200, parseFloat(els.cy.value));
          var hold = Math.max(0, parseFloat(els.hd.value));
          var halfCycle = cycle / 2;
          var total = cycle + 2 * hold;

          var elapsed = (now - t0) % total;
          setRowWeights(elapsed, halfCycle, hold, total);
          layoutGuides();

          requestAnimationFrame(function (n2) {
            frame(n2, t0);
          });
        }

        window.addEventListener("resize", layoutGuides);

        requestAnimationFrame(function (n) {
          frame(n, n);
        });
      })();
    </script>
  </body>
</html>
