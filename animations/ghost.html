<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ghost</title>
    <style>
      @font-face {
        font-family: "IkarusVariable";
        src: url("../fonts/ABCIkarusVariable.ttf") format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --fg: #000000;
        --fs: 900;
        --stroke: 1;
        --zoom: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        color: var(--fg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        font-family: "IkarusVariable", system-ui, sans-serif;
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .glyph,
      .ghost {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: calc(var(--fs) * 1px);
        line-height: 1;
        white-space: nowrap;
        user-select: none;
        font-variation-settings: "wght" 500;
      }

      .ghost-layer {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        color: var(--fg);
      }

      .glyph {
        color: var(--fg);
        z-index: 2;
      }

      /* Filter per ghost so each weight renders its own outline; a parent-level
         filter would merge all glyphs into one combined mask (single ring). */
      .ghost {
        color: var(--fg);
        -webkit-text-fill-color: currentColor;
        -webkit-text-stroke: 0;
        filter: url(#ghost-outline);
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .row input[type="color"]::-webkit-color-swatch {
        border: 0;
        border-radius: 2px;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }

      .row.row-wide-val {
        grid-template-columns: 64px 1fr 100px;
      }

      .dual-range {
        position: relative;
        width: 100%;
        height: 22px;
      }

      .dual-track {
        position: absolute;
        left: 7px;
        right: 7px;
        top: 50%;
        height: 3px;
        transform: translateY(-50%);
        background: #2a2a2a;
        border-radius: 2px;
        pointer-events: none;
      }

      .dual-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        background: #fff;
        border-radius: 2px;
      }

      .dual-range input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .dual-range input[type="range"]:focus {
        outline: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-moz-range-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
        margin-top: 0;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        pointer-events: auto;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-webkit-slider-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-moz-range-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .panel .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .panel button {
        flex: 1;
        background: transparent;
        color: #cfcfcf;
        border: 1px solid #333;
        padding: 6px 8px;
        font: inherit;
        text-transform: lowercase;
        cursor: pointer;
        border-radius: 4px;
      }

      .panel button:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <svg
      width="0"
      height="0"
      style="position: absolute; pointer-events: none"
      aria-hidden="true"
    >
      <defs>
        <filter
          id="ghost-outline"
          filterUnits="objectBoundingBox"
          x="-20%"
          y="-20%"
          width="140%"
          height="140%"
          color-interpolation-filters="sRGB"
        >
          <feMorphology
            id="ghost-erode"
            operator="erode"
            radius="1"
            in="SourceAlpha"
            result="eroded"
          />
          <feComposite
            operator="out"
            in="SourceAlpha"
            in2="eroded"
            result="ring"
          />
          <feImage id="ghost-pattern" preserveAspectRatio="none" result="patternImg" />
          <feTile in="patternImg" result="pattern" />
          <feComposite operator="in" in="ring" in2="pattern" result="dotted" />
          <feFlood id="ghost-flood" flood-color="#000000" result="flood" />
          <feComposite operator="in" in="flood" in2="dotted" result="colored" />
        </filter>
      </defs>
    </svg>

    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">
        <div class="stage" id="stage" aria-label="ghost animation">
          <div class="ghost-layer" id="ghosts"></div>
          <span class="glyph" id="glyph">B</span>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />

    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">shift + scroll to zoom the artboard</p>

      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="fg">ink</label>
          <input id="fg" type="color" value="#000000" />
          <span class="val" id="fgVal">#000000</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">type</p>
        <div class="row">
          <label for="fs">size</label>
          <input id="fs" type="range" min="200" max="1600" step="1" value="900" />
          <span class="val" id="fsVal">900px</span>
        </div>
        <div class="row">
          <label for="sk">stroke</label>
          <input id="sk" type="range" min="0.5" max="6" step="0.1" value="1" />
          <span class="val" id="skVal">1.0px</span>
        </div>
      </div>
      <div class="group">
        <p class="group-title">outline</p>
        <div class="row">
          <label for="dash">dash</label>
          <input id="dash" type="range" min="1" max="48" step="1" value="6" />
          <span class="val" id="dashVal">6px</span>
        </div>
        <div class="row">
          <label for="gap">gap</label>
          <input id="gap" type="range" min="1" max="48" step="1" value="6" />
          <span class="val" id="gapVal">6px</span>
        </div>
      </div>


      <div class="group">
        <p class="group-title">weight</p>
        <div class="row row-wide-val">
          <label for="wMin">range</label>
          <div class="dual-range" id="wDual">
            <div class="dual-track"><div class="dual-fill" id="wFill"></div></div>
            <input
              id="wMin"
              class="is-start"
              type="range"
              min="100"
              max="1000"
              step="1"
              value="200"
              aria-label="Weight min"
            />
            <input
              id="wMax"
              class="is-end"
              type="range"
              min="100"
              max="1000"
              step="1"
              value="1000"
              aria-label="Weight max"
            />
          </div>
          <span class="val" id="wVal">200 / 1000</span>
        </div>
        <div class="row">
          <label for="gh">ghosts</label>
          <input id="gh" type="range" min="1" max="40" step="1" value="14" />
          <span class="val" id="ghVal">14</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">motion</p>
        <div class="row">
          <label for="cy">cycle</label>
          <input id="cy" type="range" min="1500" max="12000" step="100" value="5200" />
          <span class="val" id="cyVal">5.2s</span>
        </div>
        <div class="row">
          <label for="hd">hold</label>
          <input id="hd" type="range" min="0" max="2000" step="50" value="450" />
          <span class="val" id="hdVal">450ms</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
      </div>
    </aside>

    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var glyph = document.getElementById("glyph");
        var ghostLayer = document.getElementById("ghosts");

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function buildGhosts() {
          ghostLayer.innerHTML = "";
          var n = Math.max(1, Math.round(parseFloat(els.gh.value)));
          var wMin = parseFloat(els.wMin.value);
          var wMax = parseFloat(els.wMax.value);
          if (wMin > wMax) {
            var t = wMin;
            wMin = wMax;
            wMax = t;
          }
          var denom = n <= 1 ? 1 : n - 1;
          for (var i = 0; i < n; i++) {
            var w = wMin + ((wMax - wMin) * i) / denom;
            var el = document.createElement("span");
            el.className = "ghost";
            el.textContent = "B";
            el.style.fontVariationSettings = '"wght" ' + w.toFixed(1);
            ghostLayer.appendChild(el);
          }
        }

        function frame(now, t0) {
          var cycle = Math.max(200, parseFloat(els.cy.value));
          var hold = Math.max(0, parseFloat(els.hd.value));
          var halfCycle = cycle / 2;
          var total = cycle + 2 * hold;

          var elapsed = (now - t0) % total;
          var p;

          if (elapsed < halfCycle) {
            p = elapsed / halfCycle;
          } else if (elapsed < halfCycle + hold) {
            p = 1;
          } else if (elapsed < halfCycle + hold + halfCycle) {
            p = 1 - (elapsed - halfCycle - hold) / halfCycle;
          } else {
            p = 0;
          }

          var eased = easeInOutCubic(p);

          var wMin = parseFloat(els.wMin.value);
          var wMax = parseFloat(els.wMax.value);
          if (wMin > wMax) {
            var t = wMin;
            wMin = wMax;
            wMax = t;
          }

          var weight = wMin + (wMax - wMin) * eased;
          glyph.style.fontVariationSettings = '"wght" ' + weight.toFixed(1);

          requestAnimationFrame(function (n2) {
            frame(n2, t0);
          });
        }

        var LS_KEY = "ghost-anim:settings:v2";
        var root = document.documentElement;

        var DEFAULTS = {
          zm: 1,
          bg: "#ffffff",
          fg: "#000000",
          fs: 900,
          sk: 1,
          dash: 6,
          gap: 6,
          wMin: 200,
          wMax: 1000,
          gh: 14,
          cy: 5200,
          hd: 450,
        };

        var COLOR_KEYS = { bg: 1, fg: 1 };

        var els = {
          zm: document.getElementById("zm"),
          bg: document.getElementById("bg"),
          fg: document.getElementById("fg"),
          fs: document.getElementById("fs"),
          sk: document.getElementById("sk"),
          dash: document.getElementById("dash"),
          gap: document.getElementById("gap"),
          wMin: document.getElementById("wMin"),
          wMax: document.getElementById("wMax"),
          gh: document.getElementById("gh"),
          cy: document.getElementById("cy"),
          hd: document.getElementById("hd"),
        };
        var vals = {
          bg: document.getElementById("bgVal"),
          fg: document.getElementById("fgVal"),
          fs: document.getElementById("fsVal"),
          sk: document.getElementById("skVal"),
          dash: document.getElementById("dashVal"),
          gap: document.getElementById("gapVal"),
          gh: document.getElementById("ghVal"),
          cy: document.getElementById("cyVal"),
          hd: document.getElementById("hdVal"),
        };

        var wVal = document.getElementById("wVal");
        var wFill = document.getElementById("wFill");

        function fmt(key, v) {
          if (key === "bg" || key === "fg") return String(v).toLowerCase();
          if (key === "zm") return Math.round(Number(v) * 100) + "%";
          if (key === "fs") return Math.round(Number(v)) + "px";
          if (key === "sk") return Number(v).toFixed(1) + "px";
          if (key === "gh") return Math.round(Number(v)) + "";
          if (key === "cy") return (Number(v) / 1000).toFixed(1) + "s";
          if (key === "hd") return Math.round(Number(v)) + "ms";
          return String(v);
        }

        function updateWeightUI() {
          var a = parseFloat(els.wMin.value);
          var b = parseFloat(els.wMax.value);
          var min = parseFloat(els.wMin.min);
          var max = parseFloat(els.wMin.max);
          var lo = Math.min(a, b);
          var hi = Math.max(a, b);
          var loPct = ((lo - min) / (max - min)) * 100;
          var hiPct = ((hi - min) / (max - min)) * 100;
          wFill.style.left = loPct + "%";
          wFill.style.width = Math.max(0, hiPct - loPct) + "%";
          wVal.textContent = Math.round(lo) + " / " + Math.round(hi);
        }

        var ghostErode = document.getElementById("ghost-erode");
        var ghostPattern = document.getElementById("ghost-pattern");
        var ghostFlood = document.getElementById("ghost-flood");

        function updateGhostFilter() {
          if (!ghostErode) return;
          var dash = Math.max(1, parseFloat(els.dash.value));
          var gap = Math.max(1, parseFloat(els.gap.value));
          var tile = dash + gap;
          var r = Math.max(0.5, dash * 0.45);
          var svg =
            '<svg xmlns="http://www.w3.org/2000/svg" width="' +
            tile +
            '" height="' +
            tile +
            '"><rect width="' +
            tile +
            '" height="' +
            tile +
            '" fill="black"/><circle cx="' +
            dash * 0.5 +
            '" cy="' +
            tile * 0.5 +
            '" r="' +
            r +
            '" fill="white"/></svg>';
          if (ghostPattern) {
            ghostPattern.setAttribute(
              "href",
              "data:image/svg+xml," + encodeURIComponent(svg)
            );
          }
          ghostErode.setAttribute(
            "radius",
            String(Math.max(0.1, parseFloat(els.sk.value)))
          );
          if (ghostFlood) {
            ghostFlood.setAttribute("flood-color", els.fg.value);
          }
        }

        function applyVar(key, v) {
          if (key === "zm") root.style.setProperty("--zoom", v);
          else if (key === "bg") root.style.setProperty("--bg", v);
          else if (key === "fg") root.style.setProperty("--fg", v);
          else if (key === "fs") root.style.setProperty("--fs", v);
          else if (key === "sk") root.style.setProperty("--stroke", v);
          if (key === "sk" || key === "dash" || key === "gap" || key === "fg") {
            updateGhostFilter();
          }
        }

        function setValue(key, v, persist) {
          if (key === "zm") {
            v = persist !== false ? ArtboardZoom.write(v) : ArtboardZoom.clamp(v);
          }
          els[key].value = v;
          if (key === "wMin" || key === "wMax") {
            updateWeightUI();
          } else if (vals[key]) {
            vals[key].textContent = fmt(key, v);
          }
          applyVar(key, v);
          if (persist !== false) save();
        }

        function save() {
          var out = {};
          Object.keys(els).forEach(function (k) {
            if (k === "zm") return;
            out[k] = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
          });
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(out));
          } catch (e) {}
        }

        function load() {
          var raw;
          try {
            raw = localStorage.getItem(LS_KEY);
          } catch (e) {
            raw = null;
          }
          var data = DEFAULTS;
          if (raw) {
            try {
              var parsed = JSON.parse(raw);
              data = Object.assign({}, DEFAULTS, parsed);
            } catch (e) {}
          }
          data.zm = ArtboardZoom.resolve(data.zm);
          Object.keys(els).forEach(function (k) {
            setValue(k, data[k], false);
          });
        }

        ArtboardZoom.onChange(function (z) {
          setValue("zm", z, false);
        });

        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
            setValue(k, v);
            if (k === "gh" || k === "wMin" || k === "wMax") {
              buildGhosts();
            }
          });
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) {
            setValue(k, DEFAULTS[k]);
          });
          buildGhosts();
        });

        load();
        buildGhosts();

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(start);
        } else {
          start();
        }

        function start() {
          requestAnimationFrame(function (n) {
            frame(n, n);
          });
        }
      })();
    </script>
  </body>
</html>
