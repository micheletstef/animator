<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>technical outline</title>
    <style>
      @font-face {
        font-family: "IkarusPlusVariable";
        src: url("../fonts/ABCIkarusPlusVariable.ttf") format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }
      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --line: #0078ff;
        --fs: 900;
        --wght: 500;
        --zoom: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: #111; overflow: hidden;
        font-family: "Courier New", Courier, monospace; color: #e9e9e9;
      }
      body {
        display: grid; grid-template-columns: 1fr 280px;
        align-items: center; gap: 24px; padding: 24px;
      }
      .stage-wrap {
        display: flex; align-items: safe center; justify-content: safe center;
        height: 100%; min-width: 0; overflow: auto; overscroll-behavior: contain;
      }
      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative; flex: 0 0 auto;
      }
      .stage {
        position: absolute; top: 0; left: 0;
        width: var(--base); height: var(--base);
        background: var(--bg); overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        transform: scale(var(--zoom)); transform-origin: top left;
      }
      .outline-layer {
        position: absolute; inset: 0; z-index: 1;
        width: 100%; height: 100%; pointer-events: none; overflow: visible;
      }
      .probe {
        position: absolute; left: -9999px; visibility: hidden;
        font-family: "IkarusPlusVariable", system-ui, sans-serif;
        font-size: calc(var(--fs) * 1px); line-height: 1;
        font-variation-settings: "wght" var(--wght), "wdth" 100, "slnt" 0, "CNTR" 0;
      }
      .panel {
        align-self: stretch; max-height: 100%; overflow: auto;
        padding: 16px 18px; background: #1a1a1a;
        border: 1px solid #2a2a2a; border-radius: 8px;
        font-size: 12px; line-height: 1.4;
      }
      .panel h2 {
        margin: 0 0 4px 0; font-size: 12px; font-weight: 400;
        text-transform: lowercase; letter-spacing: 0.04em; color: #9a9a9a;
      }
      .panel .hint { margin: 0 0 14px 0; color: #6a6a6a; font-size: 11px; }
      .panel .group { margin-bottom: 18px; }
      .panel .group-title {
        text-transform: lowercase; color: #6a6a6a;
        margin: 0 0 8px 0; font-size: 11px; letter-spacing: 0.06em;
      }
      .row {
        display: grid; grid-template-columns: 64px 1fr 52px;
        align-items: center; gap: 8px; margin-bottom: 6px;
      }
      .row label { text-transform: lowercase; color: #cfcfcf; }
      .row input[type="range"] { width: 100%; accent-color: #fff; }
      .row input[type="color"] {
        width: 100%; height: 22px; padding: 0;
        border: 1px solid #333; border-radius: 4px;
        background: transparent; cursor: pointer;
      }
      .row input[type="text"] {
        grid-column: 2 / 4; width: 100%; padding: 4px 6px;
        border: 1px solid #333; border-radius: 4px;
        background: #111; color: #e9e9e9; font: inherit;
      }
      .row .val {
        text-align: right; color: #9a9a9a; font-variant-numeric: tabular-nums;
      }
      .panel .actions { display: flex; gap: 8px; margin-top: 4px; }
      .panel button {
        flex: 1; background: transparent; color: #cfcfcf;
        border: 1px solid #333; padding: 6px 8px; font: inherit;
        text-transform: lowercase; cursor: pointer; border-radius: 4px;
      }
      .panel button:hover { border-color: #555; color: #fff; }
    </style>
  </head>
  <body>
    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">

        <div class="stage" id="stage" aria-label="technical outline">
          <svg class="outline-layer" id="outlines" aria-hidden="true"></svg>
          <span class="probe" id="probe">A</span>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />
    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">shift + scroll to zoom · ABCIkarusPlusVariable</p>
      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="ln">line</label>
          <input id="ln" type="color" value="#0078ff" />
          <span class="val" id="lnVal">#0078ff</span>
        </div>
      </div>
      <div class="group">
        <p class="group-title">type</p>
        <div class="row">
          <label for="ch">char</label>
          <input id="ch" type="text" value="A" maxlength="8" spellcheck="false" autocomplete="off" />
          <span class="val"></span>
        </div>
        <div class="row">
          <label for="fs">size</label>
          <input id="fs" type="range" min="200" max="1600" step="1" value="900" />
          <span class="val" id="fsVal">900px</span>
        </div>
        <div class="row">
          <label for="wght">wght</label>
          <input id="wght" type="range" min="100" max="1000" step="1" value="500" />
          <span class="val" id="wghtVal">500</span>
        </div>
        <div class="row">
          <label for="os">scale</label>
          <input id="os" type="range" min="25" max="200" step="1" value="100" />
          <span class="val" id="osVal">1.00×</span>
        </div>
      </div>
      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
      </div>
    </aside>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@2.0.0/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/martinez-polygon-clipping@0.7.3/dist/martinez.min.js"></script>
    <script src="glyph-outlines.js"></script>
    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var outlineSvg = document.getElementById("outlines");
        var stage = document.getElementById("stage");
        var probe = document.getElementById("probe");
        var FONT_URL = "../fonts/ABCIkarusPlusVariable.ttf";
        var root = document.documentElement;
        function getChar() {
          var v = els.ch ? els.ch.value : "";
          if (!v) return DEFAULTS.ch;
          return Array.from(v)[0];
        }
        function applyChar() { probe.textContent = getChar(); }
        function outlineScale() { return parseFloat(els.os.value) / 100; }
        function syncOutlines() {
          if (!window.GlyphOutlines) return;
          GlyphOutlines.sync(outlineSvg, stage, [{
            el: probe, char: getChar(),
            variation: { wght: parseFloat(els.wght.value) }
          }], {
            fontUrl: FONT_URL, root: root,
            color: els.ln.value, outlineScale: outlineScale()
          });
        }
        var LS_KEY = "technical-outline:v1";
        var DEFAULTS = { zm: 1, bg: "#ffffff", ln: "#0078ff", ch: "A", fs: 900, wght: 500, os: 100 };
        var COLOR_KEYS = { bg: 1, ln: 1 };
        var STRING_KEYS = { ch: 1 };
        var els = {
          zm: document.getElementById("zm"),
          bg: document.getElementById("bg"),
          ln: document.getElementById("ln"),
          ch: document.getElementById("ch"),
          fs: document.getElementById("fs"),
          wght: document.getElementById("wght"),
          os: document.getElementById("os")
        };
        var vals = {
          bg: document.getElementById("bgVal"),
          ln: document.getElementById("lnVal"),
          fs: document.getElementById("fsVal"),
          wght: document.getElementById("wghtVal"),
          os: document.getElementById("osVal")
        };
        function fmt(key, v) {
          if (key === "bg" || key === "ln") return String(v).toLowerCase();
          if (key === "zm") return Math.round(Number(v) * 100) + "%";
          if (key === "fs") return Math.round(Number(v)) + "px";
          if (key === "wght") return Math.round(Number(v)) + "";
          if (key === "os") return (Number(v) / 100).toFixed(2) + "×";
          return String(v);
        }
        function applyVar(key, v) {
          if (key === "zm") root.style.setProperty("--zoom", v);
          else if (key === "bg") root.style.setProperty("--bg", v);
          else if (key === "ln") root.style.setProperty("--line", v);
          else if (key === "fs") root.style.setProperty("--fs", v);
          else if (key === "wght") root.style.setProperty("--wght", v);
        }
        function setValue(key, v, persist) {
          if (key === "zm") v = persist !== false ? ArtboardZoom.write(v) : ArtboardZoom.clamp(v);
          els[key].value = v;
          if (vals[key]) vals[key].textContent = fmt(key, v);
          if (key === "ch") applyChar();
          applyVar(key, v);
          if (key !== "zm") syncOutlines();
          if (persist !== false) save();
        }
        function save() {
          var out = {};
          Object.keys(els).forEach(function (k) {
            if (k === "zm") return;
            out[k] = COLOR_KEYS[k] || STRING_KEYS[k] ? els[k].value : parseFloat(els[k].value);
          });
          try { localStorage.setItem(LS_KEY, JSON.stringify(out)); } catch (e) {}
        }
        function load() {
          var raw = null;
          try { raw = localStorage.getItem(LS_KEY); } catch (e) {}
          var data = DEFAULTS;
          if (raw) { try { data = Object.assign({}, DEFAULTS, JSON.parse(raw)); } catch (e) {} }
          data.zm = ArtboardZoom.resolve(data.zm);
          Object.keys(els).forEach(function (k) { setValue(k, data[k], false); });
        }
        ArtboardZoom.onChange(function (z) { setValue("zm", z, false); syncOutlines(); });
        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] || STRING_KEYS[k] ? els[k].value : parseFloat(els[k].value);
            setValue(k, v);
          });
        });
        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) { setValue(k, DEFAULTS[k]); });
        });
        load(); applyChar();
        if (document.fonts && document.fonts.ready) document.fonts.ready.then(syncOutlines);
        else syncOutlines();
      })();
    </script>
  </body>
</html>
