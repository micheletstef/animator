<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPF 50+ → 8</title>
    <style>
      @font-face {
        font-family: "IkarusVariable";
        src: url("../fonts/ABCIkarusVariable.ttf") format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --fg: #000000;
        --pad-t: 40;
        --pad-r: 40;
        --pad-b: 40;
        --pad-l: 40;
        --fs: 520;
        --lh: 0.86;
        --tracking: -0.035;
        --zoom: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        color: var(--fg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        font-family: "IkarusVariable", system-ui, sans-serif;
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .lockup {
        position: absolute;
        top: calc(var(--pad-t) * 1px);
        right: calc(var(--pad-r) * 1px);
        bottom: calc(var(--pad-b) * 1px);
        left: calc(var(--pad-l) * 1px);
        line-height: var(--lh);
        letter-spacing: calc(var(--tracking) * 1em);
        font-variation-settings: "wght" 1000;
      }

      .line,
      .num {
        display: block;
        font-size: calc(var(--fs) * 1px);
        font-variation-settings: inherit;
        white-space: nowrap;
        letter-spacing: inherit;
      }

      .stage .num .plus {
        display: inline-block;
      }

      .stage .num.no-plus .plus {
        opacity: 0;
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .row input[type="color"]::-webkit-color-swatch {
        border: 0;
        border-radius: 2px;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }

      .row.row-wide-val {
        grid-template-columns: 64px 1fr 100px;
      }

      .dual-range {
        position: relative;
        width: 100%;
        height: 22px;
      }

      .dual-track {
        position: absolute;
        left: 7px;
        right: 7px;
        top: 50%;
        height: 3px;
        transform: translateY(-50%);
        background: #2a2a2a;
        border-radius: 2px;
        pointer-events: none;
      }

      .dual-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        background: #fff;
        border-radius: 2px;
      }

      .dual-range input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .dual-range input[type="range"]:focus {
        outline: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-moz-range-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
        margin-top: 0;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        pointer-events: auto;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-webkit-slider-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-moz-range-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .panel .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .panel button {
        flex: 1;
        background: transparent;
        color: #cfcfcf;
        border: 1px solid #333;
        padding: 6px 8px;
        font: inherit;
        text-transform: lowercase;
        cursor: pointer;
        border-radius: 4px;
      }

      .panel button:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">
        <div class="stage" id="stage" aria-label="SPF animation">
          <div class="lockup" id="lockup">
            <span class="line">SPF</span>
            <span class="num" id="num"><span class="digits" id="digits">50</span><span class="plus" id="plus">+</span></span>
          </div>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />

    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">shift + scroll to zoom the artboard</p>

      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="fg">text</label>
          <input id="fg" type="color" value="#000000" />
          <span class="val" id="fgVal">#000000</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">type</p>
        <div class="row">
          <label for="fs">size</label>
          <input id="fs" type="range" min="40" max="2000" step="1" value="520" />
          <span class="val" id="fsVal">520px</span>
        </div>
        <div class="row">
          <label for="lh">leading</label>
          <input id="lh" type="range" min="0.6" max="1.6" step="0.01" value="0.86" />
          <span class="val" id="lhVal">0.86</span>
        </div>
        <div class="row row-wide-val">
          <label for="trMax">kerning</label>
          <div class="dual-range" id="kernDual">
            <div class="dual-track"><div class="dual-fill" id="kernFill"></div></div>
            <input
              id="trMax"
              class="is-start"
              type="range"
              min="-5"
              max="8"
              step="0.001"
              value="-0.035"
              aria-label="Kerning start"
            />
            <input
              id="trMin"
              class="is-end"
              type="range"
              min="-5"
              max="8"
              step="0.001"
              value="-0.12"
              aria-label="Kerning end"
            />
          </div>
          <span class="val" id="kernVal">-35 / -120</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">margins</p>
        <div class="row">
          <label for="pv">vertical</label>
          <input id="pv" type="range" min="0" max="600" step="1" value="40" />
          <span class="val" id="pvVal">40px</span>
        </div>
        <div class="row">
          <label for="ph">horizontal</label>
          <input id="ph" type="range" min="0" max="600" step="1" value="40" />
          <span class="val" id="phVal">40px</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
        <button type="button" id="copyBtn">copy css</button>
      </div>
    </aside>

    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var lockup = document.getElementById("lockup");
        var num = document.getElementById("num");
        var digits = document.getElementById("digits");

        var START = 50;
        var END = 8;
        var W_MAX = 1000;
        var W_MIN = 200;

        var HOLD_START_MS = 600;
        var DOWN_MS = 3200;
        var HOLD_BOTTOM_MS = 700;
        var UP_MS = 3200;
        var HOLD_END_MS = 600;
        var TOTAL_MS =
          HOLD_START_MS + DOWN_MS + HOLD_BOTTOM_MS + UP_MS + HOLD_END_MS;

        function easeInOutCubic(t) {
          return t < 0.5
            ? 4 * t * t * t
            : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function frame(now, t0) {
          var elapsed = (now - t0) % TOTAL_MS;
          var p;

          if (elapsed < HOLD_START_MS) {
            p = 0;
          } else if (elapsed < HOLD_START_MS + DOWN_MS) {
            p = (elapsed - HOLD_START_MS) / DOWN_MS;
          } else if (elapsed < HOLD_START_MS + DOWN_MS + HOLD_BOTTOM_MS) {
            p = 1;
          } else if (
            elapsed <
            HOLD_START_MS + DOWN_MS + HOLD_BOTTOM_MS + UP_MS
          ) {
            p =
              1 -
              (elapsed - HOLD_START_MS - DOWN_MS - HOLD_BOTTOM_MS) / UP_MS;
          } else {
            p = 0;
          }

          var eased = easeInOutCubic(p);
          var value = Math.round(START - (START - END) * eased);
          var weight = Math.round(W_MAX - (W_MAX - W_MIN) * eased);
          var trMaxV = parseFloat(els.trMax.value);
          var trMinV = parseFloat(els.trMin.value);
          var tracking = trMaxV + (trMinV - trMaxV) * eased;

          if (digits.textContent !== String(value)) {
            digits.textContent = String(value);
          }

          if (p > 0.001) {
            num.classList.add("no-plus");
          } else {
            num.classList.remove("no-plus");
          }

          lockup.style.fontVariationSettings = '"wght" ' + weight;
          root.style.setProperty("--tracking", tracking);

          requestAnimationFrame(function (n) {
            frame(n, t0);
          });
        }

        var LS_KEY = "spf-anim:settings:v1";
        var root = document.documentElement;

        var DEFAULTS = {
          zm: 1,
          bg: "#ffffff",
          fg: "#000000",
          fs: 520,
          lh: 0.86,
          trMax: -0.035,
          trMin: -0.12,
          pv: 40,
          ph: 40,
        };

        var COLOR_KEYS = { bg: 1, fg: 1 };

        var els = {
          zm: document.getElementById("zm"),
          bg: document.getElementById("bg"),
          fg: document.getElementById("fg"),
          fs: document.getElementById("fs"),
          lh: document.getElementById("lh"),
          trMax: document.getElementById("trMax"),
          trMin: document.getElementById("trMin"),
          pv: document.getElementById("pv"),
          ph: document.getElementById("ph"),
        };
        var vals = {
          bg: document.getElementById("bgVal"),
          fg: document.getElementById("fgVal"),
          fs: document.getElementById("fsVal"),
          lh: document.getElementById("lhVal"),
          pv: document.getElementById("pvVal"),
          ph: document.getElementById("phVal"),
        };

        var kernVal = document.getElementById("kernVal");
        var kernFill = document.getElementById("kernFill");

        function fmt(key, v) {
          if (key === "bg" || key === "fg") return String(v).toLowerCase();
          if (key === "zm") return Math.round(Number(v) * 100) + "%";
          if (key === "fs") return Math.round(Number(v)) + "px";
          if (key === "lh") return Number(v).toFixed(2);
          return Math.round(Number(v)) + "px";
        }

        function updateKernUI() {
          var a = parseFloat(els.trMax.value);
          var b = parseFloat(els.trMin.value);
          var min = parseFloat(els.trMax.min);
          var max = parseFloat(els.trMax.max);
          var lo = Math.min(a, b);
          var hi = Math.max(a, b);
          var loPct = ((lo - min) / (max - min)) * 100;
          var hiPct = ((hi - min) / (max - min)) * 100;
          kernFill.style.left = loPct + "%";
          kernFill.style.width = Math.max(0, hiPct - loPct) + "%";
          kernVal.textContent =
            Math.round(a * 1000) + " / " + Math.round(b * 1000);
        }

        function applyVar(key, v) {
          if (key === "zm") root.style.setProperty("--zoom", v);
          else if (key === "bg") root.style.setProperty("--bg", v);
          else if (key === "fg") root.style.setProperty("--fg", v);
          else if (key === "fs") root.style.setProperty("--fs", v);
          else if (key === "lh") root.style.setProperty("--lh", v);
          else if (key === "trMax" || key === "trMin") {
            // tracking is animated in frame(); endpoints have no direct CSS var
          } else if (key === "pv") {
            root.style.setProperty("--pad-t", v);
            root.style.setProperty("--pad-b", v);
          } else if (key === "ph") {
            root.style.setProperty("--pad-l", v);
            root.style.setProperty("--pad-r", v);
          }
        }

        function setValue(key, v, persist) {
          if (key === "zm") {
            v = persist !== false ? ArtboardZoom.write(v) : ArtboardZoom.clamp(v);
          }
          els[key].value = v;
          if (key === "trMax" || key === "trMin") {
            updateKernUI();
          } else if (vals[key]) {
            vals[key].textContent = fmt(key, v);
          }
          applyVar(key, v);
          if (persist !== false) save();
        }

        function save() {
          var out = {};
          Object.keys(els).forEach(function (k) {
            if (k === "zm") return;
            out[k] = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
          });
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(out));
          } catch (e) {}
        }

        function load() {
          var raw;
          try {
            raw = localStorage.getItem(LS_KEY);
          } catch (e) {
            raw = null;
          }
          var data = DEFAULTS;
          if (raw) {
            try {
              var parsed = JSON.parse(raw);
              data = Object.assign({}, DEFAULTS, parsed);
            } catch (e) {}
          }
          data.zm = ArtboardZoom.resolve(data.zm);
          Object.keys(els).forEach(function (k) {
            setValue(k, data[k], false);
          });
        }

        ArtboardZoom.onChange(function (z) {
          setValue("zm", z, false);
        });

        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
            setValue(k, v);
          });
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) {
            setValue(k, DEFAULTS[k]);
          });
        });

        var stageWrap = document.getElementById("stageWrap");
        window.addEventListener(
          "wheel",
          function (e) {
            if (!e.shiftKey) return;
            e.preventDefault();
            var current = parseFloat(els.zm.value) || 1;
            var factor = Math.exp(-e.deltaY * 0.0015);
            var next = Math.max(0.1, Math.min(4, current * factor));
            if (next === current) return;
            var rect = stageWrap.getBoundingClientRect();
            var anchorX = Math.max(rect.left, Math.min(rect.right, e.clientX));
            var anchorY = Math.max(rect.top, Math.min(rect.bottom, e.clientY));
            var contentX = anchorX - rect.left + stageWrap.scrollLeft;
            var contentY = anchorY - rect.top + stageWrap.scrollTop;
            var ratio = next / current;
            setValue("zm", next);
            stageWrap.scrollLeft = contentX * ratio - (anchorX - rect.left);
            stageWrap.scrollTop = contentY * ratio - (anchorY - rect.top);
          },
          { passive: false }
        );

        document.getElementById("copyBtn").addEventListener("click", function (e) {
          var btn = e.currentTarget;
          var css =
            ":root{\n" +
            "  --bg: " + els.bg.value + ";\n" +
            "  --fg: " + els.fg.value + ";\n" +
            "  --zoom: " + els.zm.value + ";\n" +
            "  --fs: " + els.fs.value + ";\n" +
            "  --lh: " + els.lh.value + ";\n" +
            "  --tracking-start: " + els.trMax.value + ";\n" +
            "  --tracking-end: " + els.trMin.value + ";\n" +
            "  --pad-t: " + els.pv.value + ";\n" +
            "  --pad-r: " + els.ph.value + ";\n" +
            "  --pad-b: " + els.pv.value + ";\n" +
            "  --pad-l: " + els.ph.value + ";\n" +
            "}";
          var done = function () {
            var prev = btn.textContent;
            btn.textContent = "copied";
            setTimeout(function () {
              btn.textContent = prev;
            }, 900);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(css).then(done, done);
          } else {
            done();
          }
        });

        load();

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(start);
        } else {
          start();
        }

        function start() {
          requestAnimationFrame(function (n) {
            frame(n, n);
          });
        }
      })();
    </script>
  </body>
</html>
