<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>names marquee</title>
    <style>
      @font-face {
        font-family: "IkarusPlusVariable";
        src: url("../fonts/ABCIkarusPlusVariable.ttf")
          format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --fg: #f5d100;
        --pad-t: 0;
        --pad-r: 0;
        --pad-b: 0;
        --pad-l: 0;
        --zoom: 1;
        --gamma: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        color: var(--fg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        font-family: "IkarusPlusVariable", system-ui, sans-serif;
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .marquee {
        position: absolute;
        top: calc(var(--pad-t) * 1px);
        right: calc(var(--pad-r) * 1px);
        bottom: calc(var(--pad-b) * 1px);
        left: calc(var(--pad-l) * 1px);
        overflow: hidden;
        will-change: transform;
      }

      .track {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        will-change: transform;
      }

      .line {
        position: absolute;
        left: 0;
        right: 0;
        box-sizing: border-box;
        font-size: 220px;
        white-space: nowrap;
        text-align: left;
        font-variation-settings: "wght" 1000;
        overflow: visible;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .row input[type="color"]::-webkit-color-swatch {
        border: 0;
        border-radius: 2px;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }

      .axis-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .axis-row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .dual-range {
        position: relative;
        width: 100%;
        height: 40px;
        min-width: 0;
      }

      .dual-val {
        position: absolute;
        top: 0;
        transform: translateX(-50%);
        font-size: 10px;
        line-height: 1.2;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        z-index: 2;
        white-space: nowrap;
      }

      .dual-track {
        position: absolute;
        left: 7px;
        right: 7px;
        top: 24px;
        height: 3px;
        transform: translateY(-50%);
        background: #2a2a2a;
        border-radius: 2px;
        pointer-events: none;
      }

      .dual-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        background: #fff;
        border-radius: 2px;
      }

      .dual-range input[type="range"] {
        position: absolute;
        left: 0;
        right: 0;
        top: 14px;
        width: 100%;
        height: 22px;
        margin: 0;
        background: transparent;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .dual-range input[type="range"]:focus {
        outline: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track,
      .dual-range input[type="range"]::-moz-range-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
        margin-top: 0;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        pointer-events: auto;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-webkit-slider-thumb,
      .dual-range input.is-end[type="range"]::-moz-range-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .panel .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .panel button {
        flex: 1;
        background: transparent;
        color: #cfcfcf;
        border: 1px solid #333;
        padding: 6px 8px;
        font: inherit;
        text-transform: lowercase;
        cursor: pointer;
        border-radius: 4px;
      }

      .panel button:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">
        <div class="stage" id="stage" aria-label="names marquee">
          <div class="marquee" id="marquee">
            <div class="track" id="track"></div>
          </div>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />

    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">shift + scroll to zoom · dual thumbs = top → bottom · curve = easing</p>

      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="fg">text</label>
          <input id="fg" type="color" value="#f5d100" />
          <span class="val" id="fgVal">#f5d100</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">gradient</p>
        <div class="axis-row">
          <label for="s0">size</label>
          <div class="dual-range" id="sDual">
            <span class="dual-val" id="s0Val">240px</span>
            <span class="dual-val" id="s1Val">120px</span>
            <div class="dual-track"><div class="dual-fill" id="sFill"></div></div>
            <input id="s0" class="is-start" type="range" min="40" max="800" step="1" value="240" aria-label="size start" />
            <input id="s1" class="is-end" type="range" min="40" max="800" step="1" value="120" aria-label="size end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="k0">kern</label>
          <div class="dual-range" id="kDual">
            <span class="dual-val" id="k0Val">-20</span>
            <span class="dual-val" id="k1Val">20</span>
            <div class="dual-track"><div class="dual-fill" id="kFill"></div></div>
            <input id="k0" class="is-start" type="range" min="-0.5" max="0.5" step="0.001" value="-0.02" aria-label="kern start" />
            <input id="k1" class="is-end" type="range" min="-0.5" max="0.5" step="0.001" value="0.02" aria-label="kern end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="lh0">leading</label>
          <div class="dual-range" id="lhDual">
            <span class="dual-val" id="lh0Val">0.25</span>
            <span class="dual-val" id="lh1Val">0.92</span>
            <div class="dual-track"><div class="dual-fill" id="lhFill"></div></div>
            <input id="lh0" class="is-start" type="range" min="-0.3" max="1.6" step="0.01" value="0.25" aria-label="leading bottom" />
            <input id="lh1" class="is-end" type="range" min="-0.3" max="1.6" step="0.01" value="0.92" aria-label="leading top" />
          </div>
        </div>
      </div>

      <div class="group">
        <p class="group-title">variables</p>
        <div class="axis-row">
          <label for="wMin">wght</label>
          <div class="dual-range" id="wDual">
            <span class="dual-val" id="wMinVal">1000</span>
            <span class="dual-val" id="wMaxVal">500</span>
            <div class="dual-track"><div class="dual-fill" id="wFill"></div></div>
            <input id="wMin" class="is-start" type="range" min="200" max="1000" step="1" value="1000" aria-label="wght start" />
            <input id="wMax" class="is-end" type="range" min="200" max="1000" step="1" value="500" aria-label="wght end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="cMin">cntr</label>
          <div class="dual-range" id="cDual">
            <span class="dual-val" id="cMinVal">0.0</span>
            <span class="dual-val" id="cMaxVal">0.0</span>
            <div class="dual-track"><div class="dual-fill" id="cFill"></div></div>
            <input id="cMin" class="is-start" type="range" min="0" max="100" step="0.1" value="0" aria-label="CNTR start" />
            <input id="cMax" class="is-end" type="range" min="0" max="100" step="0.1" value="0" aria-label="CNTR end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="dMin">wdth</label>
          <div class="dual-range" id="dDual">
            <span class="dual-val" id="dMinVal">100</span>
            <span class="dual-val" id="dMaxVal">100</span>
            <div class="dual-track"><div class="dual-fill" id="dFill"></div></div>
            <input id="dMin" class="is-start" type="range" min="65" max="130" step="1" value="100" aria-label="wdth start" />
            <input id="dMax" class="is-end" type="range" min="65" max="130" step="1" value="100" aria-label="wdth end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="slMin">slnt</label>
          <div class="dual-range" id="slDual">
            <span class="dual-val" id="slMinVal">0</span>
            <span class="dual-val" id="slMaxVal">0</span>
            <div class="dual-track"><div class="dual-fill" id="slFill"></div></div>
            <input id="slMin" class="is-start" type="range" min="-12" max="0" step="0.25" value="0" aria-label="slnt start" />
            <input id="slMax" class="is-end" type="range" min="-12" max="0" step="0.25" value="0" aria-label="slnt end" />
          </div>
        </div>
      </div>

      <div class="group">
        <p class="group-title">curve</p>
        <div class="row">
          <label for="gm">curve</label>
          <input id="gm" type="range" min="0.3" max="3" step="0.01" value="1" />
          <span class="val" id="gmVal">1.00</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">motion</p>
        <div class="row">
          <label for="sp">speed</label>
          <input id="sp" type="range" min="5" max="400" step="1" value="80" />
          <span class="val" id="spVal">80</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">margins</p>
        <div class="row">
          <label for="pv">vertical</label>
          <input id="pv" type="range" min="0" max="600" step="1" value="0" />
          <span class="val" id="pvVal">0px</span>
        </div>
        <div class="row">
          <label for="pl">left</label>
          <input id="pl" type="range" min="0" max="600" step="1" value="0" />
          <span class="val" id="plVal">0px</span>
        </div>
        <div class="row">
          <label for="pr">right</label>
          <input id="pr" type="range" min="0" max="600" step="1" value="0" />
          <span class="val" id="prVal">0px</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
      </div>
    </aside>

    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var NAMES = [
          "Ikarus",
          "Dädalus",
          "Minos",
          "Ariadne",
          "Theseus",
          "Poseidon",
          "Helios",
          "Kreta",
          "Labyrinth",
          "Samos",
        ];

        var marquee = document.getElementById("marquee");
        var track = document.getElementById("track");

        var lineEls = [];
        function buildLines() {
          track.innerHTML = "";
          lineEls = [];
          for (var copy = 0; copy < 2; copy++) {
            for (var i = 0; i < NAMES.length; i++) {
              var el = document.createElement("span");
              el.className = "line";
              el.textContent = NAMES[i];
              track.appendChild(el);
              lineEls.push(el);
            }
          }
        }
        buildLines();

        var slotTops = [];
        var slotHeights = [];

        var AXES = {
          CNTR: { min: 0, max: 100, step: 0.1, default: 0 },
          wght: { min: 200, max: 1000, step: 1, default: 500 },
          wdth: { min: 65, max: 130, step: 1, default: 100 },
          slnt: { min: -12, max: 0, step: 0.25, default: 0 },
        };

        var DUAL_GRAD = [
          {
            minKey: "s0",
            maxKey: "s1",
            fill: "sFill",
            minVal: "s0Val",
            maxVal: "s1Val",
            fmt: function (v) {
              return Math.round(Number(v)) + "px";
            },
          },
          {
            minKey: "k0",
            maxKey: "k1",
            fill: "kFill",
            minVal: "k0Val",
            maxVal: "k1Val",
            fmt: function (v) {
              return Math.round(Number(v) * 1000) + "";
            },
          },
          {
            minKey: "lh0",
            maxKey: "lh1",
            fill: "lhFill",
            minVal: "lh0Val",
            maxVal: "lh1Val",
            fmt: function (v) {
              return Number(v).toFixed(2);
            },
          },
        ];

        var DUAL_AXES = [
          {
            tag: "wght",
            minKey: "wMin",
            maxKey: "wMax",
            fill: "wFill",
            minVal: "wMinVal",
            maxVal: "wMaxVal",
          },
          {
            tag: "CNTR",
            minKey: "cMin",
            maxKey: "cMax",
            fill: "cFill",
            minVal: "cMinVal",
            maxVal: "cMaxVal",
          },
          {
            tag: "wdth",
            minKey: "dMin",
            maxKey: "dMax",
            fill: "dFill",
            minVal: "dMinVal",
            maxVal: "dMaxVal",
          },
          {
            tag: "slnt",
            minKey: "slMin",
            maxKey: "slMax",
            fill: "slFill",
            minVal: "slMinVal",
            maxVal: "slMaxVal",
          },
        ];

        function clampAxis(tag, v) {
          var a = AXES[tag];
          return Math.max(a.min, Math.min(a.max, Number(v)));
        }

        function fmtAxis(tag, v) {
          if (tag === "CNTR") return (Math.round(v * 10) / 10).toFixed(1);
          if (tag === "wght" || tag === "wdth") return Math.round(v).toString();
          return String(v);
        }

        // Slider labels only — live text uses fmtAxisLive for sub-step precision.
        function fmtAxisLive(tag, v) {
          if (tag === "CNTR") return (Math.round(v * 10) / 10).toFixed(1);
          if (tag === "wght" || tag === "wdth")
            return (Math.round(v * 10) / 10).toFixed(1);
          if (tag === "slnt") return (Math.round(v * 4) / 4).toFixed(2);
          return String(v);
        }

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // Spatial position 0→1 mapped through ease, then optional curve gamma.
        function gradientT(t, gamma) {
          if (t <= 0) return 0;
          if (t >= 1) return 1;
          var eased = easeInOutCubic(t);
          return gamma === 1 ? eased : Math.pow(eased, gamma);
        }

        function lerpPair(a, b, tt) {
          return a + (b - a) * tt;
        }

        // lh0 = start knob = bottom of artboard; lh1 = end knob = top.
        function leadingAt(p, tt) {
          return lerpPair(p.lh1, p.lh0, tt);
        }

        function layoutParams() {
          return {
            s0: parseFloat(els.s0.value),
            s1: parseFloat(els.s1.value),
            k0: parseFloat(els.k0.value),
            k1: parseFloat(els.k1.value),
            wMin: parseFloat(els.wMin.value),
            wMax: parseFloat(els.wMax.value),
            cMin: parseFloat(els.cMin.value),
            cMax: parseFloat(els.cMax.value),
            dMin: parseFloat(els.dMin.value),
            dMax: parseFloat(els.dMax.value),
            slMin: parseFloat(els.slMin.value),
            slMax: parseFloat(els.slMax.value),
            lh0: parseFloat(els.lh0.value),
            lh1: parseFloat(els.lh1.value),
            gamma: parseFloat(els.gm.value),
          };
        }

        function fvarSettings(p, tt) {
          return (
            '"wght" ' +
            fmtAxisLive("wght", lerpPair(p.wMin, p.wMax, tt)) +
            ', "wdth" ' +
            fmtAxisLive("wdth", lerpPair(p.dMin, p.dMax, tt)) +
            ', "slnt" ' +
            fmtAxisLive("slnt", lerpPair(p.slMin, p.slMax, tt)) +
            ', "CNTR" ' +
            fmtAxisLive("CNTR", lerpPair(p.cMin, p.cMax, tt))
          );
        }

        function applyTypography(node, t, p) {
          var tt = gradientT(t, p.gamma);
          node.style.fontVariationSettings = fvarSettings(p, tt);
          var k = lerpPair(p.k0, p.k1, tt);
          node.style.letterSpacing = k.toFixed(4) + "em";
          var s = lerpPair(p.s0, p.s1, tt);
          node.style.fontSize = s.toFixed(2) + "px";
          node.style.lineHeight = leadingAt(p, tt).toFixed(4);
          node.style.opacity = "1";
        }

        function lineBoxHeight(node, p, t) {
          applyTypography(node, t, p);
          var tt = gradientT(t, p.gamma);
          var s = lerpPair(p.s0, p.s1, tt);
          var lh = leadingAt(p, tt);
          return Math.ceil(
            Math.max(
              node.offsetHeight,
              node.scrollHeight,
              s * Math.max(lh, 0.2)
            )
          );
        }

        // Stack lines by live size × leading; duplicate mirrors first cycle for seamless wrap.
        function layoutStack(p, scrollOffset) {
          var marqueeH = marquee.clientHeight || 1;
          var y = 0;

          slotTops = [];
          slotHeights = [];

          for (var i = 0; i < NAMES.length; i++) {
            var node = lineEls[i];
            var t = 0;
            var h = 48;
            for (var iter = 0; iter < 6; iter++) {
              var yMid = y - scrollOffset + h * 0.5;
              t =
                marqueeH > 0
                  ? Math.min(1, Math.max(0, yMid / marqueeH))
                  : 0;
              h = lineBoxHeight(node, p, t);
            }
            applyTypography(node, t, p);
            h = lineBoxHeight(node, p, t);
            node.style.top = y + "px";
            node.style.height = h + "px";
            node.style.minHeight = "0";
            slotTops[i] = y;
            slotHeights[i] = h;
            y += h;
          }

          loopHeight = y;

          for (var j = 0; j < NAMES.length; j++) {
            var dup = j + NAMES.length;
            slotTops[dup] = slotTops[j] + loopHeight;
            slotHeights[dup] = slotHeights[j];
            lineEls[dup].style.top = slotTops[dup] + "px";
            lineEls[dup].style.height = slotHeights[dup] + "px";
            lineEls[dup].style.minHeight = "0";
            var yMid = slotTops[dup] - scrollOffset + slotHeights[dup] * 0.5;
            var tDup =
              marqueeH > 0
                ? Math.min(1, Math.max(0, yMid / marqueeH))
                : 0;
            applyTypography(lineEls[dup], tDup, p);
          }

          track.style.height = loopHeight * 2 + "px";
        }

        function computeLayout() {
          var prevLoop = loopHeight;
          layoutStack(layoutParams(), offset);
          if (loopHeight > 0) {
            if (prevLoop > 0) {
              offset = (offset / prevLoop) * loopHeight;
            }
            while (offset >= loopHeight) offset -= loopHeight;
          }
        }

        // Typography + live line-height box; tops stay fixed from computeLayout.
        function updateLeadingLayout(p) {
          var marqueeH = marquee.clientHeight || 1;
          for (var j = 0; j < lineEls.length; j++) {
            var yMid = slotTops[j] - offset + slotHeights[j] * 0.5;
            var t =
              marqueeH > 0
                ? Math.min(1, Math.max(0, yMid / marqueeH))
                : 0;
            applyTypography(lineEls[j], t, p);
            var h = lineBoxHeight(lineEls[j], p, t);
            lineEls[j].style.height = h + "px";
          }
        }

        var offset = 0;
        var lastNow = 0;
        var loopHeight = 0;

        function frame(now) {
          if (!lastNow) lastNow = now;
          var dt = (now - lastNow) / 1000;
          lastNow = now;

          var speed = parseFloat(els.sp.value);
          offset += speed * dt;
          while (loopHeight > 0 && offset >= loopHeight) {
            offset -= loopHeight;
          }
          track.style.transform = "translate3d(0," + -offset + "px,0)";

          updateLeadingLayout(layoutParams());

          requestAnimationFrame(frame);
        }

        var LS_KEY = "names-marquee:settings:v2";
        var LS_KEY_V1 = "names-marquee:settings:v1";
        var root = document.documentElement;

        var DEFAULTS = {
          zm: 1,
          bg: "#ffffff",
          fg: "#f5d100",
          s0: 240,
          s1: 120,
          lh0: 0.25,
          lh1: 0.92,
          k0: -0.02,
          k1: 0.02,
          wMin: 1000,
          wMax: 500,
          cMin: 0,
          cMax: 0,
          dMin: 100,
          dMax: 100,
          slMin: 0,
          slMax: 0,
          gm: 1,
          sp: 80,
          pv: 0,
          pl: 0,
          pr: 0,
        };

        var COLOR_KEYS = { bg: 1, fg: 1 };

        var LAYOUT_KEYS = {
          s0: 1,
          s1: 1,
          k0: 1,
          k1: 1,
          wMin: 1,
          wMax: 1,
          cMin: 1,
          cMax: 1,
          dMin: 1,
          dMax: 1,
          slMin: 1,
          slMax: 1,
          lh0: 1,
          lh1: 1,
          gm: 1,
        };

        var els = {
          zm: document.getElementById("zm"),
          bg: document.getElementById("bg"),
          fg: document.getElementById("fg"),
          s0: document.getElementById("s0"),
          s1: document.getElementById("s1"),
          k0: document.getElementById("k0"),
          k1: document.getElementById("k1"),
          wMin: document.getElementById("wMin"),
          wMax: document.getElementById("wMax"),
          cMin: document.getElementById("cMin"),
          cMax: document.getElementById("cMax"),
          dMin: document.getElementById("dMin"),
          dMax: document.getElementById("dMax"),
          slMin: document.getElementById("slMin"),
          slMax: document.getElementById("slMax"),
          lh0: document.getElementById("lh0"),
          lh1: document.getElementById("lh1"),
          gm: document.getElementById("gm"),
          sp: document.getElementById("sp"),
          pv: document.getElementById("pv"),
          pl: document.getElementById("pl"),
          pr: document.getElementById("pr"),
        };
        var vals = {
          bg: document.getElementById("bgVal"),
          fg: document.getElementById("fgVal"),
          gm: document.getElementById("gmVal"),
          sp: document.getElementById("spVal"),
          pv: document.getElementById("pvVal"),
          pl: document.getElementById("plVal"),
          pr: document.getElementById("prVal"),
        };

        function dualGradSpecForKey(key) {
          for (var i = 0; i < DUAL_GRAD.length; i++) {
            if (DUAL_GRAD[i].minKey === key || DUAL_GRAD[i].maxKey === key)
              return DUAL_GRAD[i];
          }
          return null;
        }

        function dualAxisSpecForKey(key) {
          for (var i = 0; i < DUAL_AXES.length; i++) {
            if (DUAL_AXES[i].minKey === key || DUAL_AXES[i].maxKey === key)
              return DUAL_AXES[i];
          }
          return null;
        }

        function thumbPct(el) {
          var min = parseFloat(el.min);
          var max = parseFloat(el.max);
          return ((parseFloat(el.value) - min) / (max - min)) * 100;
        }

        function updateDualGradUI(spec) {
          var minEl = els[spec.minKey];
          var maxEl = els[spec.maxKey];
          var fill = document.getElementById(spec.fill);
          var minValEl = document.getElementById(spec.minVal);
          var maxValEl = document.getElementById(spec.maxVal);
          var a = parseFloat(minEl.value);
          var b = parseFloat(maxEl.value);
          var min = parseFloat(minEl.min);
          var max = parseFloat(maxEl.max);
          var lo = Math.min(a, b);
          var hi = Math.max(a, b);
          var loPct = ((lo - min) / (max - min)) * 100;
          var hiPct = ((hi - min) / (max - min)) * 100;
          fill.style.left = loPct + "%";
          fill.style.width = Math.max(0, hiPct - loPct) + "%";
          minValEl.textContent = spec.fmt(a);
          maxValEl.textContent = spec.fmt(b);
          minValEl.style.left = thumbPct(minEl) + "%";
          maxValEl.style.left = thumbPct(maxEl) + "%";
        }

        function updateDualAxisUI(spec) {
          var minEl = els[spec.minKey];
          var maxEl = els[spec.maxKey];
          var fill = document.getElementById(spec.fill);
          var minValEl = document.getElementById(spec.minVal);
          var maxValEl = document.getElementById(spec.maxVal);
          var a = parseFloat(minEl.value);
          var b = parseFloat(maxEl.value);
          var min = parseFloat(minEl.min);
          var max = parseFloat(maxEl.max);
          var lo = Math.min(a, b);
          var hi = Math.max(a, b);
          var loPct = ((lo - min) / (max - min)) * 100;
          var hiPct = ((hi - min) / (max - min)) * 100;
          fill.style.left = loPct + "%";
          fill.style.width = Math.max(0, hiPct - loPct) + "%";
          minValEl.textContent = fmtAxis(spec.tag, a);
          maxValEl.textContent = fmtAxis(spec.tag, b);
          minValEl.style.left = thumbPct(minEl) + "%";
          maxValEl.style.left = thumbPct(maxEl) + "%";
        }

        function updateAllDualUI() {
          DUAL_GRAD.forEach(updateDualGradUI);
          DUAL_AXES.forEach(updateDualAxisUI);
        }

        function applyAxisLimits() {
          DUAL_AXES.forEach(function (spec) {
            var a = AXES[spec.tag];
            [els[spec.minKey], els[spec.maxKey]].forEach(function (el) {
              el.min = a.min;
              el.max = a.max;
              el.step = a.step;
            });
          });
        }

        function fmt(key, v) {
          if (key === "bg" || key === "fg") return String(v).toLowerCase();
          if (key === "zm") return Math.round(Number(v) * 100) + "%";
          if (key === "gm") return Number(v).toFixed(2);
          if (key === "sp") return Math.round(Number(v)) + "";
          return Math.round(Number(v)) + "px";
        }

        function applyVar(key, v) {
          if (key === "zm") root.style.setProperty("--zoom", v);
          else if (key === "bg") root.style.setProperty("--bg", v);
          else if (key === "fg") root.style.setProperty("--fg", v);
          else if (key === "pv") {
            root.style.setProperty("--pad-t", v);
            root.style.setProperty("--pad-b", v);
          } else if (key === "pl") {
            root.style.setProperty("--pad-l", v);
          } else if (key === "pr") {
            root.style.setProperty("--pad-r", v);
          }
        }

        function setValue(key, v, persist) {
          if (key === "zm") {
            v = persist !== false ? ArtboardZoom.write(v) : ArtboardZoom.clamp(v);
          }
          var gradSpec = dualGradSpecForKey(key);
          var axisSpec = dualAxisSpecForKey(key);
          if (axisSpec) v = clampAxis(axisSpec.tag, v);
          els[key].value = v;
          if (gradSpec) updateDualGradUI(gradSpec);
          else if (axisSpec) updateDualAxisUI(axisSpec);
          else if (vals[key]) vals[key].textContent = fmt(key, v);
          applyVar(key, v);
          if (persist !== false) save();
        }

        function save() {
          var out = {};
          Object.keys(els).forEach(function (k) {
            if (k === "zm") return;
            out[k] = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
          });
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(out));
          } catch (e) {}
        }

        function migrateV1(parsed) {
          if (parsed.sTop != null && parsed.s0 == null) {
            parsed.s0 = parsed.sTop;
            parsed.s1 = parsed.sBot != null ? parsed.sBot : parsed.sTop;
          }
          if (parsed.kTop != null && parsed.k0 == null) {
            parsed.k0 = parsed.kTop;
            parsed.k1 = parsed.kBot != null ? parsed.kBot : parsed.kTop;
          }
          if (parsed.wTop != null && parsed.wMin == null) {
            parsed.wMin = parsed.wTop;
            parsed.wMax = parsed.wBot != null ? parsed.wBot : parsed.wTop;
          }
          if (parsed.lh != null && parsed.lh0 == null) {
            parsed.lh0 = parsed.lh;
            parsed.lh1 = parsed.lh;
          }
          if (parsed.lhTop != null && parsed.lh0 == null) {
            parsed.lh0 = parsed.lhTop;
            parsed.lh1 =
              parsed.lhBot != null ? parsed.lhBot : parsed.lhTop;
          }
          return parsed;
        }

        function load() {
          var raw;
          try {
            raw = localStorage.getItem(LS_KEY);
          } catch (e) {
            raw = null;
          }
          if (!raw) {
            try {
              raw = localStorage.getItem(LS_KEY_V1);
            } catch (e2) {
              raw = null;
            }
          }
          var data = DEFAULTS;
          if (raw) {
            try {
              var parsed = JSON.parse(raw);
              parsed = migrateV1(parsed);
              if (parsed.ph != null && parsed.pl == null && parsed.pr == null) {
                parsed.pl = parsed.ph;
                parsed.pr = parsed.ph;
              }
              data = Object.assign({}, DEFAULTS, parsed);
            } catch (e) {}
          }
          if (els.lh0 && els.lh1) {
            var lhMin = parseFloat(els.lh0.min);
            var lhMax = parseFloat(els.lh0.max);
            data.lh0 = Math.max(lhMin, Math.min(lhMax, data.lh0));
            data.lh1 = Math.max(lhMin, Math.min(lhMax, data.lh1));
          }
          data.zm = ArtboardZoom.resolve(data.zm);
          Object.keys(els).forEach(function (k) {
            setValue(k, data[k], false);
          });
        }

        ArtboardZoom.onChange(function (z) {
          setValue("zm", z, false);
        });

        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
            setValue(k, v);
            if (LAYOUT_KEYS[k]) requestAnimationFrame(computeLayout);
          });
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) {
            setValue(k, DEFAULTS[k]);
          });
          updateAllDualUI();
          requestAnimationFrame(computeLayout);
        });

        window.addEventListener("resize", function () {
          requestAnimationFrame(computeLayout);
        });

        applyAxisLimits();
        load();
        updateAllDualUI();

        function start() {
          computeLayout();
          requestAnimationFrame(frame);
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            requestAnimationFrame(start);
          });
        } else {
          requestAnimationFrame(start);
        }
      })();
    </script>
  </body>
</html>
