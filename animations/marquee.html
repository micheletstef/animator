<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>names marquee</title>
    <style>
      @font-face {
        font-family: "IkarusCondensedVariable";
        src: url("../fonts/ABCIkarusCondensedVariable.ttf")
          format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --fg: #f5d100;
        --pad-t: 0;
        --pad-r: 0;
        --pad-b: 0;
        --pad-l: 0;
        --zoom: 1;
        --w-top: 1000;
        --w-bottom: 500;
        --gamma: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        color: var(--fg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        font-family: "IkarusCondensedVariable", system-ui, sans-serif;
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .marquee {
        position: absolute;
        top: calc(var(--pad-t) * 1px);
        right: calc(var(--pad-r) * 1px);
        bottom: calc(var(--pad-b) * 1px);
        left: calc(var(--pad-l) * 1px);
        line-height: 0.92;
        overflow: hidden;
        will-change: transform;
      }

      .track {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        will-change: transform;
      }

      .line {
        display: flex;
        align-items: flex-end;
        box-sizing: border-box;
        font-size: 220px;
        white-space: nowrap;
        text-align: left;
        font-variation-settings: "wght" 1000;
        overflow: visible;
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .row input[type="color"]::-webkit-color-swatch {
        border: 0;
        border-radius: 2px;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }

      .panel .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .panel button {
        flex: 1;
        background: transparent;
        color: #cfcfcf;
        border: 1px solid #333;
        padding: 6px 8px;
        font: inherit;
        text-transform: lowercase;
        cursor: pointer;
        border-radius: 4px;
      }

      .panel button:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">
        <div class="stage" id="stage" aria-label="names marquee">
          <div class="marquee" id="marquee">
            <div class="track" id="track"></div>
          </div>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />

    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">shift + scroll to zoom the artboard</p>

      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="fg">text</label>
          <input id="fg" type="color" value="#f5d100" />
          <span class="val" id="fgVal">#f5d100</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">top</p>
        <div class="row">
          <label for="sTop">size</label>
          <input id="sTop" type="range" min="40" max="800" step="1" value="240" />
          <span class="val" id="sTopVal">240px</span>
        </div>
        <div class="row">
          <label for="kTop">kern</label>
          <input id="kTop" type="range" min="-0.5" max="0.5" step="0.001" value="-0.02" />
          <span class="val" id="kTopVal">-20</span>
        </div>
        <div class="row">
          <label for="wTop">weight</label>
          <input id="wTop" type="range" min="100" max="1000" step="1" value="1000" />
          <span class="val" id="wTopVal">1000</span>
        </div>
        <div class="row">
          <label for="oTop">opacity</label>
          <input id="oTop" type="range" min="0" max="1" step="0.01" value="1" />
          <span class="val" id="oTopVal">100%</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">bottom</p>
        <div class="row">
          <label for="sBot">size</label>
          <input id="sBot" type="range" min="40" max="800" step="1" value="120" />
          <span class="val" id="sBotVal">120px</span>
        </div>
        <div class="row">
          <label for="kBot">kern</label>
          <input id="kBot" type="range" min="-0.5" max="0.5" step="0.001" value="0.02" />
          <span class="val" id="kBotVal">20</span>
        </div>
        <div class="row">
          <label for="wBot">weight</label>
          <input id="wBot" type="range" min="100" max="1000" step="1" value="500" />
          <span class="val" id="wBotVal">500</span>
        </div>
        <div class="row">
          <label for="oBot">opacity</label>
          <input id="oBot" type="range" min="0" max="1" step="0.01" value="0.2" />
          <span class="val" id="oBotVal">20%</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">spacing</p>
        <div class="row">
          <label for="lh">leading</label>
          <input id="lh" type="range" min="-0.3" max="1.6" step="0.01" value="0.92" />
          <span class="val" id="lhVal">0.92</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">curve</p>
        <div class="row">
          <label for="gm">curve</label>
          <input id="gm" type="range" min="0.3" max="3" step="0.01" value="1" />
          <span class="val" id="gmVal">1.00</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">motion</p>
        <div class="row">
          <label for="sp">speed</label>
          <input id="sp" type="range" min="5" max="400" step="1" value="80" />
          <span class="val" id="spVal">80</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">margins</p>
        <div class="row">
          <label for="pv">vertical</label>
          <input id="pv" type="range" min="0" max="600" step="1" value="0" />
          <span class="val" id="pvVal">0px</span>
        </div>
        <div class="row">
          <label for="pl">left</label>
          <input id="pl" type="range" min="0" max="600" step="1" value="0" />
          <span class="val" id="plVal">0px</span>
        </div>
        <div class="row">
          <label for="pr">right</label>
          <input id="pr" type="range" min="0" max="600" step="1" value="0" />
          <span class="val" id="prVal">0px</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
      </div>
    </aside>

    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var NAMES = [
          "Ikarus",
          "Dädalus",
          "Minos",
          "Ariadne",
          "Theseus",
          "Poseidon",
          "Helios",
          "Kreta",
          "Labyrinth",
          "Samos",
        ];

        var marquee = document.getElementById("marquee");
        var track = document.getElementById("track");

        var lineEls = [];
        function buildLines() {
          track.innerHTML = "";
          lineEls = [];
          for (var copy = 0; copy < 2; copy++) {
            for (var i = 0; i < NAMES.length; i++) {
              var el = document.createElement("span");
              el.className = "line";
              el.textContent = NAMES[i];
              track.appendChild(el);
              lineEls.push(el);
            }
          }
        }
        buildLines();

        var loopHeight = 0;
        var slotTops = [];
        var slotHeights = [];

        function layoutParams() {
          return {
            wTop: parseFloat(els.wTop.value),
            wBot: parseFloat(els.wBot.value),
            kTop: parseFloat(els.kTop.value),
            kBot: parseFloat(els.kBot.value),
            sTop: parseFloat(els.sTop.value),
            sBot: parseFloat(els.sBot.value),
            lh: parseFloat(els.lh.value),
            oTop: parseFloat(els.oTop.value),
            oBot: parseFloat(els.oBot.value),
            gamma: parseFloat(els.gm.value),
          };
        }

        function applyTypography(node, t, p) {
          if (t < 0) t = 0;
          else if (t > 1) t = 1;
          var tt = Math.pow(t, p.gamma);
          var w = Math.round(p.wTop + (p.wBot - p.wTop) * tt);
          node.style.fontVariationSettings = '"wght" ' + w;
          var k = p.kTop + (p.kBot - p.kTop) * tt;
          node.style.letterSpacing = k.toFixed(4) + "em";
          var s = p.sTop + (p.sBot - p.sTop) * tt;
          node.style.fontSize = s + "px";
          node.style.lineHeight = p.lh.toFixed(4);
          node.style.opacity = p.oTop + (p.oBot - p.oTop) * tt;
        }

        // Max height across the full top→bottom gradient so animated
        // typography never outgrows its slot and gets clipped.
        function measureMaxLineHeight(node, p) {
          var maxH = 0;
          node.style.height = "auto";
          node.style.minHeight = "0";
          for (var step = 0; step <= 12; step++) {
            applyTypography(node, step / 12, p);
            var s = p.sTop + (p.sBot - p.sTop) * (step / 12);
            // Tight/negative leading shrinks the line box but not the glyphs.
            var ink = Math.max(
              node.offsetHeight,
              node.scrollHeight,
              s * Math.max(p.lh, 0.55)
            );
            maxH = Math.max(maxH, ink);
          }
          return Math.ceil(maxH);
        }

        // Fixed slot layout decouples scroll position from live DOM metrics.
        // Typography still interpolates by viewport position, but changing
        // font-size no longer shifts the track and retriggers loop rescaling.
        function computeLayout() {
          var p = layoutParams();
          var marqueeH = marquee.clientHeight || 1;
          var y = 0;
          slotTops = [];
          slotHeights = [];
          for (var i = 0; i < lineEls.length; i++) {
            var node = lineEls[i];
            var h = measureMaxLineHeight(node, p);
            var t = 0;
            for (var iter = 0; iter < 8; iter++) {
              applyTypography(node, t, p);
              t = marqueeH > 0 ? Math.min(1, (y + h) / marqueeH) : 0;
            }
            slotHeights[i] = h;
            slotTops[i] = y;
            node.style.height = "auto";
            node.style.minHeight = h + "px";
            y += h;
          }
          loopHeight = slotTops[NAMES.length] || 0;
          if (loopHeight > 0) {
            offset = ((offset % loopHeight) + loopHeight) % loopHeight;
          }
        }

        var offset = 0;
        var lastNow = 0;

        function updateWeights() {
          var marqueeH = marquee.clientHeight || 1;
          var p = layoutParams();

          // Bottom edge in viewport coordinates; fixed slots avoid layout feedback.
          var n = lineEls.length;
          for (var j = 0; j < n; j++) {
            var yTop = slotTops[j] - offset;
            var bottom = yTop + slotHeights[j];
            var t = bottom / marqueeH;
            if (t < 0) t = 0;
            else if (t > 1) t = 1;
            applyTypography(lineEls[j], t, p);
          }
        }

        function frame(now) {
          if (!lastNow) lastNow = now;
          var dt = (now - lastNow) / 1000;
          lastNow = now;

          var speed = parseFloat(els.sp.value);
          offset += speed * dt;
          if (loopHeight > 0) {
            offset = ((offset % loopHeight) + loopHeight) % loopHeight;
          }
          track.style.transform = "translate3d(0," + -offset + "px,0)";

          updateWeights();

          requestAnimationFrame(frame);
        }

        var LS_KEY = "names-marquee:settings:v1";
        var root = document.documentElement;

        var DEFAULTS = {
          zm: 1,
          bg: "#ffffff",
          fg: "#f5d100",
          sTop: 240,
          sBot: 120,
          lh: 0.92,
          kTop: -0.02,
          kBot: 0.02,
          wTop: 1000,
          wBot: 500,
          gm: 1,
          oTop: 1,
          oBot: 0.2,
          sp: 80,
          pv: 0,
          pl: 0,
          pr: 0,
        };

        var COLOR_KEYS = { bg: 1, fg: 1 };

        var els = {
          zm: document.getElementById("zm"),
          bg: document.getElementById("bg"),
          fg: document.getElementById("fg"),
          sTop: document.getElementById("sTop"),
          sBot: document.getElementById("sBot"),
          lh: document.getElementById("lh"),
          kTop: document.getElementById("kTop"),
          kBot: document.getElementById("kBot"),
          wTop: document.getElementById("wTop"),
          wBot: document.getElementById("wBot"),
          gm: document.getElementById("gm"),
          oTop: document.getElementById("oTop"),
          oBot: document.getElementById("oBot"),
          sp: document.getElementById("sp"),
          pv: document.getElementById("pv"),
          pl: document.getElementById("pl"),
          pr: document.getElementById("pr"),
        };
        var vals = {
          bg: document.getElementById("bgVal"),
          fg: document.getElementById("fgVal"),
          sTop: document.getElementById("sTopVal"),
          sBot: document.getElementById("sBotVal"),
          lh: document.getElementById("lhVal"),
          kTop: document.getElementById("kTopVal"),
          kBot: document.getElementById("kBotVal"),
          wTop: document.getElementById("wTopVal"),
          wBot: document.getElementById("wBotVal"),
          gm: document.getElementById("gmVal"),
          oTop: document.getElementById("oTopVal"),
          oBot: document.getElementById("oBotVal"),
          sp: document.getElementById("spVal"),
          pv: document.getElementById("pvVal"),
          pl: document.getElementById("plVal"),
          pr: document.getElementById("prVal"),
        };

        function fmt(key, v) {
          if (key === "bg" || key === "fg") return String(v).toLowerCase();
          if (key === "zm" || key === "oTop" || key === "oBot")
            return Math.round(Number(v) * 100) + "%";
          if (key === "sTop" || key === "sBot")
            return Math.round(Number(v)) + "px";
          if (key === "lh" || key === "gm")
            return Number(v).toFixed(2);
          if (key === "kTop" || key === "kBot")
            return Math.round(Number(v) * 1000) + "";
          if (key === "wTop" || key === "wBot" || key === "sp")
            return Math.round(Number(v)) + "";
          return Math.round(Number(v)) + "px";
        }

        function applyVar(key, v) {
          if (key === "zm") root.style.setProperty("--zoom", v);
          else if (key === "bg") root.style.setProperty("--bg", v);
          else if (key === "fg") root.style.setProperty("--fg", v);
          else if (key === "pv") {
            root.style.setProperty("--pad-t", v);
            root.style.setProperty("--pad-b", v);
          } else if (key === "pl") {
            root.style.setProperty("--pad-l", v);
          } else if (key === "pr") {
            root.style.setProperty("--pad-r", v);
          }
        }

        function setValue(key, v, persist) {
          if (key === "zm") {
            v = persist !== false ? ArtboardZoom.write(v) : ArtboardZoom.clamp(v);
          }
          els[key].value = v;
          if (vals[key]) {
            vals[key].textContent = fmt(key, v);
          }
          applyVar(key, v);
          if (persist !== false) save();
        }

        function save() {
          var out = {};
          Object.keys(els).forEach(function (k) {
            if (k === "zm") return;
            out[k] = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
          });
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(out));
          } catch (e) {}
        }

        function load() {
          var raw;
          try {
            raw = localStorage.getItem(LS_KEY);
          } catch (e) {
            raw = null;
          }
          var data = DEFAULTS;
          if (raw) {
            try {
              var parsed = JSON.parse(raw);
              if (parsed.ph != null && parsed.pl == null && parsed.pr == null) {
                parsed.pl = parsed.ph;
                parsed.pr = parsed.ph;
              }
              if (parsed.lh == null && parsed.lhTop != null) {
                parsed.lh = parsed.lhTop;
              }
              data = Object.assign({}, DEFAULTS, parsed);
            } catch (e) {}
          }
          if (els.lh) {
            var lhMin = parseFloat(els.lh.min);
            var lhMax = parseFloat(els.lh.max);
            data.lh = Math.max(lhMin, Math.min(lhMax, data.lh));
          }
          data.zm = ArtboardZoom.resolve(data.zm);
          Object.keys(els).forEach(function (k) {
            setValue(k, data[k], false);
          });
        }

        ArtboardZoom.onChange(function (z) {
          setValue("zm", z, false);
        });

        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] ? els[k].value : parseFloat(els[k].value);
            setValue(k, v);
            if (
              k === "sTop" ||
              k === "sBot" ||
              k === "lh" ||
              k === "gm" ||
              k === "wTop" ||
              k === "wBot" ||
              k === "kTop" ||
              k === "kBot"
            ) {
              requestAnimationFrame(computeLayout);
            }
          });
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) {
            setValue(k, DEFAULTS[k]);
          });
          requestAnimationFrame(computeLayout);
        });

        window.addEventListener("resize", function () {
          requestAnimationFrame(computeLayout);
        });

        load();

        function start() {
          computeLayout();
          requestAnimationFrame(frame);
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            requestAnimationFrame(start);
          });
        } else {
          requestAnimationFrame(start);
        }
      })();
    </script>
  </body>
</html>
