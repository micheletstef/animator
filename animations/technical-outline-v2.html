<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>technical outline v2</title>
    <style>
      @font-face {
        font-family: "IkarusPlusVariable";
        src: url("../fonts/ABCIkarusPlusVariable.ttf") format("truetype-variations");
        font-weight: 100 1000;
        font-style: normal;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --line: #0078ff;
        --fs: 900;
        --zoom: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .drag-surface {
        position: absolute;
        inset: 0;
        bottom: 64px;
        z-index: 10;
        cursor: grab;
        touch-action: none;
        pointer-events: auto;
      }

      .stage.is-dragging,
      .stage.is-dragging .drag-surface {
        cursor: grabbing;
        user-select: none;
      }

      .outline-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        pointer-events: none !important;
        overflow: visible;
        color: var(--line);
        shape-rendering: geometricPrecision;
      }

      .outline-layer * {
        pointer-events: none !important;
      }

      .outline-layer .glyph-outline-path,
      .outline-layer .glyph-outline-handle-line,
      .outline-layer .glyph-outline-handle,
      .outline-layer .glyph-outline-node {
        stroke: currentColor;
        fill: none;
      }

      .probe {
        position: absolute;
        left: -9999px;
        visibility: hidden;
        font-family: "IkarusPlusVariable", system-ui, sans-serif;
        font-size: calc(var(--fs) * 1px);
        line-height: 1;
        white-space: pre-wrap;
        text-align: center;
      }

      .var-readout {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: center;
        min-height: 64px;
        padding: 12px 28px 48px;
        font-size: 20px;
        line-height: 1;
        color: var(--line);
        background: var(--bg);
        pointer-events: none;
      }

      .var-readout-item {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
      }

      .var-readout-label {
        opacity: 0.5;
        letter-spacing: 0.02em;
      }

      .var-readout-value {
        min-width: 4ch;
        font-variant-numeric: tabular-nums;
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="text"],
      .row textarea,
      .row select {
        grid-column: 2 / 4;
        width: 100%;
        padding: 4px 6px;
        border: 1px solid #333;
        border-radius: 4px;
        background: #111;
        color: #e9e9e9;
        font: inherit;
      }

      .row select {
        cursor: pointer;
      }

      .bezier-preview {
        width: 100%;
        height: 72px;
        margin: 4px 0 10px 0;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        background: #111;
      }

      .bezier-preview path {
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        vector-effect: non-scaling-stroke;
      }

      .bezier-preview line {
        stroke: #444;
        stroke-width: 1;
        vector-effect: non-scaling-stroke;
      }

      .bezier-preview circle {
        fill: #fff;
        stroke: #1a1a1a;
        stroke-width: 1;
      }

      .row textarea {
        min-height: 72px;
        resize: vertical;
        line-height: 1.2;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }

      .axis-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .axis-row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .dual-range {
        position: relative;
        width: 100%;
        height: 40px;
        min-width: 0;
      }

      .dual-val {
        position: absolute;
        top: 0;
        transform: translateX(-50%);
        font-size: 10px;
        line-height: 1.2;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        z-index: 2;
        white-space: nowrap;
      }

      .dual-track {
        position: absolute;
        left: 7px;
        right: 7px;
        top: 24px;
        height: 3px;
        transform: translateY(-50%);
        background: #2a2a2a;
        border-radius: 2px;
        pointer-events: none;
      }

      .dual-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        background: #fff;
        border-radius: 2px;
      }

      .dual-range input[type="range"] {
        position: absolute;
        left: 0;
        right: 0;
        top: 14px;
        width: 100%;
        height: 22px;
        margin: 0;
        background: transparent;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .dual-range input[type="range"]:focus {
        outline: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track,
      .dual-range input[type="range"]::-moz-range-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
        margin-top: 0;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        pointer-events: auto;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-webkit-slider-thumb,
      .dual-range input.is-end[type="range"]::-moz-range-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .panel .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .panel button {
        flex: 1;
        background: transparent;
        color: #cfcfcf;
        border: 1px solid #333;
        padding: 6px 8px;
        font: inherit;
        text-transform: lowercase;
        cursor: pointer;
        border-radius: 4px;
      }

      .panel button:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">
        <div class="stage" id="stage" aria-label="technical outline">
          <svg class="outline-layer" id="outlines" aria-hidden="true"></svg>
          <div class="drag-surface" id="dragSurface" aria-hidden="true"></div>
          <span class="probe" id="probe">A</span>
          <div class="var-readout" id="varReadout" aria-live="polite">
            <span class="var-readout-item">
              <span class="var-readout-label">Weight</span>
              <span class="var-readout-value" id="readoutWght">500</span>
            </span>
            <span class="var-readout-item">
              <span class="var-readout-label">Contour</span>
              <span class="var-readout-value" id="readoutCntr">0</span>
            </span>
            <span class="var-readout-item">
              <span class="var-readout-label">Width</span>
              <span class="var-readout-value" id="readoutWdth">100</span>
            </span>
          </div>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />
    <input type="hidden" id="tx" value="0" />
    <input type="hidden" id="ty" value="0" />

    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">shift + scroll to zoom · drag text on canvas · scroll settings for easing</p>

      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="ln">line</label>
          <input id="ln" type="color" value="#0078ff" />
          <span class="val" id="lnVal">#0078ff</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">type</p>
        <div class="row">
          <label for="ch">text</label>
          <textarea id="ch" rows="4" spellcheck="false" autocomplete="off">A</textarea>
        </div>
        <div class="axis-row">
          <label for="fs0">size</label>
          <div class="dual-range" id="fsDual">
            <span class="dual-val" id="fs0Val">900px</span>
            <span class="dual-val" id="fs1Val">900px</span>
            <div class="dual-track"><div class="dual-fill" id="fsFill"></div></div>
            <input id="fs0" class="is-start" type="range" min="200" max="1600" step="1" value="900" aria-label="size start" />
            <input id="fs1" class="is-end" type="range" min="200" max="1600" step="1" value="900" aria-label="size end" />
          </div>
        </div>
        <div class="row">
          <label for="os">scale</label>
          <input id="os" type="range" min="25" max="200" step="1" value="100" />
          <span class="val" id="osVal">1.00×</span>
        </div>
        <div class="axis-row">
          <label for="kn0">track</label>
          <div class="dual-range" id="knDual">
            <span class="dual-val" id="kn0Val">0%</span>
            <span class="dual-val" id="kn1Val">0%</span>
            <div class="dual-track"><div class="dual-fill" id="knFill"></div></div>
            <input id="kn0" class="is-start" type="range" min="-100" max="100" step="1" value="0" aria-label="tracking start" />
            <input id="kn1" class="is-end" type="range" min="-100" max="100" step="1" value="0" aria-label="tracking end" />
          </div>
        </div>
      </div>

      <div class="group">
        <p class="group-title">variables</p>
        <div class="axis-row">
          <label for="wMin">wght</label>
          <div class="dual-range" id="wDual">
            <span class="dual-val" id="wMinVal">200</span>
            <span class="dual-val" id="wMaxVal">1000</span>
            <div class="dual-track"><div class="dual-fill" id="wFill"></div></div>
            <input id="wMin" class="is-start" type="range" min="200" max="1000" step="1" value="200" aria-label="wght start" />
            <input id="wMax" class="is-end" type="range" min="200" max="1000" step="1" value="1000" aria-label="wght end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="cMin">CNTR</label>
          <div class="dual-range" id="cDual">
            <span class="dual-val" id="cMinVal">0.0</span>
            <span class="dual-val" id="cMaxVal">100.0</span>
            <div class="dual-track"><div class="dual-fill" id="cFill"></div></div>
            <input id="cMin" class="is-start" type="range" min="0" max="100" step="0.1" value="0" aria-label="CNTR start" />
            <input id="cMax" class="is-end" type="range" min="0" max="100" step="0.1" value="100" aria-label="CNTR end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="dMin">wdth</label>
          <div class="dual-range" id="dDual">
            <span class="dual-val" id="dMinVal">65</span>
            <span class="dual-val" id="dMaxVal">130</span>
            <div class="dual-track"><div class="dual-fill" id="dFill"></div></div>
            <input id="dMin" class="is-start" type="range" min="65" max="130" step="1" value="65" aria-label="wdth start" />
            <input id="dMax" class="is-end" type="range" min="65" max="130" step="1" value="130" aria-label="wdth end" />
          </div>
        </div>
        <div class="axis-row">
          <label for="sMin">slnt</label>
          <div class="dual-range" id="sDual">
            <span class="dual-val" id="sMinVal">0</span>
            <span class="dual-val" id="sMaxVal">-12</span>
            <div class="dual-track"><div class="dual-fill" id="sFill"></div></div>
            <input id="sMin" class="is-start" type="range" min="-12" max="0" step="0.25" value="0" aria-label="slnt start" />
            <input id="sMax" class="is-end" type="range" min="-12" max="0" step="0.25" value="-12" aria-label="slnt end" />
          </div>
        </div>
      </div>

      <div class="group">
        <p class="group-title">easing</p>
        <div class="row">
          <label for="ep">preset</label>
          <select id="ep" aria-label="easing preset">
            <option value="ease-in-out">ease-in-out</option>
            <option value="ease">ease</option>
            <option value="ease-in">ease-in</option>
            <option value="ease-out">ease-out</option>
            <option value="linear">linear</option>
            <option value="custom">custom</option>
          </select>
        </div>
        <svg class="bezier-preview" id="bezierPreview" viewBox="0 0 100 100" aria-hidden="true">
          <line x1="0" y1="100" x2="100" y2="0" />
          <path id="bezierPath" d="M0,100 C0,100 100,0 100,0" />
          <circle id="bezierP1" r="3" cx="0" cy="100" />
          <circle id="bezierP2" r="3" cx="100" cy="0" />
        </svg>
        <div class="row">
          <label for="e1">p1x</label>
          <input id="e1" type="range" min="0" max="1000" step="1" value="420" />
          <span class="val" id="e1Val">0.42</span>
        </div>
        <div class="row">
          <label for="e2">p1y</label>
          <input id="e2" type="range" min="-500" max="1500" step="1" value="0" />
          <span class="val" id="e2Val">0.00</span>
        </div>
        <div class="row">
          <label for="e3">p2x</label>
          <input id="e3" type="range" min="0" max="1000" step="1" value="580" />
          <span class="val" id="e3Val">0.58</span>
        </div>
        <div class="row">
          <label for="e4">p2y</label>
          <input id="e4" type="range" min="-500" max="1500" step="1" value="1000" />
          <span class="val" id="e4Val">1.00</span>
        </div>
        <div class="row">
          <label>css</label>
          <span class="val" id="bezierCss" style="grid-column: 2 / 4; text-align: left">cubic-bezier(0.42, 0, 0.58, 1)</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">motion</p>
        <div class="row">
          <label for="cy">step</label>
          <input id="cy" type="range" min="400" max="4000" step="50" value="1200" />
          <span class="val" id="cyVal">1.2s</span>
        </div>
        <div class="row">
          <label for="sp">pause</label>
          <input id="sp" type="range" min="0" max="2000" step="50" value="450" />
          <span class="val" id="spVal">450ms</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/opentype.js@2.0.0/dist/opentype.min.js"></script>
    <script src="glyph-outlines.js"></script>
    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var outlineSvg = document.getElementById("outlines");
        var stage = document.getElementById("stage");
        var dragSurface = document.getElementById("dragSurface");
        var probe = document.getElementById("probe");
        var FONT_URL = "../fonts/ABCIkarusPlusVariable.ttf";
        var root = document.documentElement;
        var textOffset = { x: 0, y: 0 };
        var textDrag = null;
        var animT0 = 0;

        var FS = { min: 200, max: 1600, step: 1, default: 900 };

        var AXES = {
          CNTR: { min: 0, max: 100, step: 0.1, default: 0 },
          wght: { min: 200, max: 1000, step: 1, default: 500 },
          wdth: { min: 65, max: 130, step: 1, default: 100 },
          slnt: { min: -12, max: 0, step: 0.25, default: 0 },
        };

        var DUAL_AXES = [
          { tag: "wght", minKey: "wMin", maxKey: "wMax", fill: "wFill", minVal: "wMinVal", maxVal: "wMaxVal" },
          { tag: "CNTR", minKey: "cMin", maxKey: "cMax", fill: "cFill", minVal: "cMinVal", maxVal: "cMaxVal" },
          { tag: "wdth", minKey: "dMin", maxKey: "dMax", fill: "dFill", minVal: "dMinVal", maxVal: "dMaxVal" },
          { tag: "slnt", minKey: "sMin", maxKey: "sMax", fill: "sFill", minVal: "sMinVal", maxVal: "sMaxVal" },
        ];

        function clampAxis(tag, v) {
          var a = AXES[tag];
          return Math.max(a.min, Math.min(a.max, Number(v)));
        }

        function fmtAxis(tag, v) {
          if (tag === "CNTR") return (Math.round(v * 10) / 10).toFixed(1);
          if (tag === "wght" || tag === "wdth") return Math.round(v).toString();
          return String(v);
        }

        function fmtReadout(tag, v) {
          return String(Math.ceil(Number(v)));
        }

        function fvarSettings(v) {
          return (
            '"wght" ' +
            fmtAxis("wght", v.wght) +
            ', "wdth" ' +
            fmtAxis("wdth", v.wdth) +
            ', "slnt" ' +
            fmtAxis("slnt", v.slnt) +
            ', "CNTR" ' +
            fmtAxis("CNTR", v.CNTR)
          );
        }

        var EASING_PRESETS = {
          linear: { e1: 0, e2: 0, e3: 1000, e4: 1000 },
          ease: { e1: 250, e2: 100, e3: 250, e4: 1000 },
          "ease-in": { e1: 420, e2: 0, e3: 1000, e4: 1000 },
          "ease-out": { e1: 0, e2: 0, e3: 580, e4: 1000 },
          "ease-in-out": { e1: 420, e2: 0, e3: 580, e4: 1000 },
        };

        var BEZIER_KEYS = { e1: 1, e2: 1, e3: 1, e4: 1 };
        var easingFn = null;

        function bezierUnit(key, v) {
          if (key === "e2" || key === "e4") return Number(v) / 1000;
          return Number(v) / 1000;
        }

        function readBezier() {
          return {
            x1: bezierUnit("e1", els.e1.value),
            y1: bezierUnit("e2", els.e2.value),
            x2: bezierUnit("e3", els.e3.value),
            y2: bezierUnit("e4", els.e4.value),
          };
        }

        function sampleBezier(t, a, b) {
          var c = 3 * a;
          var b2 = 3 * (b - a) - c;
          var a2 = 1 - c - b2;
          return ((a2 * t + b2) * t + c) * t;
        }

        function sampleBezierDeriv(t, a, b) {
          var c = 3 * a;
          var b2 = 3 * (b - a) - c;
          var a2 = 1 - c - b2;
          return (3 * a2 * t + 2 * b2) * t + c;
        }

        function buildEasingFn(x1, y1, x2, y2) {
          if (x1 === 0 && y1 === 0 && x2 === 1 && y2 === 1) {
            return function (t) {
              return t <= 0 ? 0 : t >= 1 ? 1 : t;
            };
          }
          return function (t) {
            if (t <= 0) return 0;
            if (t >= 1) return 1;
            var s = t;
            for (var i = 0; i < 12; i++) {
              var x = sampleBezier(s, x1, x2) - t;
              if (Math.abs(x) < 1e-7) break;
              var dx = sampleBezierDeriv(s, x1, x2);
              if (Math.abs(dx) < 1e-7) break;
              s -= x / dx;
              if (s < 0) s = 0;
              else if (s > 1) s = 1;
            }
            return sampleBezier(s, y1, y2);
          };
        }

        function rebuildEasingFn() {
          var b = readBezier();
          easingFn = buildEasingFn(b.x1, b.y1, b.x2, b.y2);

            textDrag = null;
            stage.classList.remove("is-dragging");
            window.removeEventListener("pointermove", onDragMove);
            window.removeEventListener("pointerup", endDrag);
            window.removeEventListener("pointercancel", endDrag);
            persistTextOffset();
          }

          dragSurface.addEventListener("pointerdown", function (e) {
            if (e.button !== 0) return;
            e.preventDefault();
            textDrag = {
              x: e.clientX,
              y: e.clientY,
              ox: textOffset.x,
              oy: textOffset.y,
            };
            stage.classList.add("is-dragging");
            window.addEventListener("pointermove", onDragMove);
            window.addEventListener("pointerup", endDrag);
            window.addEventListener("pointercancel", endDrag);
          });
        }

        ArtboardZoom.onChange(function (z) {
          setValue("zm", z, false);
          syncOutlines();
        });

        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] || STRING_KEYS[k] ? els[k].value : parseFloat(els[k].value);
            setValue(k, v);
          });
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) {
            setValue(k, DEFAULTS[k]);
          });
          applyTextOffset();
        });

        applyAxisLimits();
        load();
        applyChar();
        applyTextOffset();
        bindTextDrag();
        syncEasingPresetLabel();
        updateAllDualUI();
        updateKernDualUI();
        updateFsDualUI();

        function start() {
          animT0 = performance.now();
          var v0 = variationFromElapsed(0);
          applyFontSize(0);
          applyVariation(v0);
          updateVarReadout(v0);
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(function () {
              syncOutlines(v0, null, null, 0);
              requestAnimationFrame(function (n) {
                frame(n, animT0);
              });
            });
          } else {
            syncOutlines(v0, null, null, 0);
            requestAnimationFrame(function (n) {
              frame(n, animT0);
            });
          }
        }

        start();
      })();
    </script>
  </body>
</html>
