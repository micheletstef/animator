<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ghost · slant</title>
    <style>
      @font-face {
        font-family: "IkarusPlusVariable";
        src: url("../fonts/ABCIkarusPlusVariable.ttf")
          format("truetype-variations");
        font-weight: 200 1000;
        font-stretch: 65% 130%;
        font-style: oblique -12deg 0deg;
        font-display: block;
      }

      :root {
        color-scheme: dark;
        --bg: #ffffff;
        --fg: #000000;
        --fs: 900;
        --stroke: 1;
        --zoom: 1;
        --base: min(calc(100vh - 48px), calc(100vw - 280px - 72px));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e9e9e9;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 280px;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .stage-wrap {
        display: flex;
        align-items: safe center;
        justify-content: safe center;
        height: 100%;
        min-width: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .stage-outer {
        width: calc(var(--base) * var(--zoom));
        height: calc(var(--base) * var(--zoom));
        position: relative;
        flex: 0 0 auto;
      }

      .stage {
        position: absolute;
        top: 0;
        left: 0;
        width: var(--base);
        height: var(--base);
        background: var(--bg);
        color: var(--fg);
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        font-family: "IkarusPlusVariable", system-ui, sans-serif;
        transform: scale(var(--zoom));
        transform-origin: top left;
      }

      .var-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, calc(-50% - var(--fs) * 0.56px));
        font-family: "Courier New", Courier, monospace;
        font-size: calc(var(--fs) * 0.038px);
        line-height: 1;
        letter-spacing: 0.02em;
        color: var(--fg);
        font-variant-numeric: tabular-nums;
        user-select: none;
        z-index: 3;
        pointer-events: none;
      }

      .glyph,
      .ghost {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "IkarusPlusVariable", system-ui, sans-serif;
        font-size: calc(var(--fs) * 1px);
        line-height: 1;
        white-space: nowrap;
        user-select: none;
        font-variation-settings: "wght" 500, "wdth" 100, "slnt" 0, "CNTR" 0;
      }

      .ghost-layer {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        color: var(--fg);
        font-family: "IkarusPlusVariable", system-ui, sans-serif;
      }

      .glyph {
        color: var(--fg);
        z-index: 2;
      }

      /* Filter per ghost so each wght step renders its own outline; a parent-level
         filter would merge all glyphs into one combined mask (single ring). */
      .ghost {
        color: var(--fg);
        -webkit-text-fill-color: currentColor;
        -webkit-text-stroke: 0;
        filter: url(#ghost-outline);
      }

      .outline-layer {
        position: absolute;
        inset: 0;
        z-index: 4;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: visible;
      }

      .panel {
        align-self: stretch;
        max-height: 100%;
        overflow: auto;
        padding: 16px 18px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .panel h2 {
        margin: 0 0 4px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: #9a9a9a;
      }

      .panel .hint {
        margin: 0 0 14px 0;
        color: #6a6a6a;
        font-size: 11px;
      }

      .panel .group {
        margin-bottom: 18px;
      }

      .panel .group-title {
        text-transform: lowercase;
        color: #6a6a6a;
        margin: 0 0 8px 0;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 64px 1fr 52px;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .row label {
        text-transform: lowercase;
        color: #cfcfcf;
      }

      .row input[type="range"] {
        width: 100%;
        accent-color: #fff;
      }

      .row input[type="color"] {
        width: 100%;
        height: 22px;
        padding: 0;
        border: 1px solid #333;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .row input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .row input[type="color"]::-webkit-color-swatch {
        border: 0;
      }

      .row input[type="text"] {
        grid-column: 2 / 4;
        width: 100%;
        padding: 4px 6px;
        border: 1px solid #333;
        border-radius: 4px;
        background: #111;
        color: #e9e9e9;
        font: inherit;
        text-transform: none;
      }

      .row .val {
        text-align: right;
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }

      .row.row-wide-val {
        grid-template-columns: 64px 1fr 100px;
      }

      .dual-range {
        position: relative;
        width: 100%;
        height: 22px;
      }

      .dual-track {
        position: absolute;
        left: 7px;
        right: 7px;
        top: 50%;
        height: 3px;
        transform: translateY(-50%);
        background: #2a2a2a;
        border-radius: 2px;
        pointer-events: none;
      }

      .dual-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        background: #fff;
        border-radius: 2px;
      }

      .dual-range input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .dual-range input[type="range"]:focus {
        outline: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-moz-range-track {
        background: transparent;
        border: 0;
        height: 22px;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
        margin-top: 0;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        pointer-events: auto;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-webkit-slider-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .dual-range input.is-end[type="range"]::-moz-range-thumb {
        background: #1a1a1a;
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }

      .panel .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .panel button {
        flex: 1;
        background: transparent;
        color: #cfcfcf;
        border: 1px solid #333;
        padding: 6px 8px;
        font: inherit;
        text-transform: lowercase;
        cursor: pointer;
        border-radius: 4px;
      }

      .panel button:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <svg
      width="0"
      height="0"
      style="position: absolute; pointer-events: none"
      aria-hidden="true"
    >
      <defs>
        <filter
          id="ghost-outline"
          filterUnits="objectBoundingBox"
          x="-5%"
          y="-5%"
          width="110%"
          height="110%"
        >
          <feMorphology
            id="ghost-erode"
            operator="erode"
            radius="1"
            in="SourceAlpha"
            result="eroded"
          />
          <feComposite
            operator="out"
            in="SourceGraphic"
            in2="eroded"
          />
        </filter>
      </defs>
    </svg>

    <div class="stage-wrap" id="stageWrap">
      <div class="stage-outer">
        <div class="stage" id="stage" aria-label="ghost C">
          <svg class="outline-layer" id="outlines" aria-hidden="true"></svg>
          <div class="ghost-layer" id="ghosts"></div>
          <span class="var-label" id="varLabel" aria-hidden="true">0</span>
          <span class="glyph" id="glyph">C</span>
        </div>
      </div>
    </div>
    <input type="hidden" id="zm" value="1" />

    <aside class="panel" aria-label="Settings">
      <h2>settings</h2>
      <p class="hint">
        ABCIkarusPlusVariable (slnt) — shift + scroll to zoom
      </p>

      <div class="group">
        <p class="group-title">color</p>
        <div class="row">
          <label for="bg">bg</label>
          <input id="bg" type="color" value="#ffffff" />
          <span class="val" id="bgVal">#ffffff</span>
        </div>
        <div class="row">
          <label for="fg">ink</label>
          <input id="fg" type="color" value="#000000" />
          <span class="val" id="fgVal">#000000</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">type</p>
        <div class="row">
          <label for="ch">char</label>
          <input id="ch" type="text" value="C" maxlength="8" spellcheck="false" autocomplete="off" />
        </div>
        <div class="row">
          <label for="fs">size</label>
          <input id="fs" type="range" min="200" max="1600" step="1" value="900" />
          <span class="val" id="fsVal">900px</span>
        </div>
        <div class="row">
          <label for="sk">stroke</label>
          <input id="sk" type="range" min="0.5" max="6" step="0.1" value="1" />
          <span class="val" id="skVal">1.0px</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">weight · wght</p>
        <div class="row">
          <label for="wght">wght</label>
          <input id="wght" type="range" min="200" max="1000" step="1" value="500" />
          <span class="val" id="wghtVal">500</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">contrast · CNTR</p>
        <div class="row">
          <label for="cntr">cntr</label>
          <input id="cntr" type="range" min="0" max="100" step="1" value="0" />
          <span class="val" id="cntrVal">0</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">slant · slnt</p>
        <div class="row row-wide-val">
          <label for="sMin">range</label>
          <div class="dual-range" id="sDual">
            <div class="dual-track"><div class="dual-fill" id="sFill"></div></div>
            <input
              id="sMin"
              class="is-start"
              type="range"
              min="-12"
              max="0"
              step="0.25"
              value="-12"
              aria-label="Slant min"
            />
            <input
              id="sMax"
              class="is-end"
              type="range"
              min="-12"
              max="0"
              step="0.25"
              value="0"
              aria-label="Slant max"
            />
          </div>
          <span class="val" id="sVal">-12 / 0</span>
        </div>
        <div class="row">
          <label for="gh">ghosts</label>
          <input id="gh" type="range" min="1" max="40" step="1" value="14" />
          <span class="val" id="ghVal">14</span>
        </div>
      </div>

      <div class="group">
        <p class="group-title">motion</p>
        <div class="row">
          <label for="cy">cycle</label>
          <input id="cy" type="range" min="1500" max="12000" step="100" value="5200" />
          <span class="val" id="cyVal">5.2s</span>
        </div>
        <div class="row">
          <label for="hd">hold</label>
          <input id="hd" type="range" min="0" max="2000" step="50" value="450" />
          <span class="val" id="hdVal">450ms</span>
        </div>
        <div class="row">
          <label for="nd">nodes</label>
          <input id="nd" type="range" min="0" max="1" step="1" value="1" />
          <span class="val" id="ndVal">on</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn">reset</button>
      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/opentype.js@2.0.0/dist/opentype.min.js"></script>
    <script src="glyph-outlines.js"></script>
    <script src="artboard-zoom.js"></script>
    <script>
      (function () {
        var glyph = document.getElementById("glyph");
        var varLabel = document.getElementById("varLabel");
        var ghostLayer = document.getElementById("ghosts");
        var outlineSvg = document.getElementById("outlines");
        var stage = document.getElementById("stage");
        var FONT_URL = "../fonts/ABCIkarusPlusVariable.ttf";
        var ghostEls = [];

        var FONT_FAMILY = '"IkarusPlusVariable", system-ui, sans-serif';

        /* ABCIkarusPlusVariable axis bounds (fonts/fonts.json) */
        var AXES = {
          CNTR: { min: 0, max: 100, step: 1, default: 0 },
          wght: { min: 200, max: 1000, step: 1, default: 500 },
          wdth: { min: 65, max: 130, step: 1, default: 100 },
          slnt: { min: -12, max: 0, step: 0.25, default: 0 },
        };

        function clampAxis(tag, v) {
          var a = AXES[tag];
          return Math.max(a.min, Math.min(a.max, Number(v)));
        }

        function fmtAxis(tag, v) {
          var a = AXES[tag];
          if (tag === "CNTR") return (Math.round(v * 10) / 10).toFixed(1);
          if (tag === "wght") return Math.round(v).toString();
          return String(v);
        }

        function fvarSettings(slnt) {
          var w = clampAxis("wght", els.wght.value);
          var c = clampAxis("CNTR", els.cntr.value);
          return (
            '"wght" ' +
            fmtAxis("wght", w) +
            ', "wdth" ' +
            AXES.wdth.default +
            ', "slnt" ' +
            fmtAxis("slnt", slnt) +
            ', "CNTR" ' +
            fmtAxis("CNTR", c)
          );
        }

        function applyAxisLimits() {
          var c = AXES.CNTR;
          els.cntr.min = c.min;
          els.cntr.max = c.max;
          els.cntr.step = c.step;
          var w = AXES.wght;
          els.wght.min = w.min;
          els.wght.max = w.max;
          els.wght.step = w.step;
          var s = AXES.slnt;
          [els.sMin, els.sMax].forEach(function (el) {
            el.min = s.min;
            el.max = s.max;
            el.step = s.step;
          });
        }

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function getChar() {
          var v = els.ch ? els.ch.value : "";
          if (!v) return DEFAULTS.ch;
          return Array.from(v)[0];
        }

        function applyChar() {
          glyph.textContent = getChar();
        }

        function buildGhosts() {
          ghostLayer.innerHTML = "";
          ghostEls = [];
          var n = Math.max(1, Math.round(parseFloat(els.gh.value)));
          var sMin = parseFloat(els.sMin.value);
          var sMax = parseFloat(els.sMax.value);
          if (sMin > sMax) {
            var t = sMin;
            sMin = sMax;
            sMax = t;
          }
          var denom = n <= 1 ? 1 : n - 1;
          for (var i = 0; i < n; i++) {
            var s = sMin + ((sMax - sMin) * i) / denom;
            var el = document.createElement("span");
            el.className = "ghost";
            el.textContent = getChar();
            el.style.fontFamily = FONT_FAMILY;
            el.style.fontVariationSettings = fvarSettings(s);
            ghostLayer.appendChild(el);
            ghostEls.push({
              el: el,
              variation: GlyphOutlines.parseVariation(fvarSettings(s)),
            });
          }
          syncOutlines();
        }

        function showNodes() {
          return parseFloat(els.nd.value) >= 1;
        }

        function fontSizePx() {
          return parseFloat(getComputedStyle(root).getPropertyValue("--fs"));
        }

        function outlineTargets(includeGhosts) {
          var ch = getChar();
          var fs = fontSizePx();
          var targets = [
            {
              el: glyph,
              char: ch,
              fontSize: fs,
              variation: GlyphOutlines.parseVariationFromElement(glyph),
              kind: "glyph",
            },
          ];
          if (includeGhosts) {
            var i;
            for (i = 0; i < ghostEls.length; i++) {
              targets.push({
                el: ghostEls[i].el,
                char: ch,
                fontSize: fs,
                variation: ghostEls[i].variation,
                kind: "ghost",
              });
            }
          }
          return targets;
        }

        function syncOutlines(includeGhosts) {
          if (!showNodes() || !window.GlyphOutlines) {
            outlineSvg.style.display = "none";
            return;
          }
          outlineSvg.style.display = "block";
          GlyphOutlines.sync(
            outlineSvg,
            stage,
            outlineTargets(includeGhosts !== false),
            {
              fontUrl: FONT_URL,
              root: root,
              strokeColor: getComputedStyle(root)
                .getPropertyValue("--fg")
                .trim(),
            }
          );
        }

        function frame(now, t0) {
          var cycle = Math.max(200, parseFloat(els.cy.value));
          var hold = Math.max(0, parseFloat(els.hd.value));
          var halfCycle = cycle / 2;
          var total = cycle + 2 * hold;

          var elapsed = (now - t0) % total;
          var p;

          if (elapsed < halfCycle) {
            p = elapsed / halfCycle;
          } else if (elapsed < halfCycle + hold) {
            p = 1;
          } else if (elapsed < halfCycle + hold + halfCycle) {
            p = 1 - (elapsed - halfCycle - hold) / halfCycle;
          } else {
            p = 0;
          }

          var eased = easeInOutCubic(p);

          var sMin = parseFloat(els.sMin.value);
          var sMax = parseFloat(els.sMax.value);
          if (sMin > sMax) {
            var t = sMin;
            sMin = sMax;
            sMax = t;
          }

          var slnt = sMax - (sMax - sMin) * eased;
          glyph.style.fontVariationSettings = fvarSettings(slnt);
          varLabel.textContent = fmtAxis("slnt", slnt);
          syncOutlines(false);

          requestAnimationFrame(function (n2) {
            frame(n2, t0);
          });
        }

        var LS_KEY = "ghost-anim:slant:v2";
        var root = document.documentElement;

        var DEFAULTS = {
          zm: 1,
          bg: "#ffffff",
          fg: "#000000",
          ch: "C",
          fs: 900,
          sk: 1,
          wght: AXES.wght.default,
          cntr: AXES.CNTR.default,
          sMin: AXES.slnt.min,
          sMax: AXES.slnt.max,
          gh: 14,
          cy: 5200,
          hd: 450,
          nd: 1,
        };

        var COLOR_KEYS = { bg: 1, fg: 1 };
        var STRING_KEYS = { ch: 1 };

        var els = {
          zm: document.getElementById("zm"),
          bg: document.getElementById("bg"),
          fg: document.getElementById("fg"),
          ch: document.getElementById("ch"),
          fs: document.getElementById("fs"),
          sk: document.getElementById("sk"),
          wght: document.getElementById("wght"),
          cntr: document.getElementById("cntr"),
          sMin: document.getElementById("sMin"),
          sMax: document.getElementById("sMax"),
          gh: document.getElementById("gh"),
          cy: document.getElementById("cy"),
          hd: document.getElementById("hd"),
          nd: document.getElementById("nd"),
        };
        var vals = {
          bg: document.getElementById("bgVal"),
          fg: document.getElementById("fgVal"),
          fs: document.getElementById("fsVal"),
          sk: document.getElementById("skVal"),
          wght: document.getElementById("wghtVal"),
          cntr: document.getElementById("cntrVal"),
          gh: document.getElementById("ghVal"),
          cy: document.getElementById("cyVal"),
          hd: document.getElementById("hdVal"),
          nd: document.getElementById("ndVal"),
        };

        var sVal = document.getElementById("sVal");
        var sFill = document.getElementById("sFill");

        function fmt(key, v) {
          if (key === "bg" || key === "fg") return String(v).toLowerCase();
          if (key === "zm") return Math.round(Number(v) * 100) + "%";
          if (key === "fs") return Math.round(Number(v)) + "px";
          if (key === "sk") return Number(v).toFixed(1) + "px";
          if (key === "gh") return Math.round(Number(v)) + "";
          if (key === "cy") return (Number(v) / 1000).toFixed(1) + "s";
          if (key === "hd") return Math.round(Number(v)) + "ms";
          if (key === "nd") return Number(v) >= 1 ? "on" : "off";
          return String(v);
        }

        function updateSlntUI() {
          var a = parseFloat(els.sMin.value);
          var b = parseFloat(els.sMax.value);
          var min = parseFloat(els.sMin.min);
          var max = parseFloat(els.sMin.max);
          var lo = Math.min(a, b);
          var hi = Math.max(a, b);
          var loPct = ((lo - min) / (max - min)) * 100;
          var hiPct = ((hi - min) / (max - min)) * 100;
          sFill.style.left = loPct + "%";
          sFill.style.width = Math.max(0, hiPct - loPct) + "%";
          sVal.textContent = fmtAxis("slnt", lo) + " / " + fmtAxis("slnt", hi);
        }

        var ghostErode = document.getElementById("ghost-erode");

        function applyVar(key, v) {
          if (key === "zm") root.style.setProperty("--zoom", v);
          else if (key === "bg") root.style.setProperty("--bg", v);
          else if (key === "fg") root.style.setProperty("--fg", v);
          else if (key === "fs") root.style.setProperty("--fs", v);
          else if (key === "sk") {
            root.style.setProperty("--stroke", v);
            if (ghostErode) {
              ghostErode.setAttribute("radius", String(Math.max(0.1, Number(v))));
            }
          }
        }

        function setValue(key, v, persist) {
          if (key === "zm") {
            v = persist !== false ? ArtboardZoom.write(v) : ArtboardZoom.clamp(v);
          } else if (key === "cntr") v = clampAxis("CNTR", v);
          else if (key === "wght") v = clampAxis("wght", v);
          else if (key === "sMin" || key === "sMax") v = clampAxis("slnt", v);
          els[key].value = v;
          if (key === "sMin" || key === "sMax") {
            updateSlntUI();
          } else if (key === "wght" && vals.wght) {
            vals.wght.textContent = fmtAxis("wght", v);
          } else if (key === "cntr" && vals.cntr) {
            vals.cntr.textContent = fmtAxis("CNTR", v);
          } else if (vals[key]) {
            vals[key].textContent = fmt(key, v);
          }
          if (key === "ch") applyChar();
          applyVar(key, v);
          if (key === "nd" || key === "fg" || key === "fs") syncOutlines();
          if (persist !== false) save();
        }

        function save() {
          var out = {};
          Object.keys(els).forEach(function (k) {
            if (k === "zm") return;
            out[k] = COLOR_KEYS[k] || STRING_KEYS[k]
              ? els[k].value
              : parseFloat(els[k].value);
          });
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(out));
          } catch (e) {}
        }

        function load() {
          var raw;
          try {
            raw = localStorage.getItem(LS_KEY);
          } catch (e) {
            raw = null;
          }
          var data = DEFAULTS;
          if (raw) {
            try {
              var parsed = JSON.parse(raw);
              data = Object.assign({}, DEFAULTS, parsed);
            } catch (e) {}
          }
          data.zm = ArtboardZoom.resolve(data.zm);
          Object.keys(els).forEach(function (k) {
            setValue(k, data[k], false);
          });
        }

        ArtboardZoom.onChange(function (z) {
          setValue("zm", z, false);
          syncOutlines();
        });

        Object.keys(els).forEach(function (k) {
          if (k === "zm") return;
          els[k].addEventListener("input", function () {
            var v = COLOR_KEYS[k] || STRING_KEYS[k]
              ? els[k].value
              : parseFloat(els[k].value);
            setValue(k, v);
            if (
              k === "ch" ||
              k === "gh" ||
              k === "sMin" ||
              k === "sMax" ||
              k === "cntr" ||
              k === "wght"
            ) {
              buildGhosts();
            }
            if (k === "nd" || k === "fs" || k === "fg") syncOutlines();
          });
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
          Object.keys(DEFAULTS).forEach(function (k) {
            setValue(k, DEFAULTS[k]);
          });
          buildGhosts();
        });

        applyAxisLimits();
        load();

        function start() {
          buildGhosts();
          requestAnimationFrame(function (n) {
            frame(n, n);
          });
        }

        if (document.fonts && document.fonts.load) {
          Promise.all([
            document.fonts.load(
              "1 " + AXES.wght.default + " 100px " + FONT_FAMILY
            ),
            document.fonts.ready,
          ])
            .then(start)
            .catch(start);
        } else if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(start);
        } else {
          start();
        }
      })();
    </script>
  </body>
</html>
