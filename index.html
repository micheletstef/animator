<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>animator</title>
    <style>
      :root {
        color-scheme: light;
        --ar-w: 1080;
        --ar-h: 1440;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 320px 320px 1fr;
        align-items: stretch;
        min-height: calc(100vh - 36px);
      }

      .assets-directory {
        padding-right: 12px;
      }

      .settings-panel {
        padding-left: 12px;
        padding-right: 12px;
      }

      .assets-directory,
      .settings-panel {
        position: relative;
        height: 100%;
        background: transparent;
        border-right: 1px solid rgba(31, 31, 31, 0.16);
      }

      .assets-title-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        margin-bottom: 6px;
      }

      .assets-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .assets-status {
        color: #6a6a6a;
        font-size: 12px;
        margin: 0;
      }

      .settings-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .settings-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
        padding-left: 10px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .marquee-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .marquee-choice {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
      }

      .marquee-choice.inactive {
        color: #5d5d5d;
        text-decoration: line-through;
      }

      .marquee-choice:hover,
      .marquee-choice:focus {
        text-decoration: underline;
        outline: none;
      }

      .editor-shell {
        padding-left: 24px;
        position: relative;
        min-width: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .editor-stage {
        flex: 1;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        width: 100%;
        min-height: calc(100vh - 120px);
        padding-top: 0;
      }

      .artboard-wrap {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        width: 100%;
        max-width: 100%;
      }

      .artboard {
        position: relative;
        aspect-ratio: var(--ar-w) / var(--ar-h);
        --stage-max-h: calc(100vh - 120px);
        --stage-max-w: calc(100vw - 24px - 24px - 320px - 320px - 24px);
        height: min(
          var(--stage-max-h),
          calc(var(--stage-max-w) * var(--ar-h) / var(--ar-w))
        );
        width: auto;
        max-width: var(--stage-max-w);
        max-height: var(--stage-max-h);
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.22);
      }

      .artboard-badge {
        position: absolute;
        left: 6px;
        top: 4px;
        font-size: 11px;
        text-transform: lowercase;
        color: #6a6a6a;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="assets-directory" aria-label="Project">
        <div class="assets-title-row">
          <h2 class="assets-title">animator</h2>
        </div>
        <p class="assets-status">typography / instagram</p>
      </aside>
      <aside class="settings-panel" aria-label="Settings">
        <div class="settings-title-row">
          <h2 class="settings-title">settings</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">format</span>
          <div
            class="marquee-toggle"
            id="ratioGroup"
            role="radiogroup"
            aria-label="Frame format"
          >
            <button
              type="button"
              class="marquee-choice"
              data-w="1080"
              data-h="1440"
              data-label="3:4"
              role="radio"
              aria-checked="true"
            >
              1080 × 1440
            </button>
            <span>/</span>
            <button
              type="button"
              class="marquee-choice inactive"
              data-w="1080"
              data-h="1080"
              data-label="1:1"
              role="radio"
              aria-checked="false"
            >
              1080 × 1080
            </button>
            <span>/</span>
            <button
              type="button"
              class="marquee-choice inactive"
              data-w="1080"
              data-h="1920"
              data-label="reels"
              role="radio"
              aria-checked="false"
            >
              1080 × 1920
            </button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">size</span>
          <span class="assets-status" id="metaReadout">1080 × 1440 (3:4)</span>
        </div>
      </aside>
      <main class="editor-shell">
        <div class="editor-stage">
          <div class="artboard-wrap">
            <div
              class="artboard"
              id="artboard"
              role="img"
              aria-label="Frame 1080 by 1440 pixels"
            >
              <span class="artboard-badge" id="artboardBadge">3:4</span>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var artboard = document.getElementById("artboard");
        var metaReadout = document.getElementById("metaReadout");
        var artboardBadge = document.getElementById("artboardBadge");
        var buttons = document.querySelectorAll("#ratioGroup .marquee-choice");

        function gcd(a, b) {
          return b ? gcd(b, a % b) : a;
        }

        function ratioLabel(w, h) {
          var g = gcd(w, h);
          return w / g + ":" + h / g;
        }

        function setRatio(w, h, shortLabel) {
          root.style.setProperty("--ar-w", String(w));
          root.style.setProperty("--ar-h", String(h));
          metaReadout.textContent =
            w + " × " + h + " (" + ratioLabel(w, h) + ")";
          artboardBadge.textContent = shortLabel;
          artboard.setAttribute(
            "aria-label",
            "Frame " + w + " by " + h + " pixels"
          );
        }

        function activate(btn) {
          buttons.forEach(function (b) {
            var on = b === btn;
            b.classList.toggle("inactive", !on);
            b.setAttribute("aria-checked", on ? "true" : "false");
          });
          var w = parseInt(btn.getAttribute("data-w"), 10);
          var h = parseInt(btn.getAttribute("data-h"), 10);
          var label = btn.getAttribute("data-label") || "";
          setRatio(w, h, label);
        }

        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            activate(btn);
          });
        });
      })();
    </script>
  </body>
</html>
