<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>animator</title>
    <style>
      :root {
        color-scheme: light;
        --ar-w: 1080;
        --ar-h: 1440;
        --artboard-bg: #ffffff;
        --editor-view-h: 320px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: minmax(240px, 280px) minmax(320px, 1fr) minmax(
          260px,
          360px
        );
        align-items: stretch;
        min-height: calc(100vh - 48px);
        gap: 0;
      }

      .settings-panel {
        position: relative;
        height: 100%;
        padding-right: 16px;
        background: transparent;
        border-right: 1px solid rgba(31, 31, 31, 0.16);
      }

      .settings-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .settings-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        padding-left: 2px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .settings-muted {
        color: #6a6a6a;
        font-size: 12px;
      }

      .zoom-fit-btn {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        text-transform: lowercase;
      }

      .zoom-fit-btn:hover,
      .zoom-fit-btn:focus {
        text-decoration: underline;
        outline: none;
      }

      .column-title .output-size-readout {
        color: #6a6a6a;
        font-weight: 400;
      }

      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .settings-actions button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        text-transform: lowercase;
        text-decoration: underline;
      }

      .settings-actions button:hover,
      .settings-actions button:focus {
        outline: none;
      }

      input[type="color"] {
        width: 100%;
        max-width: 120px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.22);
        cursor: pointer;
        background: transparent;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .column-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        color: #6a6a6a;
      }

      .output-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      .output-zoom-controls {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .output-zoom-controls button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0 4px;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 14px;
        line-height: 1;
        min-width: 22px;
      }

      .output-zoom-controls button:hover,
      .output-zoom-controls button:focus {
        text-decoration: underline;
        outline: none;
      }

      .output-zoom-readout {
        font-size: 11px;
        color: #6a6a6a;
        min-width: 36px;
        text-align: center;
      }

      .output-zoom-hint {
        font-size: 10px;
        color: #9a9a9a;
        margin: 0 0 6px 0;
        text-transform: lowercase;
      }

      .output-column,
      .editor-column {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        padding-left: 20px;
      }

      .output-column {
        border-right: 1px solid rgba(31, 31, 31, 0.12);
        padding-right: 16px;
      }

      .output-viewport {
        flex: 1;
        min-height: min(70vh, 560px);
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        overflow: auto;
        --marquee-duration: 32s;
      }

      .output-viewport.is-marquee {
        overflow: hidden;
        align-items: center;
        justify-content: center;
      }

      .output-marquee-window {
        display: contents;
      }

      .output-viewport.is-marquee .output-marquee-window {
        display: block;
        overflow: hidden;
        flex-shrink: 0;
      }

      .output-marquee-track {
        display: flex;
        flex-direction: row;
        flex-shrink: 0;
        width: max-content;
        height: max-content;
        align-items: center;
        justify-content: center;
      }

      .output-scene-frame {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--artboard-bg);
        outline: 1px solid rgba(31, 31, 31, 0.32);
        outline-offset: -1px;
      }

      .output-artwork-marquee-track {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        width: max-content;
        height: 100%;
        align-items: stretch;
        will-change: transform;
      }

      .output-viewport:not(.is-marquee) .output-artwork-marquee-track {
        width: 100%;
        height: 100%;
        transform: none !important;
        animation: none !important;
      }

      .output-viewport.is-marquee .output-artwork-marquee-track {
        animation: outMarqueeArtX var(--marquee-duration) linear infinite;
      }

      .output-viewport.is-marquee.marquee-axis-y .output-artwork-marquee-track {
        flex-direction: column;
        width: 100%;
        height: max-content;
        animation-name: outMarqueeArtY;
      }

      .output-viewport.is-marquee.marquee-rev .output-artwork-marquee-track {
        animation-direction: reverse;
      }

      @keyframes outMarqueeArtX {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-50%, 0, 0);
        }
      }

      @keyframes outMarqueeArtY {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(0, -50%, 0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .output-viewport.is-marquee .output-artwork-marquee-track {
          animation: none;
        }
      }

      .marquee-art-cell {
        flex-shrink: 0;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
      }

      .output-viewport:not(.is-marquee) .marquee-art-cell {
        width: 100%;
        height: 100%;
      }

      .output-viewport.is-marquee .marquee-art-cell {
        width: calc(var(--ar-w) * 1px);
        height: calc(var(--ar-h) * 1px);
      }

      .output-viewport:not(.is-marquee) .marquee-art-cell--dup {
        display: none !important;
      }

      .output-marquee-panel {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .output-scale-outer {
        flex-shrink: 0;
      }

      .output-scale-inner {
        transform-origin: 0 0;
      }

      .scene {
        position: relative;
        background-color: var(--artboard-bg);
        background-image: none;
        overflow: hidden;
        outline: 1px solid rgba(31, 31, 31, 0.32);
        outline-offset: -1px;
        flex-shrink: 0;
      }

      .scene-mirror {
        pointer-events: none;
      }

      .scene-mirror .scene-badge {
        display: none;
      }

      .scene-mirror .artboard-item {
        border-color: transparent;
        background: transparent;
      }

      .scene-mirror .scene-height-grip,
      .scene-mirror .frame-handles {
        display: none !important;
      }

      .scene-height-grip {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 12px;
        cursor: ns-resize;
        z-index: 55;
        touch-action: none;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(0, 0, 0, 0.08)
        );
      }

      .scene-height-grip:hover {
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(0, 0, 0, 0.14)
        );
      }

      .scene-badge {
        position: absolute;
        left: 10px;
        top: 8px;
        font-size: 22px;
        text-transform: lowercase;
        color: rgba(106, 106, 106, 0.85);
        pointer-events: none;
        white-space: nowrap;
        z-index: 50;
      }

      .editor-column {
        padding-right: 4px;
      }

      .editor-scroll {
        height: var(--editor-view-h);
        min-height: 180px;
        max-height: min(92vh, 900px);
        overflow: auto;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .editor-scale-outer {
        flex-shrink: 0;
        margin-bottom: 48px;
      }

      .editor-scale-inner {
        transform-origin: 0 0;
      }

      .editor-resize-handle {
        margin-top: 4px;
        height: 10px;
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.1);
        cursor: ns-resize;
        flex-shrink: 0;
        touch-action: none;
      }

      .editor-resize-handle:hover {
        background: rgba(0, 0, 0, 0.16);
      }

      .artboard-item {
        position: absolute;
        z-index: 2;
        border: 1px dashed rgba(0, 0, 0, 0.28);
        background: rgba(255, 255, 255, 0.4);
        min-width: 32px;
        min-height: 28px;
        box-sizing: border-box;
      }

      .artboard-drag-handle {
        height: 36px;
        background: rgba(0, 0, 0, 0.07);
        cursor: grab;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 18px;
        letter-spacing: 0.08em;
        color: #888;
        text-transform: lowercase;
        user-select: none;
      }

      .artboard-drag-handle:active {
        cursor: grabbing;
      }

      .artboard-text-inner {
        padding: 12px 16px 20px;
        outline: none;
        min-height: 1.2em;
        font-size: 32px;
        line-height: 40px;
        letter-spacing: 0px;
        word-spacing: 0px;
        word-break: break-word;
        cursor: grab;
      }

      .artboard-text-inner:focus {
        cursor: text;
      }

      .scene .artboard-text-inner * {
        line-height: inherit;
        letter-spacing: inherit;
        word-spacing: inherit;
        font-size: inherit;
        font-family: inherit;
        color: inherit;
        cursor: inherit;
      }

      .artboard-item.artboard-text {
        display: flex;
        flex-direction: column;
      }

      .artboard-text--sized .artboard-text-inner {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      .artboard-item.artboard-text.is-text-selected {
        border: 2px solid #1f1f1f;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.95),
          0 2px 12px rgba(0, 0, 0, 0.18);
        z-index: 12;
      }

      .frame-handles {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 6;
        opacity: 0;
        transition: opacity 0.1s ease;
      }

      .artboard-text.is-text-selected .frame-handles {
        opacity: 1;
      }

      .frame-handle {
        position: absolute;
        width: 14px;
        height: 14px;
        margin: 0;
        padding: 0;
        border: 2px solid #1f1f1f;
        background: #fff;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.9),
          0 1px 4px rgba(0, 0, 0, 0.35);
        pointer-events: auto;
        box-sizing: border-box;
      }

      .frame-handle:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.55),
          0 1px 4px rgba(0, 0, 0, 0.35);
      }

      .frame-handle--nw {
        left: 2px;
        top: 2px;
        cursor: nwse-resize;
      }

      .frame-handle--ne {
        right: 2px;
        top: 2px;
        cursor: nesw-resize;
      }

      .frame-handle--sw {
        left: 2px;
        bottom: 2px;
        cursor: nesw-resize;
      }

      .frame-handle--se {
        right: 2px;
        bottom: 2px;
        cursor: nwse-resize;
      }

      .artboard-item.artboard-image {
        display: flex;
        flex-direction: column;
        left: 12%;
        top: 18%;
        width: 76%;
        max-height: 55%;
      }

      .artboard-item.artboard-image img {
        display: block;
        width: 100%;
        height: auto;
        max-height: calc(100% - 36px);
        object-fit: contain;
        pointer-events: none;
        flex: 1;
        min-height: 0;
      }

      .typography-block {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(31, 31, 31, 0.12);
      }

      .typography-block[hidden] {
        display: none !important;
      }

      .typography-block .settings-title {
        color: #6a6a6a;
      }

      .typography-select {
        width: 100%;
        max-width: 100%;
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        line-height: 1.2;
        padding: 4px 6px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: #fff;
        color: #1f1f1f;
      }

      .vf-axis-host {
        margin-top: 8px;
        padding-left: 2px;
      }

      .vf-axis-host[hidden] {
        display: none !important;
      }

      .vf-axis-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .vf-axis-row label {
        text-transform: lowercase;
        font-size: 11px;
        color: #444;
      }

      .vf-axis-row input[type="range"] {
        width: 100%;
        max-width: 160px;
      }

      .vf-axis-val {
        font-size: 10px;
        color: #6a6a6a;
        min-width: 28px;
        text-align: right;
      }

      .typography-subhead {
        margin: 10px 0 4px 2px;
        font-size: 10px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #888;
      }

      .typography-subhead[hidden] {
        display: none !important;
      }

      .typography-num {
        width: 100%;
        max-width: 112px;
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        padding: 4px 6px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: #fff;
        color: #1f1f1f;
      }

      .typography-inline {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
      }

      .typography-check {
        font-size: 11px;
        text-transform: lowercase;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .typography-check input {
        margin: 0;
      }

      .saved-artboards-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
        max-height: 200px;
        overflow: auto;
      }

      .saved-artboards-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 5px 2px;
        border-bottom: 1px solid rgba(31, 31, 31, 0.1);
      }

      .saved-artboards-list .saved-load-btn {
        flex: 1;
        text-align: left;
        border: 0;
        background: transparent;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        line-height: 1.25;
        color: #1f1f1f;
        text-decoration: underline;
        padding: 0;
        min-width: 0;
      }

      .saved-artboards-list .saved-load-btn:hover,
      .saved-artboards-list .saved-load-btn:focus {
        outline: none;
      }

      .saved-artboards-list .saved-del-btn {
        border: 0;
        background: transparent;
        color: #888;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 4px;
        flex-shrink: 0;
      }

      .saved-artboards-list .saved-del-btn:hover,
      .saved-artboards-list .saved-del-btn:focus {
        color: #1f1f1f;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="settings-panel" aria-label="Settings">
        <div class="settings-title-row">
          <h2 class="settings-title">settings</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">format</span>
          <select id="formatSelect" class="typography-select" aria-label="Frame format">
            <option value="1080-1440" data-w="1080" data-h="1440" data-label="3:4" selected>
              1080 × 1440 (3:4)
            </option>
            <option value="1080-1080" data-w="1080" data-h="1080" data-label="1:1">
              1080 × 1080 (1:1)
            </option>
            <option value="1080-1920" data-w="1080" data-h="1920" data-label="reels">
              1080 × 1920 (reels)
            </option>
          </select>
        </div>
        <div class="settings-row">
          <span class="settings-label">background</span>
          <input type="color" id="bgColor" value="#ffffff" aria-label="Artboard background" />
        </div>
        <div class="settings-title-row" style="margin-top: 10px">
          <h2 class="settings-title">output loop</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">marquee</span>
          <label class="typography-check"
            ><input type="checkbox" id="marqueeEnabled" aria-label="Infinite marquee on output" />
            on</label
          >
        </div>
        <div class="settings-row marquee-extra" id="marqueeSpeedRow" hidden>
          <span class="settings-label">speed</span>
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
            <input
              type="range"
              id="marqueeSpeed"
              min="6"
              max="90"
              value="32"
              step="1"
              aria-label="Seconds per loop"
              style="width: min(140px, 100%)"
            />
            <span class="settings-muted" id="marqueeSpeedLabel">32s loop</span>
          </div>
        </div>
        <div class="settings-row marquee-extra" id="marqueeDirRow" hidden>
          <span class="settings-label">direction</span>
          <select id="marqueeDirection" class="typography-select" aria-label="Marquee direction">
            <option value="left">left</option>
            <option value="right">right</option>
            <option value="up">up</option>
            <option value="down">down</option>
          </select>
        </div>
        <div id="typographyBlock" class="typography-block" hidden>
          <div class="settings-title-row">
            <h2 class="settings-title">text</h2>
          </div>
          <div class="settings-row">
            <span class="settings-label">font</span>
            <select id="activeTextFontSelect" class="typography-select" aria-label="Font for selected text"></select>
          </div>
          <p class="typography-subhead">character</p>
          <div class="settings-row">
            <span class="settings-label">size</span>
            <input
              type="number"
              class="typography-num"
              id="textFontSize"
              min="4"
              max="1200"
              value="32"
              step="1"
              aria-label="Font size in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">leading</span>
            <input
              type="number"
              class="typography-num"
              id="textLineHeight"
              min="0.4"
              max="5"
              value="1.25"
              step="0.05"
              aria-label="Line height"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">tracking</span>
            <input
              type="number"
              class="typography-num"
              id="textTracking"
              min="-80"
              max="200"
              value="0"
              step="0.5"
              aria-label="Letter spacing in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">word</span>
            <input
              type="number"
              class="typography-num"
              id="textWordSpace"
              min="-40"
              max="120"
              value="0"
              step="0.5"
              aria-label="Word spacing in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">h scale</span>
            <input
              type="number"
              class="typography-num"
              id="textHorizScale"
              min="10"
              max="300"
              value="100"
              step="1"
              aria-label="Horizontal scale percent"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">baseline</span>
            <input
              type="number"
              class="typography-num"
              id="textBaselineShift"
              min="-240"
              max="240"
              value="0"
              step="1"
              aria-label="Baseline shift in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">align</span>
            <select id="textAlign" class="typography-select" aria-label="Paragraph alignment">
              <option value="left">left</option>
              <option value="center">center</option>
              <option value="right">right</option>
              <option value="justify">justify</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">case</span>
            <select id="textCase" class="typography-select" aria-label="Capitalization">
              <option value="normal">normal</option>
              <option value="uppercase">all caps</option>
              <option value="small-caps">small caps</option>
              <option value="all-small-caps">all small caps</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">decor</span>
            <div class="typography-inline">
              <label class="typography-check"
                ><input type="checkbox" id="textDecUnderline" /> underline</label
              >
              <label class="typography-check"
                ><input type="checkbox" id="textDecStrike" /> strike</label
              >
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">color</span>
            <input
              type="color"
              id="activeTextColor"
              value="#1f1f1f"
              aria-label="Text color for selected text"
            />
          </div>
          <p class="typography-subhead" id="vfAxesTitle" hidden>axes</p>
          <div id="vfAxisHost" class="vf-axis-host" hidden></div>
        </div>
        <div class="settings-title-row" style="margin-top: 14px">
          <h2 class="settings-title">saved artboards</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">name</span>
          <input
            type="text"
            class="typography-num"
            id="saveArtboardName"
            maxlength="80"
            placeholder="label"
            aria-label="Name for saved artboard"
            style="max-width: 100%"
          />
        </div>
        <div class="settings-row">
          <span class="settings-label"></span>
          <div class="settings-actions">
            <button type="button" id="saveArtboardBtn">save to list</button>
          </div>
        </div>
        <ul class="saved-artboards-list" id="savedArtboardsList" aria-label="Saved artboards"></ul>
        <div class="settings-title-row" style="margin-top: 14px">
          <h2 class="settings-title">add</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label"></span>
          <div class="settings-actions">
            <button type="button" id="addText">text box</button>
            <button type="button" id="addImage">image</button>
          </div>
        </div>
        <input type="file" id="imageFile" accept="image/*" hidden />
      </aside>

      <section class="output-column" aria-label="Output preview">
        <div class="output-header">
          <p class="column-title">
            output
            <span class="output-size-readout" id="outputSizeReadout">(1080 × 1440)</span>
          </p>
          <div class="output-zoom-controls" role="group" aria-label="Output zoom">
            <button type="button" id="outputZoomOut" aria-label="Zoom out">−</button>
            <span class="output-zoom-readout" id="outputZoomReadout">100%</span>
            <button type="button" id="outputZoomIn" aria-label="Zoom in">+</button>
            <button type="button" class="zoom-fit-btn" id="outputZoomFit" aria-label="Fit to view">
              fit
            </button>
          </div>
        </div>
        <p class="output-zoom-hint">ctrl / ⌘ + scroll to zoom</p>
        <div class="output-viewport" id="outputViewport">
          <div class="output-marquee-window" id="outputMarqueeWindow">
            <div class="output-marquee-track" id="outputMarqueeTrack">
              <div class="output-marquee-panel">
                <div class="output-scale-outer" id="outputScaleOuter">
                  <div class="output-scale-inner" id="outputScaleInner">
                    <div class="output-scene-frame" id="outputSceneFrame">
                      <div
                        class="output-artwork-marquee-track"
                        id="outputArtworkMarqueeTrack"
                        aria-hidden="true"
                      >
                        <div
                          class="marquee-art-cell scene-mirror"
                          id="marqueeArtCellA"
                          role="presentation"
                          aria-hidden="true"
                        ></div>
                        <div
                          class="marquee-art-cell marquee-art-cell--dup scene-mirror"
                          id="marqueeArtCellB"
                          role="presentation"
                          aria-hidden="true"
                        ></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="editor-column" aria-label="Editor artboard">
        <p class="column-title">artboard</p>
        <div class="editor-scroll" id="editorScroll">
          <div class="editor-scale-outer" id="editorScaleOuter">
            <div class="editor-scale-inner" id="editorScaleInner">
              <div
                class="scene"
                id="scene"
                role="region"
                aria-label="Frame 1080 by 1440 pixels"
              >
                <span class="scene-badge" id="sceneBadge">3:4</span>
                <div
                  class="scene-height-grip"
                  id="sceneHeightGrip"
                  aria-hidden="true"
                  title="Drag to extend artboard height"
                ></div>
              </div>
            </div>
          </div>
        </div>
        <div
          class="editor-resize-handle"
          id="editorResizeHandle"
          role="separator"
          aria-orientation="horizontal"
          aria-label="Drag to change artboard panel height"
        ></div>
      </section>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var scene = document.getElementById("scene");
        var sceneBadge = document.getElementById("sceneBadge");
        var formatSelect = document.getElementById("formatSelect");
        var outputSizeReadout = document.getElementById("outputSizeReadout");
        var bgColor = document.getElementById("bgColor");
        var addText = document.getElementById("addText");
        var addImage = document.getElementById("addImage");
        var imageFile = document.getElementById("imageFile");
        var typographyBlock = document.getElementById("typographyBlock");
        var activeTextFontSelect = document.getElementById("activeTextFontSelect");
        var activeTextColor = document.getElementById("activeTextColor");
        var vfAxisHost = document.getElementById("vfAxisHost");
        var vfAxesTitle = document.getElementById("vfAxesTitle");
        var textFontSize = document.getElementById("textFontSize");
        var textLineHeight = document.getElementById("textLineHeight");
        var textTracking = document.getElementById("textTracking");
        var textWordSpace = document.getElementById("textWordSpace");
        var textHorizScale = document.getElementById("textHorizScale");
        var textBaselineShift = document.getElementById("textBaselineShift");
        var textAlign = document.getElementById("textAlign");
        var textCase = document.getElementById("textCase");
        var textDecUnderline = document.getElementById("textDecUnderline");
        var textDecStrike = document.getElementById("textDecStrike");

        var outputViewport = document.getElementById("outputViewport");
        var outputMarqueeTrack = document.getElementById("outputMarqueeTrack");
        var outputMarqueeWindow = document.getElementById("outputMarqueeWindow");
        var outputScaleOuter = document.getElementById("outputScaleOuter");
        var outputScaleInner = document.getElementById("outputScaleInner");
        var marqueeArtCellA = document.getElementById("marqueeArtCellA");
        var marqueeArtCellB = document.getElementById("marqueeArtCellB");
        var marqueeEnabled = document.getElementById("marqueeEnabled");
        var marqueeSpeed = document.getElementById("marqueeSpeed");
        var marqueeSpeedLabel = document.getElementById("marqueeSpeedLabel");
        var marqueeDirection = document.getElementById("marqueeDirection");
        var marqueeSpeedRow = document.getElementById("marqueeSpeedRow");
        var marqueeDirRow = document.getElementById("marqueeDirRow");
        var editorScroll = document.getElementById("editorScroll");
        var editorScaleOuter = document.getElementById("editorScaleOuter");
        var editorScaleInner = document.getElementById("editorScaleInner");
        var editorResizeHandle = document.getElementById("editorResizeHandle");
        var sceneHeightGrip = document.getElementById("sceneHeightGrip");
        var outputZoomInBtn = document.getElementById("outputZoomIn");
        var outputZoomOutBtn = document.getElementById("outputZoomOut");
        var outputZoomFitBtn = document.getElementById("outputZoomFit");
        var outputZoomReadout = document.getElementById("outputZoomReadout");
        var saveArtboardName = document.getElementById("saveArtboardName");
        var saveArtboardBtn = document.getElementById("saveArtboardBtn");
        var savedArtboardsList = document.getElementById("savedArtboardsList");
        var settingsPanelEl = document.querySelector(".settings-panel");

        var logicalW = 1080;
        var logicalH = 1440;
        var mirrorTimer = null;
        var editorScaleStored = 0.25;
        var outputZoomFactor = 1;
        var OUTPUT_ZOOM_MIN = 0.25;
        var OUTPUT_ZOOM_MAX = 4;
        var fontManifest = null;
        var fontRegistry = {};
        var activeTextInner = null;
        var selectedTextWrap = null;
        var formatPresetMinH = 1440;

        var LS_SESSION = "animator:session:v1";
        var LS_LIBRARY = "animator:library:v1";
        var restoringSnapshot = false;
        var sessionPersistTimer = null;
        var persistenceWired = false;

        function readJSON(key) {
          try {
            var raw = localStorage.getItem(key);
            if (!raw) return null;
            return JSON.parse(raw);
          } catch (e) {
            return null;
          }
        }

        function writeJSON(key, val) {
          try {
            localStorage.setItem(key, JSON.stringify(val));
          } catch (e) {
            console.warn("localStorage write failed", key, e);
          }
        }

        function collectTypographySnapshot() {
          return {
            textFontSize: textFontSize ? textFontSize.value : "",
            textLineHeight: textLineHeight ? textLineHeight.value : "",
            textTracking: textTracking ? textTracking.value : "",
            textWordSpace: textWordSpace ? textWordSpace.value : "",
            textHorizScale: textHorizScale ? textHorizScale.value : "",
            textBaselineShift: textBaselineShift ? textBaselineShift.value : "",
            textAlign: textAlign ? textAlign.value : "",
            textCase: textCase ? textCase.value : "",
            textDecUnderline: !!(textDecUnderline && textDecUnderline.checked),
            textDecStrike: !!(textDecStrike && textDecStrike.checked),
            activeTextColor: activeTextColor ? activeTextColor.value : "",
            activeTextFontSelect: activeTextFontSelect ? activeTextFontSelect.value : ""
          };
        }

        function applyTypographySnapshot(tp) {
          if (!tp || typeof tp !== "object") return;
          if (tp.textFontSize != null && textFontSize) textFontSize.value = tp.textFontSize;
          if (tp.textLineHeight != null && textLineHeight) textLineHeight.value = tp.textLineHeight;
          if (tp.textTracking != null && textTracking) textTracking.value = tp.textTracking;
          if (tp.textWordSpace != null && textWordSpace) textWordSpace.value = tp.textWordSpace;
          if (tp.textHorizScale != null && textHorizScale) textHorizScale.value = tp.textHorizScale;
          if (tp.textBaselineShift != null && textBaselineShift) {
            textBaselineShift.value = tp.textBaselineShift;
          }
          if (tp.textAlign != null && textAlign) textAlign.value = tp.textAlign;
          if (tp.textCase != null && textCase) textCase.value = tp.textCase;
          if (textDecUnderline) textDecUnderline.checked = !!tp.textDecUnderline;
          if (textDecStrike) textDecStrike.checked = !!tp.textDecStrike;
          if (tp.activeTextColor != null && activeTextColor) {
            activeTextColor.value = tp.activeTextColor;
          }
          if (tp.activeTextFontSelect != null && activeTextFontSelect) {
            if ([].some.call(activeTextFontSelect.options, function (o) {
              return o.value === tp.activeTextFontSelect;
            })) {
              activeTextFontSelect.value = tp.activeTextFontSelect;
            }
          }
        }

        function clearArtboardItems() {
          scene.querySelectorAll(".artboard-item").forEach(function (n) {
            n.remove();
          });
        }

        function rehydrateAllArtboardItems() {
          scene.querySelectorAll(".artboard-item").forEach(function (wrap) {
            if (wrap.classList.contains("artboard-text")) {
              wrap.querySelectorAll(".artboard-drag-handle").forEach(function (n) {
                n.remove();
              });
              var inner = wrap.querySelector(".artboard-text-inner");
              if (!inner) return;
              wrap.querySelectorAll(".frame-handles").forEach(function (n) {
                n.remove();
              });
              attachTextFrameChrome(wrap, inner);
              inner.setAttribute("contenteditable", "true");
              inner.setAttribute("spellcheck", "true");
              inner.addEventListener("input", function () {
                syncMirrorSoon(48);
                scheduleSessionPersist();
              });
              attachTextBoxDrag(wrap, inner, scene);
            } else if (wrap.classList.contains("artboard-image")) {
              var handle = wrap.querySelector(".artboard-drag-handle");
              if (handle) attachDragFixed(handle, wrap, scene);
            }
          });
        }

        function injectItemsHTML(html) {
          clearArtboardItems();
          var holder = document.createElement("div");
          holder.innerHTML = html || "";
          var before = sceneHeightGrip || null;
          [].slice.call(holder.children).forEach(function (el) {
            if (before) scene.insertBefore(el, before);
            else scene.appendChild(el);
          });
          rehydrateAllArtboardItems();
        }

        function cloneItemForSave(node) {
          var c = node.cloneNode(true);
          c.querySelectorAll(".frame-handles").forEach(function (n) {
            n.remove();
          });
          return c;
        }

        function prepareItemsHtmlForSave(done) {
          var items = [].slice.call(scene.querySelectorAll(".artboard-item"));
          if (!items.length) {
            done("");
            return;
          }
          var clones = items.map(function (it) {
            return cloneItemForSave(it);
          });
          var imgs = [];
          clones.forEach(function (cl) {
            cl.querySelectorAll("img").forEach(function (img) {
              imgs.push(img);
            });
          });
          var i = 0;
          function nextImg() {
            if (i >= imgs.length) {
              done(
                clones
                  .map(function (c) {
                    return c.outerHTML;
                  })
                  .join("")
              );
              return;
            }
            var img = imgs[i++];
            var src = img.getAttribute("src") || "";
            if (src.indexOf("data:") === 0) {
              nextImg();
              return;
            }
            if (src.indexOf("blob:") !== 0) {
              nextImg();
              return;
            }
            var im = new Image();
            im.onload = function () {
              try {
                var cnv = document.createElement("canvas");
                cnv.width = im.naturalWidth || 1;
                cnv.height = im.naturalHeight || 1;
                cnv.getContext("2d").drawImage(im, 0, 0);
                img.setAttribute("src", cnv.toDataURL("image/png"));
              } catch (err) {}
              nextImg();
            };
            im.onerror = function () {
              nextImg();
            };
            im.src = src;
          }
          nextImg();
        }

        function buildSnapshotObject(itemsHtml) {
          var evh =
            root.style.getPropertyValue("--editor-view-h").trim() ||
            String(getComputedStyle(root).getPropertyValue("--editor-view-h") || "").trim() ||
            "320px";
          return {
            v: 1,
            logicalW: logicalW,
            logicalH: logicalH,
            format: formatSelect ? formatSelect.value : "1080-1440",
            bg: bgColor ? bgColor.value : "#ffffff",
            marquee: {
              on: !!(marqueeEnabled && marqueeEnabled.checked),
              speed: marqueeSpeed ? String(marqueeSpeed.value) : "32",
              direction: marqueeDirection ? marqueeDirection.value : "left"
            },
            outputZoom: outputZoomFactor,
            editorViewH: evh,
            typography: collectTypographySnapshot(),
            itemsHtml: itemsHtml || ""
          };
        }

        function flushSessionToStorage() {
          if (restoringSnapshot) return;
          prepareItemsHtmlForSave(function (html) {
            writeJSON(LS_SESSION, buildSnapshotObject(html));
          });
        }

        function scheduleSessionPersist() {
          if (restoringSnapshot) return;
          if (sessionPersistTimer) clearTimeout(sessionPersistTimer);
          sessionPersistTimer = setTimeout(function () {
            sessionPersistTimer = null;
            flushSessionToStorage();
          }, 550);
        }

        function applySnapshot(snap) {
          if (!snap || snap.v !== 1) return;
          restoringSnapshot = true;
          try {
            hideTypography();
            if (snap.format && formatSelect) {
              formatSelect.value = snap.format;
            }
            var opt = formatSelect && formatSelect.selectedOptions[0];
            var fw = opt ? parseInt(opt.getAttribute("data-w"), 10) : snap.logicalW;
            var fh = opt ? parseInt(opt.getAttribute("data-h"), 10) : snap.logicalH;
            if (isFinite(fh) && fh > 0) formatPresetMinH = fh;
            logicalW = isFinite(snap.logicalW) ? snap.logicalW : fw || 1080;
            logicalH = isFinite(snap.logicalH) ? snap.logicalH : fh || 1440;
            root.style.setProperty("--ar-w", String(logicalW));
            root.style.setProperty("--ar-h", String(logicalH));
            if (outputSizeReadout) {
              outputSizeReadout.textContent = "(" + logicalW + " × " + logicalH + ")";
            }
            if (sceneBadge && opt) {
              sceneBadge.textContent = opt.getAttribute("data-label") || "";
            }
            scene.setAttribute(
              "aria-label",
              "Frame " + logicalW + " by " + logicalH + " pixels"
            );
            applyLogicalSize(logicalW, logicalH);
            if (snap.bg != null && bgColor) {
              bgColor.value = snap.bg;
              syncBgFromPicker();
            }
            if (snap.marquee) {
              if (marqueeEnabled) marqueeEnabled.checked = !!snap.marquee.on;
              if (marqueeSpeed && snap.marquee.speed != null) {
                marqueeSpeed.value = String(snap.marquee.speed);
              }
              if (marqueeDirection && snap.marquee.direction) {
                marqueeDirection.value = snap.marquee.direction;
              }
            }
            applyMarqueeState();
            outputZoomFactor = clampOutputZoom(
              snap.outputZoom != null ? snap.outputZoom : 1
            );
            if (outputZoomReadout) {
              outputZoomReadout.textContent =
                Math.round(outputZoomFactor * 100) + "%";
            }
            if (snap.editorViewH) {
              root.style.setProperty("--editor-view-h", snap.editorViewH);
            }
            applyTypographySnapshot(snap.typography);
            injectItemsHTML(snap.itemsHtml || "");
            layoutScales();
            syncMirrorSoon(0);
            syncMirror();
          } finally {
            restoringSnapshot = false;
          }
        }

        function readLibrary() {
          var raw = readJSON(LS_LIBRARY);
          return Array.isArray(raw) ? raw : [];
        }

        function writeLibrary(arr) {
          writeJSON(LS_LIBRARY, arr);
        }

        function renderSavedArtboardsList() {
          if (!savedArtboardsList) return;
          var arr = readLibrary().slice().sort(function (a, b) {
            return (b.t || 0) - (a.t || 0);
          });
          savedArtboardsList.innerHTML = "";
          arr.forEach(function (entry) {
            var li = document.createElement("li");
            var loadBtn = document.createElement("button");
            loadBtn.type = "button";
            loadBtn.className = "saved-load-btn";
            loadBtn.textContent = entry.name || "untitled";
            loadBtn.addEventListener("click", function () {
              if (entry.snap) {
                applySnapshot(entry.snap);
                scheduleSessionPersist();
              }
            });
            var delBtn = document.createElement("button");
            delBtn.type = "button";
            delBtn.className = "saved-del-btn";
            delBtn.setAttribute("aria-label", "Delete saved artboard");
            delBtn.textContent = "×";
            delBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              var next = readLibrary().filter(function (x) {
                return x.id !== entry.id;
              });
              writeLibrary(next);
              renderSavedArtboardsList();
            });
            li.appendChild(loadBtn);
            li.appendChild(delBtn);
            savedArtboardsList.appendChild(li);
          });
        }

        function wirePersistence() {
          if (persistenceWired) return;
          persistenceWired = true;
          if (settingsPanelEl) {
            settingsPanelEl.addEventListener("input", scheduleSessionPersist);
            settingsPanelEl.addEventListener("change", scheduleSessionPersist);
          }
          var mo = new MutationObserver(function () {
            scheduleSessionPersist();
          });
          mo.observe(scene, {
            childList: true,
            subtree: true,
            attributes: true,
            characterData: true
          });
          editorResizeHandle.addEventListener("mouseup", scheduleSessionPersist);
          if (sceneHeightGrip) {
            sceneHeightGrip.addEventListener("mouseup", scheduleSessionPersist);
          }
          if (saveArtboardBtn) {
            saveArtboardBtn.addEventListener("click", function () {
              var label = (saveArtboardName && saveArtboardName.value.trim()) || "";
              if (!label) {
                label = "untitled " + new Date().toLocaleString();
              }
              prepareItemsHtmlForSave(function (html) {
                var snap = buildSnapshotObject(html);
                var list = readLibrary();
                list.push({
                  id:
                    "b_" +
                    Date.now().toString(36) +
                    "_" +
                    Math.random().toString(36).slice(2, 8),
                  name: label,
                  t: Date.now(),
                  snap: snap
                });
                writeLibrary(list);
                renderSavedArtboardsList();
                if (saveArtboardName) saveArtboardName.value = "";
              });
            });
          }
        }

        function clearTextFrameSelection() {
          if (selectedTextWrap) {
            selectedTextWrap.classList.remove("is-text-selected");
            selectedTextWrap = null;
          }
        }

        function selectTextWrap(wrap) {
          if (!wrap || !wrap.classList.contains("artboard-text")) return;
          if (selectedTextWrap === wrap) return;
          clearTextFrameSelection();
          selectedTextWrap = wrap;
          wrap.classList.add("is-text-selected");
        }

        function applyLogicalSize(w, h) {
          logicalW = w;
          logicalH = h;
          scene.style.width = w + "px";
          scene.style.height = h + "px";
        }

        function setRatio(w, h, shortLabel) {
          formatPresetMinH = h;
          root.style.setProperty("--ar-w", String(w));
          root.style.setProperty("--ar-h", String(h));
          if (outputSizeReadout) {
            outputSizeReadout.textContent = "(" + w + " × " + h + ")";
          }
          sceneBadge.textContent = shortLabel;
          scene.setAttribute(
            "aria-label",
            "Frame " + w + " by " + h + " pixels"
          );
          applyLogicalSize(w, h);
          layoutScales();
          syncMirrorSoon(0);
        }

        function applyFormatFromSelect() {
          var opt = formatSelect.selectedOptions[0];
          if (!opt) return;
          var w = parseInt(opt.getAttribute("data-w"), 10);
          var h = parseInt(opt.getAttribute("data-h"), 10);
          var label = opt.getAttribute("data-label") || "";
          setRatio(w, h, label);
        }

        formatSelect.addEventListener("change", applyFormatFromSelect);

        function syncBgFromPicker() {
          root.style.setProperty("--artboard-bg", bgColor.value);
        }

        bgColor.addEventListener("input", syncBgFromPicker);
        syncBgFromPicker();

        function hideTypography() {
          clearTextFrameSelection();
          activeTextInner = null;
          typographyBlock.hidden = true;
          vfAxisHost.hidden = true;
          vfAxisHost.innerHTML = "";
          if (vfAxesTitle) vfAxesTitle.hidden = true;
        }

        function readVfMap(inner) {
          var raw = (inner.style && inner.style.fontVariationSettings) || "";
          var map = {};
          if (!raw) return map;
          var re = /'([a-zA-Z]{4})'\s+([-.\d]+)/gi;
          var m;
          while ((m = re.exec(raw))) {
            map[m[1].toLowerCase()] = parseFloat(m[2]);
          }
          return map;
        }

        function writeVfToInner(inner, map) {
          var parts = [];
          Object.keys(map).forEach(function (tag) {
            parts.push("'" + String(tag).toLowerCase() + "' " + map[tag]);
          });
          inner.style.fontVariationSettings = parts.length ? parts.join(", ") : "";
        }

        function applyFontIdToInner(inner, fontId) {
          var f = fontRegistry[fontId];
          if (!inner || !f) return;
          inner.dataset.fontId = fontId;
          if (f.stack) {
            inner.style.fontFamily = f.stack;
            inner.style.fontVariationSettings = "";
          } else if (f.cssFamily) {
            inner.style.fontFamily = "'" + f.cssFamily + "', sans-serif";
            if (f.variable && f.axes) {
              var existing = readVfMap(inner);
              var map = {};
              f.axes.forEach(function (a) {
                var tag = String(a.tag).toLowerCase();
                var v = existing[tag];
                if (v === undefined || isNaN(v)) v = a.default;
                map[tag] = v;
              });
              writeVfToInner(inner, map);
            } else {
              inner.style.fontVariationSettings = "";
            }
          }
        }

        function syncSelectFromInner() {
          if (!activeTextInner) return;
          var id = activeTextInner.dataset.fontId;
          if (id && fontRegistry[id]) {
            activeTextFontSelect.value = id;
          } else if (fontManifest && fontManifest.defaultFontId) {
            activeTextFontSelect.value = fontManifest.defaultFontId;
          }
        }

        function renderVfPanel() {
          vfAxisHost.innerHTML = "";
          if (!activeTextInner) {
            vfAxisHost.hidden = true;
            if (vfAxesTitle) vfAxesTitle.hidden = true;
            return;
          }
          var id = activeTextInner.dataset.fontId;
          var f = id ? fontRegistry[id] : null;
          if (!f || !f.variable || !f.axes || !f.axes.length) {
            vfAxisHost.hidden = true;
            if (vfAxesTitle) vfAxesTitle.hidden = true;
            return;
          }
          vfAxisHost.hidden = false;
          if (vfAxesTitle) vfAxesTitle.hidden = false;
          var vfMap = readVfMap(activeTextInner);
          f.axes.forEach(function (axis) {
            var tag = String(axis.tag).toLowerCase();
            var row = document.createElement("div");
            row.className = "vf-axis-row";
            var lab = document.createElement("label");
            lab.setAttribute("for", "vf-" + tag);
            lab.textContent = axis.name || tag;
            var wrap = document.createElement("div");
            wrap.style.display = "flex";
            wrap.style.alignItems = "center";
            wrap.style.gap = "8px";
            var rng = document.createElement("input");
            rng.type = "range";
            rng.id = "vf-" + tag;
            rng.min = String(axis.min);
            rng.max = String(axis.max);

          wrap.style.left = "72px";
          wrap.style.top = "120px";
          wrap.style.width = "560px";
          var inner = document.createElement("div");
          inner.className = "artboard-text-inner";
          inner.contentEditable = "true";
          inner.setAttribute("spellcheck", "true");
          inner.textContent = "text";
          applyDefaultTextMetrics(inner);
          inner.style.color = activeTextColor ? activeTextColor.value : "#1f1f1f";
          inner.addEventListener("input", function () {
            syncMirrorSoon(48);
            scheduleSessionPersist();
          });
          wrap.appendChild(inner);
          attachTextFrameChrome(wrap, inner);
          if (sceneHeightGrip) {
            scene.insertBefore(wrap, sceneHeightGrip);
          } else {
            scene.appendChild(wrap);
          }
          attachTextBoxDrag(wrap, inner, scene);
          if (fontManifest && fontManifest.defaultFontId) {
            applyFontIdToInner(inner, fontManifest.defaultFontId);
          }
          setActiveTextInner(inner);
          syncMirrorSoon(0);
          scheduleSessionPersist();
        });

        addImage.addEventListener("click", function () {
          imageFile.click();
        });

        imageFile.addEventListener("change", function () {
          var f = imageFile.files && imageFile.files[0];
          imageFile.value = "";
          if (!f || !f.type || f.type.indexOf("image/") !== 0) return;
          var url = URL.createObjectURL(f);
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-image";
          wrap.style.left = "12%";
          wrap.style.top = "18%";
          wrap.style.width = "76%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move";
          var img = document.createElement("img");
          img.alt = "";
          img.src = url;
          wrap.appendChild(handle);
          wrap.appendChild(img);
          if (sceneHeightGrip) {
            scene.insertBefore(wrap, sceneHeightGrip);
          } else {
            scene.appendChild(wrap);
          }
          attachDragFixed(handle, wrap, scene);
          syncMirrorSoon(0);
          scheduleSessionPersist();
        });

        editorResizeHandle.addEventListener("mousedown", function (e) {
          if (e.button !== 0) return;
          e.preventDefault();
          var startY = e.clientY;
          var startH = editorScroll.getBoundingClientRect().height;
          function onMove(ev) {
            var next = startH + (ev.clientY - startY);
            var minH = 180;
            var maxH = Math.min(window.innerHeight * 0.92, 900);
            next = Math.max(minH, Math.min(maxH, next));
            root.style.setProperty("--editor-view-h", next + "px");
            layoutEditorScale();
          }
          function onUp() {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
            scheduleSessionPersist();
          }
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        });

        if (sceneHeightGrip) {
          sceneHeightGrip.addEventListener("mousedown", function (e) {
            if (e.button !== 0) return;
            e.preventDefault();
            e.stopPropagation();
            hideTypography();
            var scale = editorScaleStored || 0.2;
            var startY = e.clientY;
            var startH = logicalH;
            function onMove(ev) {
              var dy = (ev.clientY - startY) / scale;
              var minH = formatPresetMinH > 0 ? formatPresetMinH : 200;
              logicalH = Math.round(Math.max(minH, startH + dy));
              root.style.setProperty("--ar-h", String(logicalH));
              if (outputSizeReadout) {
                outputSizeReadout.textContent =
                  "(" + logicalW + " × " + logicalH + ")";
              }
              scene.setAttribute(
                "aria-label",
                "Frame " + logicalW + " by " + logicalH + " pixels"
              );
              applyLogicalSize(logicalW, logicalH);
              layoutScales();
              syncMirrorSoon(8);
            }
            function onUp() {
              window.removeEventListener("mousemove", onMove);
              window.removeEventListener("mouseup", onUp);
              syncMirrorSoon(0);
              scheduleSessionPersist();
            }
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          });
        }

        function boot() {
          var session = readJSON(LS_SESSION);
          if (session && session.v === 1) {
            applySnapshot(session);
          } else {
            var fo = formatSelect && formatSelect.selectedOptions[0];
            if (fo) {
              var ph = parseInt(fo.getAttribute("data-h"), 10);
              if (isFinite(ph) && ph > 0) formatPresetMinH = ph;
            }
            applyLogicalSize(1080, 1440);
            root.style.setProperty("--ar-w", String(logicalW));
            root.style.setProperty("--ar-h", String(logicalH));
            if (outputSizeReadout) {
              outputSizeReadout.textContent = "(" + logicalW + " × " + logicalH + ")";
            }
            applyMarqueeState();
            syncBgFromPicker();
            layoutScales();
            syncMirror();
          }
          wirePersistence();
          renderSavedArtboardsList();
        }

        fetch("fonts/fonts.json")
          .then(function (r) {
            return r.json();
          })
          .then(function (manifest) {
            initFontsFromManifest(manifest);
            boot();
          })
          .catch(function () {
            activeTextFontSelect.innerHTML = "";
            var og = document.createElement("optgroup");
            og.label = "fonts";
            var opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "could not load fonts/fonts.json";
            og.appendChild(opt);
            activeTextFontSelect.appendChild(og);
            fontRegistry = {};
            fontManifest = { defaultFontId: null, groups: [] };
            boot();
          });
      })();
    </script>
  </body>
</html>
