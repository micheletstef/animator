<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>animator</title>
    <style>
      :root {
        color-scheme: light;
        --ar-w: 1080;
        --ar-h: 1440;
        --artboard-bg: #ffffff;
        --editor-view-h: 320px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: minmax(240px, 280px) minmax(320px, 1fr) minmax(
          260px,
          360px
        );
        align-items: stretch;
        min-height: calc(100vh - 48px);
        gap: 0;
      }

      .settings-panel {
        position: relative;
        height: 100%;
        padding-right: 16px;
        background: transparent;
        border-right: 1px solid rgba(31, 31, 31, 0.16);
      }

      .settings-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .settings-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        padding-left: 2px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .settings-muted {
        color: #6a6a6a;
        font-size: 12px;
      }

      .zoom-fit-btn {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        text-transform: lowercase;
      }

      .zoom-fit-btn:hover,
      .zoom-fit-btn:focus {
        text-decoration: underline;
        outline: none;
      }

      .column-title .output-size-readout {
        color: #6a6a6a;
        font-weight: 400;
      }

      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .settings-actions button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        text-transform: lowercase;
        text-decoration: underline;
      }

      .settings-actions button:hover,
      .settings-actions button:focus {
        outline: none;
      }

      input[type="color"] {
        width: 100%;
        max-width: 120px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.22);
        cursor: pointer;
        background: transparent;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .column-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        color: #6a6a6a;
      }

      .output-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      .output-zoom-controls {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .output-zoom-controls button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0 4px;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 14px;
        line-height: 1;
        min-width: 22px;
      }

      .output-zoom-controls button:hover,
      .output-zoom-controls button:focus {
        text-decoration: underline;
        outline: none;
      }

      .output-zoom-readout {
        font-size: 11px;
        color: #6a6a6a;
        min-width: 36px;
        text-align: center;
      }

      .output-zoom-hint {
        font-size: 10px;
        color: #9a9a9a;
        margin: 0 0 6px 0;
        text-transform: lowercase;
      }

      .output-column,
      .editor-column {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        padding-left: 20px;
      }

      .output-column {
        border-right: 1px solid rgba(31, 31, 31, 0.12);
        padding-right: 16px;
      }

      .output-viewport {
        flex: 1;
        min-height: min(70vh, 560px);
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        overflow: auto;
        --marquee-duration: 32s;
      }

      .output-viewport.is-marquee {
        overflow: hidden;
        align-items: center;
        justify-content: flex-start;
      }

      .output-marquee-track {
        display: flex;
        flex-direction: row;
        flex-shrink: 0;
        width: max-content;
        height: max-content;
        align-items: center;
        will-change: transform;
      }

      .output-viewport.is-marquee .output-marquee-track {
        animation: outMarqueeX var(--marquee-duration) linear infinite;
      }

      .output-viewport.is-marquee.marquee-axis-y .output-marquee-track {
        flex-direction: column;
        animation-name: outMarqueeY;
      }

      .output-viewport.is-marquee.marquee-rev .output-marquee-track {
        animation-direction: reverse;
      }

      @keyframes outMarqueeX {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-50%, 0, 0);
        }
      }

      @keyframes outMarqueeY {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(0, -50%, 0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .output-viewport.is-marquee .output-marquee-track {
          animation: none;
        }
      }

      .output-marquee-panel {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .output-marquee-panel.is-marquee-clone {
        display: none;
      }

      .output-viewport.is-marquee .output-marquee-panel.is-marquee-clone {
        display: flex;
      }

      .output-scale-outer {
        flex-shrink: 0;
      }

      .output-scale-inner {
        transform-origin: 0 0;
      }

      .scene {
        position: relative;
        background: var(--artboard-bg);
        overflow: hidden;
        outline: 1px solid rgba(31, 31, 31, 0.32);
        outline-offset: -1px;
      }

      .scene-mirror {
        pointer-events: none;
      }

      .scene-mirror .scene-badge {
        display: none;
      }

      .scene-mirror .artboard-item {
        border-color: transparent;
        background: transparent;
      }

      .scene-badge {
        position: absolute;
        left: 10px;
        top: 8px;
        font-size: 22px;
        text-transform: lowercase;
        color: rgba(106, 106, 106, 0.85);
        pointer-events: none;
        white-space: nowrap;
        z-index: 50;
      }

      .editor-column {
        padding-right: 4px;
      }

      .editor-scroll {
        height: var(--editor-view-h);
        min-height: 180px;
        max-height: min(92vh, 900px);
        overflow: auto;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .editor-scale-outer {
        flex-shrink: 0;
        margin-bottom: 48px;
      }

      .editor-scale-inner {
        transform-origin: 0 0;
      }

      .editor-resize-handle {
        margin-top: 4px;
        height: 10px;
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.1);
        cursor: ns-resize;
        flex-shrink: 0;
        touch-action: none;
      }

      .editor-resize-handle:hover {
        background: rgba(0, 0, 0, 0.16);
      }

      .artboard-item {
        position: absolute;
        z-index: 2;
        border: 1px dashed rgba(0, 0, 0, 0.28);
        background: rgba(255, 255, 255, 0.4);
        min-width: 32px;
        min-height: 28px;
        box-sizing: border-box;
      }

      .artboard-drag-handle {
        height: 36px;
        background: rgba(0, 0, 0, 0.07);
        cursor: grab;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 18px;
        letter-spacing: 0.08em;
        color: #888;
        text-transform: lowercase;
        user-select: none;
      }

      .artboard-drag-handle:active {
        cursor: grabbing;
      }

      .artboard-text-inner {
        padding: 12px 16px 20px;
        outline: none;
        min-height: 1.2em;
        font-size: 32px;
        line-height: 40px;
        letter-spacing: 0px;
        word-spacing: 0px;
        word-break: break-word;
        cursor: grab;
      }

      .artboard-text-inner:focus {
        cursor: text;
      }

      .scene .artboard-text-inner * {
        line-height: inherit;
        letter-spacing: inherit;
        word-spacing: inherit;
        font-size: inherit;
        font-family: inherit;
        color: inherit;
        cursor: inherit;
      }

      .artboard-item.artboard-text {
        display: flex;
        flex-direction: column;
        left: 8%;
        top: 42%;
        width: 84%;
      }

      .artboard-item.artboard-image {
        display: flex;
        flex-direction: column;
        left: 12%;
        top: 18%;
        width: 76%;
        max-height: 55%;
      }

      .artboard-item.artboard-image img {
        display: block;
        width: 100%;
        height: auto;
        max-height: calc(100% - 36px);
        object-fit: contain;
        pointer-events: none;
        flex: 1;
        min-height: 0;
      }

      .typography-block {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(31, 31, 31, 0.12);
      }

      .typography-block[hidden] {
        display: none !important;
      }

      .typography-block .settings-title {
        color: #6a6a6a;
      }

      .typography-select {
        width: 100%;
        max-width: 100%;
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        line-height: 1.2;
        padding: 4px 6px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: #fff;
        color: #1f1f1f;
      }

      .vf-axis-host {
        margin-top: 8px;
        padding-left: 2px;
      }

      .vf-axis-host[hidden] {
        display: none !important;
      }

      .vf-axis-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .vf-axis-row label {
        text-transform: lowercase;
        font-size: 11px;
        color: #444;
      }

      .vf-axis-row input[type="range"] {
        width: 100%;
        max-width: 160px;
      }

      .vf-axis-val {
        font-size: 10px;
        color: #6a6a6a;
        min-width: 28px;
        text-align: right;
      }

      .typography-subhead {
        margin: 10px 0 4px 2px;
        font-size: 10px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #888;
      }

      .typography-subhead[hidden] {
        display: none !important;
      }

      .typography-num {
        width: 100%;
        max-width: 112px;
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        padding: 4px 6px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: #fff;
        color: #1f1f1f;
      }

      .typography-inline {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
      }

      .typography-check {
        font-size: 11px;
        text-transform: lowercase;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .typography-check input {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="settings-panel" aria-label="Settings">
        <div class="settings-title-row">
          <h2 class="settings-title">settings</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">format</span>
          <select id="formatSelect" class="typography-select" aria-label="Frame format">
            <option value="1080-1440" data-w="1080" data-h="1440" data-label="3:4" selected>
              1080 × 1440 (3:4)
            </option>
            <option value="1080-1080" data-w="1080" data-h="1080" data-label="1:1">
              1080 × 1080 (1:1)
            </option>
            <option value="1080-1920" data-w="1080" data-h="1920" data-label="reels">
              1080 × 1920 (reels)
            </option>
          </select>
        </div>
        <div class="settings-row">
          <span class="settings-label">background</span>
          <input type="color" id="bgColor" value="#ffffff" aria-label="Artboard background" />
        </div>
        <div class="settings-title-row" style="margin-top: 10px">
          <h2 class="settings-title">output loop</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">marquee</span>
          <label class="typography-check"
            ><input type="checkbox" id="marqueeEnabled" aria-label="Infinite marquee on output" />
            on</label
          >
        </div>
        <div class="settings-row marquee-extra" id="marqueeSpeedRow" hidden>
          <span class="settings-label">speed</span>
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
            <input
              type="range"
              id="marqueeSpeed"
              min="6"
              max="90"
              value="32"
              step="1"
              aria-label="Seconds per loop"
              style="width: min(140px, 100%)"
            />
            <span class="settings-muted" id="marqueeSpeedLabel">32s loop</span>
          </div>
        </div>
        <div class="settings-row marquee-extra" id="marqueeDirRow" hidden>
          <span class="settings-label">direction</span>
          <select id="marqueeDirection" class="typography-select" aria-label="Marquee direction">
            <option value="left">left</option>
            <option value="right">right</option>
            <option value="up">up</option>
            <option value="down">down</option>
          </select>
        </div>
        <div id="typographyBlock" class="typography-block" hidden>
          <div class="settings-title-row">
            <h2 class="settings-title">text</h2>
          </div>
          <div class="settings-row">
            <span class="settings-label">font</span>
            <select id="activeTextFontSelect" class="typography-select" aria-label="Font for selected text"></select>
          </div>
          <p class="typography-subhead">character</p>
          <div class="settings-row">
            <span class="settings-label">size</span>
            <input
              type="number"
              class="typography-num"
              id="textFontSize"
              min="4"
              max="1200"
              value="32"
              step="1"
              aria-label="Font size in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">leading</span>
            <input
              type="number"
              class="typography-num"
              id="textLineHeight"
              min="0.4"
              max="5"
              value="1.25"
              step="0.05"
              aria-label="Line height"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">tracking</span>
            <input
              type="number"
              class="typography-num"
              id="textTracking"
              min="-80"
              max="200"
              value="0"
              step="0.5"
              aria-label="Letter spacing in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">word</span>
            <input
              type="number"
              class="typography-num"
              id="textWordSpace"
              min="-40"
              max="120"
              value="0"
              step="0.5"
              aria-label="Word spacing in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">h scale</span>
            <input
              type="number"
              class="typography-num"
              id="textHorizScale"
              min="10"
              max="300"
              value="100"
              step="1"
              aria-label="Horizontal scale percent"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">baseline</span>
            <input
              type="number"
              class="typography-num"
              id="textBaselineShift"
              min="-240"
              max="240"
              value="0"
              step="1"
              aria-label="Baseline shift in pixels"
            />
          </div>
          <div class="settings-row">
            <span class="settings-label">align</span>
            <select id="textAlign" class="typography-select" aria-label="Paragraph alignment">
              <option value="left">left</option>
              <option value="center">center</option>
              <option value="right">right</option>
              <option value="justify">justify</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">case</span>
            <select id="textCase" class="typography-select" aria-label="Capitalization">
              <option value="normal">normal</option>
              <option value="uppercase">all caps</option>
              <option value="small-caps">small caps</option>
              <option value="all-small-caps">all small caps</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">decor</span>
            <div class="typography-inline">
              <label class="typography-check"
                ><input type="checkbox" id="textDecUnderline" /> underline</label
              >
              <label class="typography-check"
                ><input type="checkbox" id="textDecStrike" /> strike</label
              >
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">color</span>
            <input
              type="color"
              id="activeTextColor"
              value="#1f1f1f"
              aria-label="Text color for selected text"
            />
          </div>
          <p class="typography-subhead" id="vfAxesTitle" hidden>axes</p>
          <div id="vfAxisHost" class="vf-axis-host" hidden></div>
        </div>
        <div class="settings-row">
          <span class="settings-label">add</span>
          <div class="settings-actions">
            <button type="button" id="addText">text box</button>
            <button type="button" id="addImage">image</button>
          </div>
        </div>
        <input type="file" id="imageFile" accept="image/*" hidden />
      </aside>

      <section class="output-column" aria-label="Output preview">
        <div class="output-header">
          <p class="column-title">
            output
            <span class="output-size-readout" id="outputSizeReadout">(1080 × 1440)</span>
          </p>
          <div class="output-zoom-controls" role="group" aria-label="Output zoom">
            <button type="button" id="outputZoomOut" aria-label="Zoom out">−</button>
            <span class="output-zoom-readout" id="outputZoomReadout">100%</span>
            <button type="button" id="outputZoomIn" aria-label="Zoom in">+</button>
            <button type="button" class="zoom-fit-btn" id="outputZoomFit" aria-label="Fit to view">
              fit
            </button>
          </div>
        </div>
        <p class="output-zoom-hint">ctrl / ⌘ + scroll to zoom</p>
        <div class="output-viewport" id="outputViewport">
          <div class="output-marquee-track" id="outputMarqueeTrack">
            <div class="output-marquee-panel">
              <div class="output-scale-outer" id="outputScaleOuter">
                <div class="output-scale-inner" id="outputScaleInner">
                  <div
                    class="scene scene-mirror"
                    id="sceneMirror"
                    role="presentation"
                    aria-hidden="true"
                  ></div>
                </div>
              </div>
            </div>
            <div class="output-marquee-panel is-marquee-clone" id="outputMarqueePanelB">
              <div class="output-scale-outer" id="outputScaleOuterB">
                <div class="output-scale-inner" id="outputScaleInnerB">
                  <div
                    class="scene scene-mirror"
                    id="sceneMirrorB"
                    role="presentation"
                    aria-hidden="true"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="editor-column" aria-label="Editor artboard">
        <p class="column-title">artboard</p>
        <div class="editor-scroll" id="editorScroll">
          <div class="editor-scale-outer" id="editorScaleOuter">
            <div class="editor-scale-inner" id="editorScaleInner">
              <div
                class="scene"
                id="scene"
                role="region"
                aria-label="Frame 1080 by 1440 pixels"
              >
                <span class="scene-badge" id="sceneBadge">3:4</span>
              </div>
            </div>
          </div>
        </div>
        <div
          class="editor-resize-handle"
          id="editorResizeHandle"
          role="separator"
          aria-orientation="horizontal"
          aria-label="Drag to change artboard panel height"
        ></div>
      </section>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var scene = document.getElementById("scene");
        var sceneMirror = document.getElementById("sceneMirror");
        var sceneBadge = document.getElementById("sceneBadge");
        var formatSelect = document.getElementById("formatSelect");
        var outputSizeReadout = document.getElementById("outputSizeReadout");
        var bgColor = document.getElementById("bgColor");
        var addText = document.getElementById("addText");
        var addImage = document.getElementById("addImage");
        var imageFile = document.getElementById("imageFile");
        var typographyBlock = document.getElementById("typographyBlock");
        var activeTextFontSelect = document.getElementById("activeTextFontSelect");
        var activeTextColor = document.getElementById("activeTextColor");
        var vfAxisHost = document.getElementById("vfAxisHost");
        var vfAxesTitle = document.getElementById("vfAxesTitle");
        var textFontSize = document.getElementById("textFontSize");
        var textLineHeight = document.getElementById("textLineHeight");
        var textTracking = document.getElementById("textTracking");
        var textWordSpace = document.getElementById("textWordSpace");
        var textHorizScale = document.getElementById("textHorizScale");
        var textBaselineShift = document.getElementById("textBaselineShift");
        var textAlign = document.getElementById("textAlign");
        var textCase = document.getElementById("textCase");
        var textDecUnderline = document.getElementById("textDecUnderline");
        var textDecStrike = document.getElementById("textDecStrike");

        var outputViewport = document.getElementById("outputViewport");
        var outputMarqueeTrack = document.getElementById("outputMarqueeTrack");
        var outputScaleOuter = document.getElementById("outputScaleOuter");
        var outputScaleInner = document.getElementById("outputScaleInner");
        var outputScaleOuterB = document.getElementById("outputScaleOuterB");
        var outputScaleInnerB = document.getElementById("outputScaleInnerB");
        var sceneMirrorB = document.getElementById("sceneMirrorB");
        var marqueeEnabled = document.getElementById("marqueeEnabled");
        var marqueeSpeed = document.getElementById("marqueeSpeed");
        var marqueeSpeedLabel = document.getElementById("marqueeSpeedLabel");
        var marqueeDirection = document.getElementById("marqueeDirection");
        var marqueeSpeedRow = document.getElementById("marqueeSpeedRow");
        var marqueeDirRow = document.getElementById("marqueeDirRow");
        var editorScroll = document.getElementById("editorScroll");
        var editorScaleOuter = document.getElementById("editorScaleOuter");
        var editorScaleInner = document.getElementById("editorScaleInner");
        var editorResizeHandle = document.getElementById("editorResizeHandle");
        var outputZoomInBtn = document.getElementById("outputZoomIn");
        var outputZoomOutBtn = document.getElementById("outputZoomOut");
        var outputZoomFitBtn = document.getElementById("outputZoomFit");
        var outputZoomReadout = document.getElementById("outputZoomReadout");

        var logicalW = 1080;
        var logicalH = 1440;
        var mirrorTimer = null;
        var editorScaleStored = 0.25;
        var outputZoomFactor = 1;
        var OUTPUT_ZOOM_MIN = 0.25;
        var OUTPUT_ZOOM_MAX = 4;
        var fontManifest = null;
        var fontRegistry = {};
        var activeTextInner = null;

        function applyLogicalSize(w, h) {
          logicalW = w;
          logicalH = h;
          scene.style.width = w + "px";
          scene.style.height = h + "px";
          sceneMirror.style.width = w + "px";
          sceneMirror.style.height = h + "px";
          if (sceneMirrorB) {
            sceneMirrorB.style.width = w + "px";
            sceneMirrorB.style.height = h + "px";
          }
        }

        function setRatio(w, h, shortLabel) {
          root.style.setProperty("--ar-w", String(w));
          root.style.setProperty("--ar-h", String(h));
          if (outputSizeReadout) {
            outputSizeReadout.textContent = "(" + w + " × " + h + ")";
          }
          sceneBadge.textContent = shortLabel;
          scene.setAttribute(
            "aria-label",
            "Frame " + w + " by " + h + " pixels"
          );
          applyLogicalSize(w, h);
          layoutScales();
          syncMirrorSoon(0);
        }

        function applyFormatFromSelect() {
          var opt = formatSelect.selectedOptions[0];
          if (!opt) return;
          var w = parseInt(opt.getAttribute("data-w"), 10);
          var h = parseInt(opt.getAttribute("data-h"), 10);
          var label = opt.getAttribute("data-label") || "";
          setRatio(w, h, label);
        }

        formatSelect.addEventListener("change", applyFormatFromSelect);

        function syncBgFromPicker() {
          root.style.setProperty("--artboard-bg", bgColor.value);
        }

        bgColor.addEventListener("input", syncBgFromPicker);
        syncBgFromPicker();

        function hideTypography() {
          activeTextInner = null;
          typographyBlock.hidden = true;
          vfAxisHost.hidden = true;
          vfAxisHost.innerHTML = "";
          if (vfAxesTitle) vfAxesTitle.hidden = true;
        }

        function readVfMap(inner) {
          var raw = (inner.style && inner.style.fontVariationSettings) || "";
          var map = {};
          if (!raw) return map;
          var re = /'([a-zA-Z]{4})'\s+([-.\d]+)/gi;
          var m;
          while ((m = re.exec(raw))) {
            map[m[1].toLowerCase()] = parseFloat(m[2]);
          }
          return map;
        }

        function writeVfToInner(inner, map) {
          var parts = [];
          Object.keys(map).forEach(function (tag) {
            parts.push("'" + String(tag).toLowerCase() + "' " + map[tag]);
          });
          inner.style.fontVariationSettings = parts.length ? parts.join(", ") : "";
        }

        function applyFontIdToInner(inner, fontId) {
          var f = fontRegistry[fontId];
          if (!inner || !f) return;
          inner.dataset.fontId = fontId;
          if (f.stack) {
            inner.style.fontFamily = f.stack;
            inner.style.fontVariationSettings = "";
          } else if (f.cssFamily) {
            inner.style.fontFamily = "'" + f.cssFamily + "', sans-serif";
            if (f.variable && f.axes) {
              var existing = readVfMap(inner);
              var map = {};
              f.axes.forEach(function (a) {
                var tag = String(a.tag).toLowerCase();
                var v = existing[tag];
                if (v === undefined || isNaN(v)) v = a.default;
                map[tag] = v;
              });
              writeVfToInner(inner, map);
            } else {
              inner.style.fontVariationSettings = "";
            }
          }
        }

        function syncSelectFromInner() {
          if (!activeTextInner) return;
          var id = activeTextInner.dataset.fontId;
          if (id && fontRegistry[id]) {
            activeTextFontSelect.value = id;
          } else if (fontManifest && fontManifest.defaultFontId) {
            activeTextFontSelect.value = fontManifest.defaultFontId;
          }
        }

        function renderVfPanel() {
          vfAxisHost.innerHTML = "";
          if (!activeTextInner) {
            vfAxisHost.hidden = true;
            if (vfAxesTitle) vfAxesTitle.hidden = true;
            return;
          }
          var id = activeTextInner.dataset.fontId;
          var f = id ? fontRegistry[id] : null;
          if (!f || !f.variable || !f.axes || !f.axes.length) {
            vfAxisHost.hidden = true;
            if (vfAxesTitle) vfAxesTitle.hidden = true;
            return;
          }
          vfAxisHost.hidden = false;
          if (vfAxesTitle) vfAxesTitle.hidden = false;
          var vfMap = readVfMap(activeTextInner);
          f.axes.forEach(function (axis) {
            var tag = String(axis.tag).toLowerCase();
            var row = document.createElement("div");
            row.className = "vf-axis-row";
            var lab = document.createElement("label");
            lab.setAttribute("for", "vf-" + tag);
            lab.textContent = axis.name || tag;
            var wrap = document.createElement("div");
            wrap.style.display = "flex";
            wrap.style.alignItems = "center";
            wrap.style.gap = "8px";
            var rng = document.createElement("input");
            rng.type = "range";
            rng.id = "vf-" + tag;
            rng.min = String(axis.min);
            rng.max = String(axis.max);
            rng.step =
              axis.step != null
                ? String(axis.step)
                : (axis.max - axis.min) / 200 < 0.05
                  ? "0.01"
                  : "1";
            var cur = vfMap[tag];
            if (cur === undefined || isNaN(cur)) cur = axis.default;
            rng.value = String(cur);
            var val = document.createElement("span");
            val.className = "vf-axis-val";
            val.textContent = String(Math.round(parseFloat(rng.value) * 100) / 100);
            rng.addEventListener("input", function () {
              var v = parseFloat(rng.value);
              val.textContent = String(Math.round(v * 100) / 100);
              var m = readVfMap(activeTextInner);
              m[tag] = v;
              writeVfToInner(activeTextInner, m);
              syncMirrorSoon(24);
            });
            wrap.appendChild(rng);
            wrap.appendChild(val);
            row.appendChild(lab);
            row.appendChild(wrap);
            vfAxisHost.appendChild(row);
          });
        }

        function computedColorToHex(el) {
          var rgb = getComputedStyle(el).color;
          var m = rgb.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/);
          if (!m) return "#1f1f1f";
          return (
            "#" +
            [m[1], m[2], m[3]]
              .map(function (x) {
                var h = parseInt(x, 10).toString(16);
                return h.length === 1 ? "0" + h : h;
              })
              .join("")
          );
        }

        function syncTextColorFromInner() {
          if (!activeTextInner || !activeTextColor) return;
          activeTextColor.value = computedColorToHex(activeTextInner);
        }

        function parseCssPx(val, fallback) {
          if (val == null || val === "" || val === "normal") return fallback;
          var m = String(val).match(/^(-?[\d.]+)px$/i);
          return m ? parseFloat(m[1]) : fallback;
        }

        function applyLeadingAsPx(el, fsPx, mult) {
          var fs = fsPx != null ? fsPx : parseFloat(el.style.fontSize) || 32;
          var m = mult != null ? mult : 1.25;
          if (!isFinite(fs) || fs <= 0) fs = 32;
          if (!isFinite(m) || m <= 0) m = 1.25;
          el.style.lineHeight = Math.round(fs * m * 100) / 100 + "px";
        }

        function applyDefaultTextMetrics(el) {
          el.style.fontSize = "32px";
          applyLeadingAsPx(el, 32, 1.25);
          el.style.letterSpacing = "0px";
          el.style.wordSpacing = "0px";
          el.style.textAlign = "left";
          el.style.textTransform = "none";
          el.style.fontVariantCaps = "normal";
          el.style.textDecorationLine = "none";
          el.style.transformOrigin = "0 50%";
          el.style.transform = "";
          el.dataset.horizScale = "100";
          el.dataset.baselineShift = "0";
        }

        function applyTextTransformFromCase() {
          if (!activeTextInner) return;
          var el = activeTextInner;
          var v = textCase.value;
          el.style.textTransform = "none";
          el.style.fontVariantCaps = "normal";
          if (v === "uppercase") el.style.textTransform = "uppercase";
          else if (v === "small-caps") el.style.fontVariantCaps = "small-caps";
          else if (v === "all-small-caps") el.style.fontVariantCaps = "all-small-caps";
        }

        function applyMetricsFromPanelToActive() {
          if (!activeTextInner) return;
          var el = activeTextInner;
          var fsNum = parseFloat(textFontSize.value);
          if (!isFinite(fsNum) || fsNum <= 0) fsNum = 32;
          var lhMult = parseFloat(textLineHeight.value);
          if (!isFinite(lhMult) || lhMult <= 0) lhMult = 1.25;
          el.style.fontSize = fsNum + "px";
          applyLeadingAsPx(el, fsNum, lhMult);
          var trk = parseFloat(textTracking.value);
          if (!isFinite(trk)) trk = 0;
          el.style.letterSpacing = trk + "px";
          var ws = parseFloat(textWordSpace.value);
          if (!isFinite(ws)) ws = 0;
          el.style.wordSpacing = ws + "px";
          el.style.textAlign = textAlign.value;
          applyTextTransformFromCase();
          var decs = [];
          if (textDecUnderline.checked) decs.push("underline");
          if (textDecStrike.checked) decs.push("line-through");
          el.style.textDecorationLine = decs.length ? decs.join(" ") : "none";
          el.dataset.horizScale = String(textHorizScale.value);
          el.dataset.baselineShift = String(textBaselineShift.value);
          el.style.transformOrigin = "0 50%";
          var scale = (parseFloat(textHorizScale.value) || 100) / 100;
          var shift = parseFloat(textBaselineShift.value) || 0;
          var tf = [];
          if (shift) tf.push("translateY(" + -shift + "px)");
          if (Math.abs(scale - 1) > 0.001) tf.push("scaleX(" + scale + ")");
          el.style.transform = tf.length ? tf.join(" ") : "";
          syncMirrorSoon(20);
        }

        function syncTextMetricsFromInner() {
          if (!activeTextInner) return;
          var el = activeTextInner;
          var cs = getComputedStyle(el);
          var fs = parseCssPx(el.style.fontSize, null);
          if (fs == null) fs = parseCssPx(cs.fontSize, 32);
          textFontSize.value = String(Math.round(fs));

          var baseFs = parseCssPx(cs.fontSize, fs);
          var lhC = cs.lineHeight;
          var lhPx = parseCssPx(lhC, null);
          if (lhPx != null && baseFs > 0) {
            textLineHeight.value = String(
              Math.round((lhPx / baseFs) * 100) / 100
            );
          } else {
            var lhNum = parseFloat(lhC);
            textLineHeight.value = String(
              isFinite(lhNum) && lhNum > 0 && lhNum < 10 ? lhNum : 1.25
            );
          }

          textTracking.value = String(
            parseCssPx(el.style.letterSpacing, parseCssPx(cs.letterSpacing, 0))
          );
          textWordSpace.value = String(
            parseCssPx(el.style.wordSpacing, parseCssPx(cs.wordSpacing, 0))
          );
          textHorizScale.value = String(parseFloat(el.dataset.horizScale) || 100);
          textBaselineShift.value = String(parseFloat(el.dataset.baselineShift) || 0);
          var ta = (el.style.textAlign || cs.textAlign || "left").toLowerCase();
          if (ta === "start") ta = "left";
          if (ta === "end") ta = "right";
          if (["left", "center", "right", "justify"].indexOf(ta) < 0) ta = "left";
          textAlign.value = ta;
          var fvc = (el.style.fontVariantCaps || cs.fontVariantCaps || "normal")
            .toLowerCase()
            .replace(/\s+/g, "-");
          var tt = (el.style.textTransform || cs.textTransform || "none").toLowerCase();
          if (fvc === "all-small-caps") textCase.value = "all-small-caps";
          else if (fvc === "small-caps") textCase.value = "small-caps";
          else if (tt === "uppercase") textCase.value = "uppercase";
          else textCase.value = "normal";

          var td = el.style.textDecorationLine || cs.textDecorationLine || "none";
          textDecUnderline.checked = td.indexOf("underline") >= 0;
          textDecStrike.checked = td.indexOf("line-through") >= 0;
        }

        function bindTypographyMetrics() {
          [
            textFontSize,
            textLineHeight,
            textTracking,
            textWordSpace,
            textHorizScale,
            textBaselineShift,
          ].forEach(function (n) {
            if (!n) return;
            n.addEventListener("input", applyMetricsFromPanelToActive);
            n.addEventListener("change", applyMetricsFromPanelToActive);
          });
          if (textAlign) textAlign.addEventListener("change", applyMetricsFromPanelToActive);
          if (textCase) textCase.addEventListener("change", applyMetricsFromPanelToActive);
          if (textDecUnderline)
            textDecUnderline.addEventListener("change", applyMetricsFromPanelToActive);
          if (textDecStrike)
            textDecStrike.addEventListener("change", applyMetricsFromPanelToActive);
        }
        bindTypographyMetrics();

        function setActiveTextInner(inner) {
          if (!inner || !scene.contains(inner)) return;
          activeTextInner = inner;
          typographyBlock.hidden = false;
          if (
            (!inner.dataset.fontId || !fontRegistry[inner.dataset.fontId]) &&
            fontManifest &&
            fontManifest.defaultFontId
          ) {
            applyFontIdToInner(inner, fontManifest.defaultFontId);
          }
          syncSelectFromInner();
          syncTextColorFromInner();
          syncTextMetricsFromInner();
          renderVfPanel();
        }

        document.addEventListener("mousedown", function (e) {
          var t = e.target;
          if (typographyBlock.contains(t)) return;
          if (t.closest && t.closest(".artboard-text")) return;
          hideTypography();
        });

        scene.addEventListener(
          "mousedown",
          function (e) {
            var inner = e.target.closest && e.target.closest(".artboard-text-inner");
            if (inner && scene.contains(inner)) setActiveTextInner(inner);
          },
          true
        );

        scene.addEventListener("focusin", function (e) {
          var inner = e.target.closest && e.target.closest(".artboard-text-inner");
          if (inner && scene.contains(inner)) setActiveTextInner(inner);
        });

        activeTextFontSelect.addEventListener("change", function () {
          if (!activeTextInner) return;
          applyFontIdToInner(activeTextInner, activeTextFontSelect.value);
          renderVfPanel();
          syncMirrorSoon(0);
        });

        activeTextColor.addEventListener("input", function () {
          if (!activeTextInner) return;
          activeTextInner.style.color = activeTextColor.value;
          syncMirrorSoon(32);
        });

        function fontFaceUrl(path) {
          return "fonts/" + String(path).replace(/^\//, "");
        }

        function fontFaceFormat(path, variable) {
          var lower = String(path).toLowerCase();
          if (variable) {
            if (lower.endsWith(".woff2")) return "format('woff2-variations')";
            if (lower.endsWith(".ttf")) return "format('truetype-variations')";
            if (lower.endsWith(".otf")) return "format('opentype-variations')";
            return "format('truetype-variations')";
          }
          if (lower.endsWith(".woff2")) return "format('woff2')";
          if (lower.endsWith(".otf")) return "format('opentype')";
          if (lower.endsWith(".ttf")) return "format('truetype')";
          return "format('opentype')";
        }

        function injectFontFaces(manifest) {
          var old = document.getElementById("dynamic-font-faces");
          if (old) old.remove();
          var css = "";
          manifest.groups.forEach(function (g) {
            g.fonts.forEach(function (f) {
              if (!f.path || !f.cssFamily) return;
              var u = fontFaceUrl(f.path);
              var fmt = fontFaceFormat(f.path, !!f.variable);
              if (f.variable) {
                var hasWdth =
                  f.axes &&
                  f.axes.some(function (a) {
                    return a.tag === "wdth";
                  });
                var stretch = hasWdth ? "font-stretch:50% 200%;" : "";
                css +=
                  "@font-face{font-family:'" +
                  f.cssFamily +
                  "';src:url('" +
                  u +
                  "') " +
                  fmt +
                  ";font-weight:100 900;" +
                  stretch +
                  "font-display:swap;}";
              } else {
                css +=
                  "@font-face{font-family:'" +
                  f.cssFamily +
                  "';src:url('" +
                  u +
                  "') " +
                  fmt +
                  ";font-weight:" +
                  (f.weight != null ? f.weight : 400) +
                  ";font-style:" +
                  (f.style || "normal") +
                  ";font-display:swap;}";
              }
            });
          });
          if (!css) return;
          var st = document.createElement("style");
          st.id = "dynamic-font-faces";
          st.textContent = css;
          document.head.appendChild(st);
        }

        function buildFontSelect(manifest) {
          activeTextFontSelect.innerHTML = "";
          fontRegistry = {};
          manifest.groups.forEach(function (g) {
            var og = document.createElement("optgroup");
            og.label = g.label;
            g.fonts.forEach(function (f) {
              fontRegistry[f.id] = f;
              var opt = document.createElement("option");
              opt.value = f.id;
              opt.textContent = f.label;
              og.appendChild(opt);
            });
            activeTextFontSelect.appendChild(og);
          });
        }

        function initFontsFromManifest(manifest) {
          fontManifest = manifest;
          injectFontFaces(manifest);
          buildFontSelect(manifest);
        }

        function syncMirrorToElement(mirrorEl) {
          if (!mirrorEl) return;
          mirrorEl.innerHTML = scene.innerHTML;
          mirrorEl.querySelectorAll(".artboard-drag-handle").forEach(function (n) {
            n.remove();
          });
          mirrorEl.querySelectorAll(".artboard-text-inner").forEach(function (el) {
            el.removeAttribute("contenteditable");
          });
        }

        function syncMirror() {
          syncMirrorToElement(sceneMirror);
          syncMirrorToElement(sceneMirrorB);
        }

        function syncMirrorSoon(ms) {
          var d = ms === undefined ? 32 : ms;
          if (mirrorTimer) clearTimeout(mirrorTimer);
          mirrorTimer = setTimeout(function () {
            mirrorTimer = null;
            syncMirror();
          }, d);
        }

        function clampOutputZoom(z) {
          if (!isFinite(z)) return 1;
          return Math.max(OUTPUT_ZOOM_MIN, Math.min(OUTPUT_ZOOM_MAX, z));
        }

        function setOutputZoom(next) {
          outputZoomFactor = clampOutputZoom(next);
          if (outputZoomReadout) {
            outputZoomReadout.textContent =
              Math.round(outputZoomFactor * 100) + "%";
          }
          layoutOutputScale();
        }

        function applyOutputScaleToPair(scaleInner, scaleOuter, s) {
          if (!scaleInner || !scaleOuter) return;
          scaleInner.style.width = logicalW + "px";
          scaleInner.style.height = logicalH + "px";
          scaleInner.style.transform = "scale(" + s + ")";
          scaleOuter.style.width = logicalW * s + "px";
          scaleOuter.style.height = logicalH * s + "px";
        }

        function layoutOutputScale() {
          var pad = 24;
          var availW = Math.max(80, outputViewport.clientWidth - pad);
          var availH = Math.max(80, outputViewport.clientHeight - pad);
          var sFit = Math.min(availW / logicalW, availH / logicalH) * 0.98;
          if (sFit <= 0 || !isFinite(sFit)) sFit = 0.2;
          var s = sFit * outputZoomFactor;
          applyOutputScaleToPair(outputScaleInner, outputScaleOuter, s);
          applyOutputScaleToPair(outputScaleInnerB, outputScaleOuterB, s);
        }

        function applyMarqueeState() {
          var on = marqueeEnabled && marqueeEnabled.checked;
          if (marqueeSpeedRow) marqueeSpeedRow.hidden = !on;
          if (marqueeDirRow) marqueeDirRow.hidden = !on;
          if (!outputViewport) return;
          outputViewport.classList.toggle("is-marquee", on);
          outputViewport.classList.remove("marquee-axis-y", "marquee-rev");
          var dir = marqueeDirection ? marqueeDirection.value : "left";
          if (dir === "up" || dir === "down") {
            outputViewport.classList.add("marquee-axis-y");
          }
          if (dir === "right" || dir === "down") {
            outputViewport.classList.add("marquee-rev");
          }
          var sec = marqueeSpeed ? parseInt(marqueeSpeed.value, 10) : 32;
          if (!isFinite(sec) || sec < 3) sec = 32;
          outputViewport.style.setProperty("--marquee-duration", sec + "s");
          if (marqueeSpeedLabel) {
            marqueeSpeedLabel.textContent = sec + "s loop";
          }
        }

        function layoutEditorScale() {
          var pad = 20;
          var availW = Math.max(60, editorScroll.clientWidth - pad);
          var s = (availW / logicalW) * 0.96;
          if (s <= 0 || !isFinite(s)) s = 0.15;
          editorScaleInner.style.width = logicalW + "px";
          editorScaleInner.style.height = logicalH + "px";
          editorScaleInner.style.transform = "scale(" + s + ")";
          editorScaleOuter.style.width = logicalW * s + "px";
          editorScaleOuter.style.height = logicalH * s + "px";
          editorScaleStored = s;
        }

        function layoutScales() {
          layoutOutputScale();
          layoutEditorScale();
        }

        var roOut = new ResizeObserver(layoutScales);
        roOut.observe(outputViewport);
        roOut.observe(editorScroll);

        outputZoomInBtn.addEventListener("click", function () {
          setOutputZoom(outputZoomFactor * 1.15);
        });
        outputZoomOutBtn.addEventListener("click", function () {
          setOutputZoom(outputZoomFactor / 1.15);
        });
        outputZoomFitBtn.addEventListener("click", function () {
          setOutputZoom(1);
        });

        outputViewport.addEventListener(
          "wheel",
          function (e) {
            if (!e.ctrlKey && !e.metaKey) return;
            e.preventDefault();
            var delta = e.deltaY;
            var factor = delta > 0 ? 1 / 1.08 : 1.08;
            setOutputZoom(outputZoomFactor * factor);
          },
          { passive: false }
        );

        if (marqueeEnabled) {
          marqueeEnabled.addEventListener("change", function () {
            applyMarqueeState();
            layoutOutputScale();
          });
        }
        if (marqueeSpeed) {
          marqueeSpeed.addEventListener("input", applyMarqueeState);
        }
        if (marqueeDirection) {
          marqueeDirection.addEventListener("change", applyMarqueeState);
        }

        var TEXT_DRAG_THRESHOLD = 6;

        function beginDragItem(item, parent, startClientX, startClientY, startLeft, startTop) {
          var scale = editorScaleStored || 0.2;
          var sx = startClientX;
          var sy = startClientY;
          var sl = startLeft != null ? startLeft : item.offsetLeft;
          var st = startTop != null ? startTop : item.offsetTop;
          function onMove(ev) {
            var dx = (ev.clientX - sx) / scale;
            var dy = (ev.clientY - sy) / scale;
            var nl = sl + dx;
            var nt = st + dy;
            var maxL = parent.clientWidth - item.offsetWidth;
            var maxT = parent.clientHeight - item.offsetHeight;
            item.style.left = Math.max(0, Math.min(maxL, nl)) + "px";
            item.style.top = Math.max(0, Math.min(maxT, nt)) + "px";
            syncMirrorSoon(16);
          }
          function onUp() {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
            syncMirrorSoon(0);
          }
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        }

        function attachDragFixed(handle, item, parent) {
          handle.addEventListener("mousedown", function (e) {
            if (e.button !== 0) return;
            e.preventDefault();
            e.stopPropagation();
            beginDragItem(item, parent, e.clientX, e.clientY);
          });
        }

        function attachTextBoxDrag(wrap, inner, parent) {
          var handle = wrap.querySelector(".artboard-drag-handle");
          if (handle) attachDragFixed(handle, wrap, parent);
          inner.addEventListener("mousedown", function (e) {
            if (e.button !== 0) return;
            if (e.altKey) {
              e.preventDefault();
              if (document.activeElement === inner) inner.blur();
              beginDragItem(wrap, parent, e.clientX, e.clientY);
              return;
            }
            var sx = e.clientX;
            var sy = e.clientY;
            var sl = wrap.offsetLeft;
            var st = wrap.offsetTop;
            var moved = false;
            function onMove(ev) {
              if (moved) return;
              if (
                Math.abs(ev.clientX - sx) < TEXT_DRAG_THRESHOLD &&
                Math.abs(ev.clientY - sy) < TEXT_DRAG_THRESHOLD
              ) {
                return;
              }
              moved = true;
              ev.preventDefault();
              if (document.activeElement === inner) inner.blur();
              window.removeEventListener("mousemove", onMove);
              window.removeEventListener("mouseup", onUp);
              beginDragItem(wrap, parent, sx, sy, sl, st);
            }
            function onUp() {
              window.removeEventListener("mousemove", onMove);
              window.removeEventListener("mouseup", onUp);
            }
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          });
        }

        addText.addEventListener("click", function () {
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-text";
          wrap.style.left = "8%";
          wrap.style.top = "42%";
          wrap.style.width = "84%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move · alt-drag";
          var inner = document.createElement("div");
          inner.className = "artboard-text-inner";
          inner.contentEditable = "true";
          inner.setAttribute("spellcheck", "true");
          inner.textContent = "text";
          applyDefaultTextMetrics(inner);
          inner.style.color = activeTextColor ? activeTextColor.value : "#1f1f1f";
          inner.addEventListener("input", function () {
            syncMirrorSoon(48);
          });
          wrap.appendChild(handle);
          wrap.appendChild(inner);
          scene.appendChild(wrap);
          attachTextBoxDrag(wrap, inner, scene);
          if (fontManifest && fontManifest.defaultFontId) {
            applyFontIdToInner(inner, fontManifest.defaultFontId);
          }
          setActiveTextInner(inner);
          syncMirrorSoon(0);
        });

        addImage.addEventListener("click", function () {
          imageFile.click();
        });

        imageFile.addEventListener("change", function () {
          var f = imageFile.files && imageFile.files[0];
          imageFile.value = "";
          if (!f || !f.type || f.type.indexOf("image/") !== 0) return;
          var url = URL.createObjectURL(f);
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-image";
          wrap.style.left = "12%";
          wrap.style.top = "18%";
          wrap.style.width = "76%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move";
          var img = document.createElement("img");
          img.alt = "";
          img.src = url;
          wrap.appendChild(handle);
          wrap.appendChild(img);
          scene.appendChild(wrap);
          attachDragFixed(handle, wrap, scene);
          syncMirrorSoon(0);
        });

        editorResizeHandle.addEventListener("mousedown", function (e) {
          if (e.button !== 0) return;
          e.preventDefault();
          var startY = e.clientY;
          var startH = editorScroll.getBoundingClientRect().height;
          function onMove(ev) {
            var next = startH + (ev.clientY - startY);
            var minH = 180;
            var maxH = Math.min(window.innerHeight * 0.92, 900);
            next = Math.max(minH, Math.min(maxH, next));
            root.style.setProperty("--editor-view-h", next + "px");
            layoutEditorScale();
          }
          function onUp() {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          }
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        });

        function boot() {
          applyLogicalSize(1080, 1440);
          layoutScales();
          syncMirror();
          applyMarqueeState();
        }

        fetch("fonts/fonts.json")
          .then(function (r) {
            return r.json();
          })
          .then(function (manifest) {
            initFontsFromManifest(manifest);
            boot();
          })
          .catch(function () {
            activeTextFontSelect.innerHTML = "";
            var og = document.createElement("optgroup");
            og.label = "fonts";
            var opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "could not load fonts/fonts.json";
            og.appendChild(opt);
            activeTextFontSelect.appendChild(og);
            fontRegistry = {};
            fontManifest = { defaultFontId: null, groups: [] };
            boot();
          });
      })();
    </script>
  </body>
</html>
