<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>animator</title>
    <style>
      :root {
        color-scheme: light;
        --ar-w: 1080;
        --ar-h: 1440;
        --artboard-bg: #ffffff;
        --editor-view-h: 320px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: minmax(240px, 280px) minmax(320px, 1fr) minmax(
          260px,
          360px
        );
        align-items: stretch;
        min-height: calc(100vh - 48px);
        gap: 0;
      }

      .settings-panel {
        position: relative;
        height: 100%;
        padding-right: 16px;
        background: transparent;
        border-right: 1px solid rgba(31, 31, 31, 0.16);
      }

      .settings-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .settings-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        padding-left: 2px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .settings-muted {
        color: #6a6a6a;
        font-size: 12px;
      }

      .marquee-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .marquee-choice {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
      }

      .marquee-choice.inactive {
        color: #5d5d5d;
        text-decoration: line-through;
      }

      .marquee-choice:hover,
      .marquee-choice:focus {
        text-decoration: underline;
        outline: none;
      }

      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .settings-actions button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        text-transform: lowercase;
        text-decoration: underline;
      }

      .settings-actions button:hover,
      .settings-actions button:focus {
        outline: none;
      }

      input[type="color"] {
        width: 100%;
        max-width: 120px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.22);
        cursor: pointer;
        background: transparent;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .column-title {
        margin: 0 0 8px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        color: #6a6a6a;
      }

      .output-column,
      .editor-column {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        padding-left: 20px;
      }

      .output-column {
        border-right: 1px solid rgba(31, 31, 31, 0.12);
        padding-right: 16px;
      }

      .output-viewport {
        flex: 1;
        min-height: min(70vh, 560px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        background: rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .output-scale-outer {
        flex-shrink: 0;
        overflow: hidden;
      }

      .output-scale-inner {
        transform-origin: 0 0;
      }

      .scene {
        position: relative;
        background: var(--artboard-bg);
        border: 1px solid rgba(0, 0, 0, 0.22);
        overflow: hidden;
      }

      .scene-mirror {
        pointer-events: none;
      }

      .scene-mirror .scene-badge {
        display: none;
      }

      .scene-mirror .artboard-item {
        border-color: transparent;
        background: transparent;
      }

      .scene-badge {
        position: absolute;
        left: 10px;
        top: 8px;
        font-size: 22px;
        text-transform: lowercase;
        color: rgba(106, 106, 106, 0.85);
        pointer-events: none;
        white-space: nowrap;
        z-index: 50;
      }

      .editor-column {
        padding-right: 4px;
      }

      .editor-scroll {
        height: var(--editor-view-h);
        min-height: 180px;
        max-height: min(92vh, 900px);
        overflow: auto;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: rgba(0, 0, 0, 0.02);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }

      .editor-scale-outer {
        flex-shrink: 0;
        margin-bottom: 48px;
      }

      .editor-scale-inner {
        transform-origin: 0 0;
      }

      .editor-resize-handle {
        margin-top: 4px;
        height: 10px;
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.1);
        cursor: ns-resize;
        flex-shrink: 0;
        touch-action: none;
      }

      .editor-resize-handle:hover {
        background: rgba(0, 0, 0, 0.16);
      }

      .artboard-item {
        position: absolute;
        z-index: 2;
        border: 1px dashed rgba(0, 0, 0, 0.28);
        background: rgba(255, 255, 255, 0.4);
        min-width: 32px;
        min-height: 28px;
        box-sizing: border-box;
      }

      .artboard-drag-handle {
        height: 36px;
        background: rgba(0, 0, 0, 0.07);
        cursor: grab;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 18px;
        letter-spacing: 0.08em;
        color: #888;
        text-transform: lowercase;
        user-select: none;
      }

      .artboard-drag-handle:active {
        cursor: grabbing;
      }

      .artboard-text-inner {
        padding: 12px 16px 20px;
        outline: none;
        min-height: 1.2em;
        font-size: 32px;
        line-height: 1.25;
        word-break: break-word;
      }

      .artboard-item.artboard-text {
        display: flex;
        flex-direction: column;
        left: 8%;
        top: 42%;
        width: 84%;
      }

      .artboard-item.artboard-image {
        display: flex;
        flex-direction: column;
        left: 12%;
        top: 18%;
        width: 76%;
        max-height: 55%;
      }

      .artboard-item.artboard-image img {
        display: block;
        width: 100%;
        height: auto;
        max-height: calc(100% - 36px);
        object-fit: contain;
        pointer-events: none;
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="settings-panel" aria-label="Settings">
        <div class="settings-title-row">
          <h2 class="settings-title">settings</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">format</span>
          <div
            class="marquee-toggle"
            id="ratioGroup"
            role="radiogroup"
            aria-label="Frame format"
          >
            <button
              type="button"
              class="marquee-choice"
              data-w="1080"
              data-h="1440"
              data-label="3:4"
              role="radio"
              aria-checked="true"
            >
              1080 × 1440
            </button>
            <span>/</span>
            <button
              type="button"
              class="marquee-choice inactive"
              data-w="1080"
              data-h="1080"
              data-label="1:1"
              role="radio"
              aria-checked="false"
            >
              1080 × 1080
            </button>
            <span>/</span>
            <button
              type="button"
              class="marquee-choice inactive"
              data-w="1080"
              data-h="1920"
              data-label="reels"
              role="radio"
              aria-checked="false"
            >
              1080 × 1920
            </button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">size</span>
          <span class="settings-muted" id="metaReadout">1080 × 1440 (3:4)</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">background</span>
          <input type="color" id="bgColor" value="#ffffff" aria-label="Artboard background" />
        </div>
        <div class="settings-row">
          <span class="settings-label">add</span>
          <div class="settings-actions">
            <button type="button" id="addText">text box</button>
            <button type="button" id="addImage">image</button>
          </div>
        </div>
        <input type="file" id="imageFile" accept="image/*" hidden />
      </aside>

      <section class="output-column" aria-label="Output preview">
        <p class="column-title">output</p>
        <div class="output-viewport" id="outputViewport">
          <div class="output-scale-outer" id="outputScaleOuter">
            <div class="output-scale-inner" id="outputScaleInner">
              <div
                class="scene scene-mirror"
                id="sceneMirror"
                role="presentation"
                aria-hidden="true"
              ></div>
            </div>
          </div>
        </div>
      </section>

      <section class="editor-column" aria-label="Editor artboard">
        <p class="column-title">artboard</p>
        <div class="editor-scroll" id="editorScroll">
          <div class="editor-scale-outer" id="editorScaleOuter">
            <div class="editor-scale-inner" id="editorScaleInner">
              <div
                class="scene"
                id="scene"
                role="region"
                aria-label="Frame 1080 by 1440 pixels"
              >
                <span class="scene-badge" id="sceneBadge">3:4</span>
              </div>
            </div>
          </div>
        </div>
        <div
          class="editor-resize-handle"
          id="editorResizeHandle"
          role="separator"
          aria-orientation="horizontal"
          aria-label="Drag to change artboard panel height"
        ></div>
      </section>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var scene = document.getElementById("scene");
        var sceneMirror = document.getElementById("sceneMirror");
        var metaReadout = document.getElementById("metaReadout");
        var sceneBadge = document.getElementById("sceneBadge");
        var buttons = document.querySelectorAll("#ratioGroup .marquee-choice");
        var bgColor = document.getElementById("bgColor");
        var addText = document.getElementById("addText");
        var addImage = document.getElementById("addImage");
        var imageFile = document.getElementById("imageFile");

        var outputViewport = document.getElementById("outputViewport");
        var outputScaleOuter = document.getElementById("outputScaleOuter");
        var outputScaleInner = document.getElementById("outputScaleInner");
        var editorScroll = document.getElementById("editorScroll");
        var editorScaleOuter = document.getElementById("editorScaleOuter");
        var editorScaleInner = document.getElementById("editorScaleInner");
        var editorResizeHandle = document.getElementById("editorResizeHandle");

        var logicalW = 1080;
        var logicalH = 1440;
        var mirrorTimer = null;
        var editorScaleStored = 0.25;

        function gcd(a, b) {
          return b ? gcd(b, a % b) : a;
        }

        function ratioLabel(w, h) {
          var g = gcd(w, h);
          return w / g + ":" + h / g;
        }

        function applyLogicalSize(w, h) {
          logicalW = w;
          logicalH = h;
          scene.style.width = w + "px";
          scene.style.height = h + "px";
          sceneMirror.style.width = w + "px";
          sceneMirror.style.height = h + "px";
        }

        function setRatio(w, h, shortLabel) {
          root.style.setProperty("--ar-w", String(w));
          root.style.setProperty("--ar-h", String(h));
          metaReadout.textContent =
            w + " × " + h + " (" + ratioLabel(w, h) + ")";
          sceneBadge.textContent = shortLabel;
          scene.setAttribute(
            "aria-label",
            "Frame " + w + " by " + h + " pixels"
          );
          applyLogicalSize(w, h);
          layoutScales();
          syncMirrorSoon(0);
        }

        function activate(btn) {
          buttons.forEach(function (b) {
            var on = b === btn;
            b.classList.toggle("inactive", !on);
            b.setAttribute("aria-checked", on ? "true" : "false");
          });
          var w = parseInt(btn.getAttribute("data-w"), 10);
          var h = parseInt(btn.getAttribute("data-h"), 10);
          var label = btn.getAttribute("data-label") || "";
          setRatio(w, h, label);
        }

        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            activate(btn);
          });
        });

        function syncBgFromPicker() {
          root.style.setProperty("--artboard-bg", bgColor.value);
        }

        bgColor.addEventListener("input", syncBgFromPicker);
        syncBgFromPicker();

        function syncMirror() {
          sceneMirror.innerHTML = scene.innerHTML;
          sceneMirror.querySelectorAll(".artboard-drag-handle").forEach(function (n) {
            n.remove();
          });
          sceneMirror.querySelectorAll(".artboard-text-inner").forEach(function (el) {
            el.removeAttribute("contenteditable");
          });
        }

        function syncMirrorSoon(ms) {
          var d = ms === undefined ? 32 : ms;
          if (mirrorTimer) clearTimeout(mirrorTimer);
          mirrorTimer = setTimeout(function () {
            mirrorTimer = null;
            syncMirror();
          }, d);
        }

        function layoutOutputScale() {
          var pad = 24;
          var availW = Math.max(80, outputViewport.clientWidth - pad);
          var availH = Math.max(80, outputViewport.clientHeight - pad);
          var s = Math.min(availW / logicalW, availH / logicalH) * 0.98;
          if (s <= 0 || !isFinite(s)) s = 0.2;
          outputScaleInner.style.width = logicalW + "px";
          outputScaleInner.style.height = logicalH + "px";
          outputScaleInner.style.transform = "scale(" + s + ")";
          outputScaleOuter.style.width = logicalW * s + "px";
          outputScaleOuter.style.height = logicalH * s + "px";
        }

        function layoutEditorScale() {
          var pad = 20;
          var availW = Math.max(60, editorScroll.clientWidth - pad);
          var s = (availW / logicalW) * 0.96;
          if (s <= 0 || !isFinite(s)) s = 0.15;
          editorScaleInner.style.width = logicalW + "px";
          editorScaleInner.style.height = logicalH + "px";
          editorScaleInner.style.transform = "scale(" + s + ")";
          editorScaleOuter.style.width = logicalW * s + "px";
          editorScaleOuter.style.height = logicalH * s + "px";
          editorScaleStored = s;
        }

        function layoutScales() {
          layoutOutputScale();
          layoutEditorScale();
        }

        var roOut = new ResizeObserver(layoutScales);
        roOut.observe(outputViewport);
        roOut.observe(editorScroll);

        function attachDragFixed(handle, item, parent) {
          handle.addEventListener("mousedown", function (e) {
            if (e.button !== 0) return;
            e.preventDefault();
            e.stopPropagation();
            var scale = editorScaleStored || 0.2;
            var startX = e.clientX;
            var startY = e.clientY;
            var startLeft = item.offsetLeft;
            var startTop = item.offsetTop;
            function onMove(ev) {
              var dx = (ev.clientX - startX) / scale;
              var dy = (ev.clientY - startY) / scale;
              var nl = startLeft + dx;
              var nt = startTop + dy;
              var maxL = parent.clientWidth - item.offsetWidth;
              var maxT = parent.clientHeight - item.offsetHeight;
              item.style.left = Math.max(0, Math.min(maxL, nl)) + "px";
              item.style.top = Math.max(0, Math.min(maxT, nt)) + "px";
              syncMirrorSoon(16);
            }
            function onUp() {
              window.removeEventListener("mousemove", onMove);
              window.removeEventListener("mouseup", onUp);
              syncMirrorSoon(0);
            }
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          });
        }

        addText.addEventListener("click", function () {
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-text";
          wrap.style.left = "8%";
          wrap.style.top = "42%";
          wrap.style.width = "84%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move";
          var inner = document.createElement("div");
          inner.className = "artboard-text-inner";
          inner.contentEditable = "true";
          inner.setAttribute("spellcheck", "true");
          inner.textContent = "text";
          inner.addEventListener("input", function () {
            syncMirrorSoon(48);
          });
          wrap.appendChild(handle);
          wrap.appendChild(inner);
          scene.appendChild(wrap);
          attachDragFixed(handle, wrap, scene);
          syncMirrorSoon(0);
        });

        addImage.addEventListener("click", function () {
          imageFile.click();
        });

        imageFile.addEventListener("change", function () {
          var f = imageFile.files && imageFile.files[0];
          imageFile.value = "";
          if (!f || !f.type || f.type.indexOf("image/") !== 0) return;
          var url = URL.createObjectURL(f);
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-image";
          wrap.style.left = "12%";
          wrap.style.top = "18%";
          wrap.style.width = "76%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move";
          var img = document.createElement("img");
          img.alt = "";
          img.src = url;
          wrap.appendChild(handle);
          wrap.appendChild(img);
          scene.appendChild(wrap);
          attachDragFixed(handle, wrap, scene);
          syncMirrorSoon(0);
        });

        editorResizeHandle.addEventListener("mousedown", function (e) {
          if (e.button !== 0) return;
          e.preventDefault();
          var startY = e.clientY;
          var startH = editorScroll.getBoundingClientRect().height;
          function onMove(ev) {
            var next = startH + (ev.clientY - startY);
            var minH = 180;
            var maxH = Math.min(window.innerHeight * 0.92, 900);
            next = Math.max(minH, Math.min(maxH, next));
            root.style.setProperty("--editor-view-h", next + "px");
            layoutEditorScale();
          }
          function onUp() {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          }
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        });

        applyLogicalSize(1080, 1440);
        layoutScales();
        syncMirror();
      })();
    </script>
  </body>
</html>
