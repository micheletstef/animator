<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>animator</title>
    <style>
      :root {
        color-scheme: light;
        --ar-w: 1080;
        --ar-h: 1440;
        --artboard-bg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: minmax(260px, 300px) minmax(280px, 1fr);
        align-items: stretch;
        min-height: calc(100vh - 48px);
        gap: 0;
      }

      .settings-panel {
        position: relative;
        height: 100%;
        padding-right: 16px;
        background: transparent;
        border-right: 1px solid rgba(31, 31, 31, 0.16);
      }

      .settings-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .settings-title {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        padding-left: 2px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .settings-muted {
        color: #6a6a6a;
        font-size: 12px;
      }

      .marquee-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .marquee-choice {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
      }

      .marquee-choice.inactive {
        color: #5d5d5d;
        text-decoration: line-through;
      }

      .marquee-choice:hover,
      .marquee-choice:focus {
        text-decoration: underline;
        outline: none;
      }

      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .settings-actions button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        text-transform: lowercase;
        text-decoration: underline;
      }

      .settings-actions button:hover,
      .settings-actions button:focus {
        outline: none;
      }

      input[type="color"] {
        width: 100%;
        max-width: 120px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.22);
        cursor: pointer;
        background: transparent;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 2px;
      }

      .artboard-panel {
        position: relative;
        min-width: 0;
        display: flex;
        flex-direction: column;
        padding-left: 20px;
        min-height: 0;
      }

      .artboard-panel-title {
        margin: 0 0 8px 0;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
        color: #6a6a6a;
      }

      .editor-stage {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: min(70vh, 640px);
        padding: 8px 0 16px;
      }

      .artboard-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 100%;
      }

      .artboard {
        position: relative;
        width: min(380px, calc(100vw - 300px - 80px));
        aspect-ratio: var(--ar-w) / var(--ar-h);
        max-height: min(calc(100vh - 140px), 85vh);
        height: auto;
        background: var(--artboard-bg);
        border: 1px solid rgba(0, 0, 0, 0.22);
        overflow: hidden;
      }

      .artboard-badge {
        position: absolute;
        left: 6px;
        top: 4px;
        font-size: 11px;
        text-transform: lowercase;
        color: #6a6a6a;
        pointer-events: none;
        white-space: nowrap;
        z-index: 50;
      }

      .artboard-item {
        position: absolute;
        z-index: 2;
        border: 1px dashed rgba(0, 0, 0, 0.28);
        background: rgba(255, 255, 255, 0.35);
        min-width: 32px;
        min-height: 28px;
        box-sizing: border-box;
      }

      .artboard-drag-handle {
        height: 14px;
        background: rgba(0, 0, 0, 0.07);
        cursor: grab;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 4px;
        font-size: 9px;
        letter-spacing: 0.12em;
        color: #888;
        text-transform: lowercase;
        user-select: none;
      }

      .artboard-drag-handle:active {
        cursor: grabbing;
      }

      .artboard-text-inner {
        padding: 4px 6px 6px;
        outline: none;
        min-height: 1.2em;
        font-size: 11px;
        line-height: 1.3;
        word-break: break-word;
      }

      .artboard-item.artboard-text {
        display: flex;
        flex-direction: column;
        left: 8%;
        top: 42%;
        width: 84%;
      }

      .artboard-item.artboard-image {
        display: flex;
        flex-direction: column;
        left: 12%;
        top: 18%;
        width: 76%;
        max-height: 55%;
      }

      .artboard-item.artboard-image img {
        display: block;
        width: 100%;
        height: auto;
        max-height: calc(100% - 14px);
        object-fit: contain;
        pointer-events: none;
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="settings-panel" aria-label="Settings">
        <div class="settings-title-row">
          <h2 class="settings-title">settings</h2>
        </div>
        <div class="settings-row">
          <span class="settings-label">format</span>
          <div
            class="marquee-toggle"
            id="ratioGroup"
            role="radiogroup"
            aria-label="Frame format"
          >
            <button
              type="button"
              class="marquee-choice"
              data-w="1080"
              data-h="1440"
              data-label="3:4"
              role="radio"
              aria-checked="true"
            >
              1080 × 1440
            </button>
            <span>/</span>
            <button
              type="button"
              class="marquee-choice inactive"
              data-w="1080"
              data-h="1080"
              data-label="1:1"
              role="radio"
              aria-checked="false"
            >
              1080 × 1080
            </button>
            <span>/</span>
            <button
              type="button"
              class="marquee-choice inactive"
              data-w="1080"
              data-h="1920"
              data-label="reels"
              role="radio"
              aria-checked="false"
            >
              1080 × 1920
            </button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">size</span>
          <span class="settings-muted" id="metaReadout">1080 × 1440 (3:4)</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">background</span>
          <input type="color" id="bgColor" value="#ffffff" aria-label="Artboard background" />
        </div>
        <div class="settings-row">
          <span class="settings-label">add</span>
          <div class="settings-actions">
            <button type="button" id="addText">text box</button>
            <button type="button" id="addImage">image</button>
          </div>
        </div>
        <input type="file" id="imageFile" accept="image/*" hidden />
      </aside>
      <section class="artboard-panel" aria-label="Artboard">
        <p class="artboard-panel-title">artboard</p>
        <div class="editor-stage">
          <div class="artboard-wrap">
            <div
              class="artboard"
              id="artboard"
              role="region"
              aria-label="Frame 1080 by 1440 pixels"
            >
              <span class="artboard-badge" id="artboardBadge">3:4</span>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var artboard = document.getElementById("artboard");
        var metaReadout = document.getElementById("metaReadout");
        var artboardBadge = document.getElementById("artboardBadge");
        var buttons = document.querySelectorAll("#ratioGroup .marquee-choice");
        var bgColor = document.getElementById("bgColor");
        var addText = document.getElementById("addText");
        var addImage = document.getElementById("addImage");
        var imageFile = document.getElementById("imageFile");

        function gcd(a, b) {
          return b ? gcd(b, a % b) : a;
        }

        function ratioLabel(w, h) {
          var g = gcd(w, h);
          return w / g + ":" + h / g;
        }

        function setRatio(w, h, shortLabel) {
          root.style.setProperty("--ar-w", String(w));
          root.style.setProperty("--ar-h", String(h));
          metaReadout.textContent =
            w + " × " + h + " (" + ratioLabel(w, h) + ")";
          artboardBadge.textContent = shortLabel;
          artboard.setAttribute(
            "aria-label",
            "Frame " + w + " by " + h + " pixels"
          );
        }

        function activate(btn) {
          buttons.forEach(function (b) {
            var on = b === btn;
            b.classList.toggle("inactive", !on);
            b.setAttribute("aria-checked", on ? "true" : "false");
          });
          var w = parseInt(btn.getAttribute("data-w"), 10);
          var h = parseInt(btn.getAttribute("data-h"), 10);
          var label = btn.getAttribute("data-label") || "";
          setRatio(w, h, label);
        }

        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            activate(btn);
          });
        });

        function syncBgFromPicker() {
          root.style.setProperty("--artboard-bg", bgColor.value);
        }

        bgColor.addEventListener("input", syncBgFromPicker);
        syncBgFromPicker();

        function attachDrag(handle, item, parent) {
          handle.addEventListener("mousedown", function (e) {
            if (e.button !== 0) return;
            e.preventDefault();
            e.stopPropagation();
            var startX = e.clientX;
            var startY = e.clientY;
            var startLeft = item.offsetLeft;
            var startTop = item.offsetTop;
            function onMove(ev) {
              var dx = ev.clientX - startX;
              var dy = ev.clientY - startY;
              var nl = startLeft + dx;
              var nt = startTop + dy;
              var maxL = parent.clientWidth - item.offsetWidth;
              var maxT = parent.clientHeight - item.offsetHeight;
              item.style.left = Math.max(0, Math.min(maxL, nl)) + "px";
              item.style.top = Math.max(0, Math.min(maxT, nt)) + "px";
            }
            function onUp() {
              window.removeEventListener("mousemove", onMove);
              window.removeEventListener("mouseup", onUp);
            }
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          });
        }

        addText.addEventListener("click", function () {
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-text";
          wrap.style.left = "8%";
          wrap.style.top = "42%";
          wrap.style.width = "84%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move";
          var inner = document.createElement("div");
          inner.className = "artboard-text-inner";
          inner.contentEditable = "true";
          inner.setAttribute("spellcheck", "true");
          inner.textContent = "text";
          wrap.appendChild(handle);
          wrap.appendChild(inner);
          artboard.appendChild(wrap);
          attachDrag(handle, wrap, artboard);
        });

        addImage.addEventListener("click", function () {
          imageFile.click();
        });

        imageFile.addEventListener("change", function () {
          var f = imageFile.files && imageFile.files[0];
          imageFile.value = "";
          if (!f || !f.type || f.type.indexOf("image/") !== 0) return;
          var url = URL.createObjectURL(f);
          var wrap = document.createElement("div");
          wrap.className = "artboard-item artboard-image";
          wrap.style.left = "12%";
          wrap.style.top = "18%";
          wrap.style.width = "76%";
          var handle = document.createElement("div");
          handle.className = "artboard-drag-handle";
          handle.textContent = "move";
          var img = document.createElement("img");
          img.alt = "";
          img.src = url;
          wrap.appendChild(handle);
          wrap.appendChild(img);
          artboard.appendChild(wrap);
          attachDrag(handle, wrap, artboard);
        });
      })();
    </script>
  </body>
</html>
